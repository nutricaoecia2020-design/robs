    <script>
    (function(){
      try {
        var search = window.location.search;

        var p = new URLSearchParams(search);

        for (var uk in utmMap) {
          var uv = p.get(uk);
          if (uv) { localStorage.setItem(utmMap[uk], uv); hasTracking = true; }

        if (!hasTracking) return;
        if (clickId) {
          localStorage.setItem('vnz_click_id', clickId);
          localStorage.setItem('vnz_click_id_type', clickIdType);
