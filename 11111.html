<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cantinho do Robs Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Área Central -->
        <div class="md:col-span-2 space-y-6">
            <!-- Seleção de Produtos -->
            <div class="bg-white p-6 rounded-xl shadow">
                <h2 class="text-xl font-bold mb-4">Cardápio</h2>
                <div class="border p-4 rounded-lg">
                    <p class="font-bold">Pizza Tradicional</p>
                    <button onclick="openModal()" class="bg-black text-white px-4 py-2 mt-2 rounded">Selecionar Sabores</button>
                </div>
            </div>

            <!-- Área de Avisos -->
            <div class="bg-white p-6 rounded-xl shadow">
                <h2 class="text-lg font-bold mb-2">Painel de Avisos</h2>
                <div id="listaAvisos" class="space-y-2 mb-4"></div>
                <div class="flex gap-2">
                    <input id="inputAviso" class="border p-2 flex-1" placeholder="Novo aviso...">
                    <button onclick="addAviso()" class="bg-blue-600 text-white px-4 py-2 rounded">Registrar</button>
                </div>
            </div>
        </div>

        <!-- Resumo do Pedido -->
        <div class="bg-white p-6 rounded-xl shadow h-fit sticky top-4">
            <h2 class="text-xl font-bold mb-4">Resumo do Pedido</h2>
            <div id="resumoItens" class="space-y-2 mb-4"></div>
            
            <select id="bairro" onchange="calcularTotal()" class="w-full border p-2 mb-2">
                <option value="luzia">Bairro Luzia (Grátis)</option>
                <option value="ponto novo">Ponto Novo (Grátis)</option>
                <option value="outro">Outros Bairros (R$ 6,00)</option>
            </select>
            
            <select id="pagamento" class="w-full border p-2 mb-2">
                <option value="dinheiro">Dinheiro</option>
                <option value="pix">Pix</option>
            </select>
            <input id="troco" placeholder="Troco para quanto?" class="w-full border p-2 mb-4">
            
            <div class="font-bold text-lg mb-4">Total: R$ <span id="total">0,00</span></div>
            <button onclick="finalizar()" class="w-full bg-green-600 text-white py-3 rounded">FINALIZAR PEDIDO</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg w-full max-w-sm">
            <h2 class="font-bold mb-4">Escolha 2 sabores</h2>
            <div id="gridSabores" class="grid grid-cols-2 gap-2 mb-4"></div>
            <button onclick="confirmar()" class="w-full bg-orange-500 text-white py-2 rounded">Confirmar</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-2">Voltar</button>
        </div>
    </div>

    <script>
        let cart = [], avisos = [];
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Pepperoni"];

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('gridSabores').innerHTML = sabores.map(s => 
                `<label><input type="checkbox" value="${s}" onchange="check(this)"> ${s}</label>`).join('');
        }

        function check(el) {
            let selected = document.querySelectorAll('#gridSabores input:checked');
            if(selected.length > 2) el.checked = false;
        }

        function confirmar() {
            let selected = Array.from(document.querySelectorAll('#gridSabores input:checked')).map(i => i.value);
            if(selected.length !== 2) return alert("Escolha 2!");
            cart.push({ nome: "Pizza: " + selected.join(" + "), preco: 39.90 });
            closeModal();
            render();
        }

        function remover(i) { cart.splice(i, 1); render(); }

        function render() {
            let html = cart.map((c, i) => `
                <div class="flex justify-between"><span>${c.nome}</span> 
                <button onclick="remover(${i})" class="text-red-500 text-xs">Apagar</button></div>`).join('');
            document.getElementById('resumoItens').innerHTML = html;
            calcularTotal();
        }

        function calcularTotal() {
            let sub = cart.reduce((a, b) => a + b.preco, 0);
            let taxa = document.getElementById('bairro').value === 'outro' ? 6 : 0;
            document.getElementById('total').innerText = (sub + taxa).toFixed(2);
        }

        function addAviso() {
            if(avisos.length < 10) {
                avisos.push(document.getElementById('inputAviso').value);
                renderAvisos();
            }
        }

        function renderAvisos() {
            document.getElementById('listaAvisos').innerHTML = avisos.map((a, i) => 
                `<div class="bg-gray-100 p-2 text-sm flex justify-between">${a} <button onclick="avisos.splice(${i},1); renderAvisos()">x</button></div>`).join('');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function finalizar() {
            let msg = `Pedido: ${cart.map(c => c.nome).join(', ')} | Total: R$ ${document.getElementById('total').innerText}`;
            window.open(`https://wa.me/55799920001038?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
