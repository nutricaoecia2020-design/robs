<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Gestão de Pedidos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; --dark: #1e293b; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .sidebar-gradient { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Navbar Superior -->
    <nav class="bg-white border-b border-slate-200 p-4 fixed w-full top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold">CR</div>
                <h1 class="text-xl font-bold text-slate-800">Cantinho do Robs <span class="text-xs text-slate-400 font-normal">v2.0</span></h1>
            </div>
            <div id="btnCart" onclick="toggleCart()" class="cursor-pointer flex items-center gap-2 bg-slate-100 p-2 rounded-lg hover:bg-slate-200">
                <span>🛒</span> <span id="count" class="font-bold">0 itens</span>
            </div>
        </div>
    </nav>

    <!-- Estrutura Principal -->
    <main class="pt-24 pb-12 px-4 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- Área de Cardápio -->
        <section class="lg:col-span-3 space-y-8">
            <div id="catalog" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Produtos Gerados via JS -->
            </div>
        </section>

        <!-- Sidebar de Resumo (O "Dashboard" do Cliente) -->
        <aside class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 sticky top-24 p-6">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Resumo do Pedido</h2>
                <div id="cartItems" class="max-h-64 overflow-y-auto custom-scrollbar space-y-3 text-sm"></div>
                
                <div class="mt-6 pt-4 border-t space-y-2">
                    <div class="flex justify-between font-bold text-lg"><span>Total</span><span id="total">R$ 0,00</span></div>
                </div>

                <div class="mt-6 space-y-3">
                    <input type="text" id="inNome" placeholder="Nome do Cliente" class="w-full p-3 border rounded-lg text-sm">
                    <input type="text" id="inEnd" placeholder="Endereço Completo" class="w-full p-3 border rounded-lg text-sm">
                    <input type="text" id="inTroco" placeholder="Troco para quanto?" class="w-full p-3 border rounded-lg text-sm">
                    <button onclick="enviarPedido()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition">FINALIZAR PEDIDO</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Modal Seleção (Oculto) -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg p-8">
            <h2 class="text-2xl font-bold mb-6">Montar Pizza</h2>
            <div id="sabores" class="grid grid-cols-2 gap-3 mb-6"></div>
            <button onclick="confirmar()" class="w-full bg-primary text-white py-4 rounded-xl font-bold">Confirmar (2 Sabores)</button>
        </div>
    </div>

    <script>
        // Data Base (Extensível para centenas de itens)
        const menu = [{ id: 1, nome: "Pizza Tradicional", preco: 39.90, desc: "Borda recheada + 2 sabores" }];
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Pepperoni"];
        let cart = [], selected = [];

        // Renderização do Catálogo
        function render() {
            const list = document.getElementById('catalog');
            list.innerHTML = menu.map(p => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-xl font-bold">${p.nome}</h3>
                    <p class="text-slate-500 text-sm mb-4">${p.desc}</p>
                    <button onclick="openModal()" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold hover:bg-primary transition">Selecionar Sabores</button>
                </div>
            `).join('');
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('sabores').innerHTML = sabores.map(s => `
                <label class="border p-3 rounded-lg cursor-pointer flex items-center gap-2">
                    <input type="checkbox" onchange="toggleSabor(this, '${s}')"> ${s}
                </label>`).join('');
        }

        function toggleSabor(el, nome) {
            if(el.checked) { if(selected.length < 2) selected.push(nome); else el.checked = false; }
            else { selected = selected.filter(i => i !== nome); }
        }

        function confirmar() {
            if(selected.length < 2) return alert("Escolha 2 sabores!");
            cart.push({ nome: `Pizza: ${selected.join(' + ')}`, preco: 39.90 });
            selected = [];
            updateCart();
            document.getElementById('modal').classList.add('hidden');
        }

        function updateCart() {
            const list = document.getElementById('cartItems');
            list.innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.nome}</span><span>R$ ${i.preco.toFixed(2)}</span></div>`).join('');
            document.getElementById('count').innerText = cart.length + " itens";
            document.getElementById('total').innerText = "R$ " + cart.reduce((a, b) => a + b.preco, 0).toFixed(2);
        }

        function enviarPedido() {
            const n = document.getElementById('inNome').value, e = document.getElementById('inEnd').value;
            if(!n || !e) return alert("Preencha os campos obrigatórios!");
            const msg = `*PEDIDO CRIADO*%0ANome: ${n}%0AEnd: ${e}%0AItens: ${cart.map(i=>i.nome).join(', ')}`;
            window.open(`https://wa.me/55799920001038?text=${msg}`);
        }

        render();
    </script>
</body>
</html>
