<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white p-4 shadow-sm text-center">
        <h1 class="text-xl font-bold">Cantinho do Robs</h1>
        <p class="text-sm text-gray-500">Loja Digital</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-lg shadow-sm">
            <h2 class="font-bold text-lg">Pizza Especial (2 Sabores)</h2>
            <p class="text-primary font-bold text-xl">R$ 39,90</p>
            <button onclick="openPizzaModal()" class="mt-3 w-full bg-primary text-white py-2 rounded-md font-bold">Montar minha Pizza</button>
        </div>
    </main>

    <!-- Modal de Seleção -->
    <div id="pizzaModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm p-6 rounded-lg">
            <h2 class="text-lg font-bold mb-4">Escolha 2 sabores:</h2>
            <div id="saboresList" class="max-h-60 overflow-y-auto mb-4">
                <!-- Sabores injetados via JS -->
            </div>
            <button onclick="finalizeSelection()" class="w-full bg-primary text-white py-2 rounded font-bold">Confirmar (R$ 39,90)</button>
            <button onclick="closeModal()" class="w-full text-gray-400 mt-2">Cancelar</button>
        </div>
    </div>

    <!-- Carrinho Flutuante -->
    <button id="cartBtn" onclick="toggleCart()" class="fixed bottom-4 right-4 bg-primary text-white px-6 py-3 rounded-full shadow-lg font-bold">
        Ver Carrinho (R$ <span id="cartTotal">0,00</span>)
    </button>

    <script>
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Quatro Queijos", "Pepperoni", "Baiana", "Milho c/ Bacon", "Atum"];
        let selectedSabores = [];
        let cart = [];

        function openPizzaModal() {
            let html = sabores.map(s => `
                <label class="block py-1">
                    <input type="checkbox" value="${s}" onchange="handleSelect(this)"> ${s}
                </label>
            `).join('');
            document.getElementById('saboresList').innerHTML = html;
            document.getElementById('pizzaModal').classList.remove('hidden');
        }

        function handleSelect(checkbox) {
            if(checkbox.checked) {
                if(selectedSabores.length >= 2) {
                    checkbox.checked = false;
                    alert("Selecione apenas 2 sabores!");
                } else {
                    selectedSabores.push(checkbox.value);
                }
            } else {
                selectedSabores = selectedSabores.filter(s => s !== checkbox.value);
            }
        }

        function finalizeSelection() {
            if(selectedSabores.length !== 2) return alert("Por favor, escolha exatamente 2 sabores.");
            cart.push({name: `Pizza: ${selectedSabores.join(' + ')}`, price: 39.90});
            document.getElementById('cartTotal').innerText = "39,90";
            closeModal();
            selectedSabores = [];
        }

        function closeModal() { document.getElementById('pizzaModal').classList.add('hidden'); }
        
        function toggleCart() {
            if(cart.length === 0) return alert("Carrinho vazio!");
            const msg = `Olá! Novo pedido:%0A${cart[0].name}%0AValor: R$ 39,90`;
            window.open(`https://wa.me/55799920001038?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
