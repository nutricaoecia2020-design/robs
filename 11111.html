<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <header class="bg-white p-4 shadow-md text-center border-b-4 border-primary">
        <h1 class="text-2xl font-bold">Cantinho do Robs</h1>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h2 class="font-bold text-lg">Pizza Tradicional (Escolha 2)</h2>
            <p class="text-primary font-bold text-2xl">R$ 39,90</p>
            <button onclick="openPizzaModal()" class="mt-3 w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition">Montar minha Pizza</button>
        </div>
    </main>

    <!-- Modal Seleção -->
    <div id="pizzaModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-xl">
            <h2 class="text-lg font-bold mb-4">Escolha 2 sabores:</h2>
            <div id="saboresList" class="max-h-60 overflow-y-auto mb-4 border rounded p-2"></div>
            <button onclick="confirmarPizza()" class="w-full bg-primary text-white py-3 rounded-lg font-bold">Adicionar à Sacola</button>
            <button onclick="closeModal()" class="w-full text-gray-400 mt-3 font-semibold">Cancelar</button>
        </div>
    </div>

    <!-- Sacola e Checkout -->
    <div id="cartSidebar" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto p-6">
        <div class="max-w-md mx-auto">
            <button onclick="toggleCart()" class="text-gray-600 font-bold mb-4">← Continuar comprando</button>
            <h2 class="text-2xl font-bold mb-6">Minha Sacola</h2>
            
            <div id="cartItemsList" class="mb-6 border-b pb-4"></div>
            
            <h3 class="font-bold text-lg mb-4">Dados do Cliente:</h3>
            <input type="text" id="nome" placeholder="Nome Completo" class="w-full border p-3 mb-2 rounded-lg">
            <input type="tel" id="tel" placeholder="Telefone (WhatsApp)" class="w-full border p-3 mb-2 rounded-lg">
            <input type="text" id="end" placeholder="Endereço (Rua, Número, Bairro)" class="w-full border p-3 mb-4 rounded-lg">
            
            <h3 class="font-bold text-lg mb-2">Pagamento:</h3>
            <select id="pag" class="w-full border p-3 mb-2 rounded-lg">
                <option value="Dinheiro">Dinheiro</option>
                <option value="Pix">Pix</option>
                <option value="Cartão">Cartão</option>
            </select>
            <input type="text" id="troco" placeholder="Precisa de troco para quanto?" class="w-full border p-3 mb-6 rounded-lg">

            <button onclick="enviarPedido()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-orange-600 transition">Finalizar Pedido (WhatsApp)</button>
        </div>
    </div>

    <button id="btnFlutuante" onclick="toggleCart()" class="hidden fixed bottom-6 right-6 bg-primary text-white px-6 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2">
        🛒 Ver Sacola (R$ <span id="totalValor">39,90</span>)
    </button>

    <script>
        let cart = [];
        let selecao = [];
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Quatro Queijos", "Pepperoni", "Baiana", "Milho c/ Bacon", "Atum"];

        function openPizzaModal() {
            let html = sabores.map(s => `<label class="flex items-center gap-2 py-1"><input type="checkbox" value="${s}" onchange="selecionar(this)"> ${s}</label>`).join('');
            document.getElementById('saboresList').innerHTML = html;
            document.getElementById('pizzaModal').classList.remove('hidden');
        }

        function selecionar(cb) {
            if(cb.checked) { if(selecao.length < 2) selecao.push(cb.value); else cb.checked = false; }
            else { selecao = selecao.filter(s => s !== cb.value); }
        }

        function confirmarPizza() {
            if(selecao.length !== 2) return alert("Escolha 2 sabores!");
            cart.push({item: `Pizza: ${selecao.join(' + ')}`, valor: 39.90});
            document.getElementById('btnFlutuante').classList.remove('hidden');
            document.getElementById('pizzaModal').classList.add('hidden');
            selecao = [];
        }

        function toggleCart() {
            let list = cart.map((c, i) => `<div class="flex justify-between py-2 border-b"><span>${c.item}</span> <span>R$ ${c.valor.toFixed(2)}</span></div>`).join('');
            document.getElementById('cartItemsList').innerHTML = list || "Sua sacola está vazia.";
            document.getElementById('cartSidebar').classList.toggle('hidden');
        }

        function enviarPedido() {
            const nome = document.getElementById('nome').value, tel = document.getElementById('tel').value, end = document.getElementById('end').value;
            if(!nome || !tel || !end) return alert("Preencha seus dados!");
            const msg = `*Novo Pedido - Cantinho do Robs*%0A%0A*Itens:* ${cart.map(i => i.item).join(', ')}%0A*Cliente:* ${nome}%0A*Tel:* ${tel}%0A*End:* ${end}%0A*Pag:* ${document.getElementById('pag').value}%0A*Troco:* ${document.getElementById('troco').value}`;
            window.location.href = `https://wa.me/55799920001038?text=${msg}`;
        }
        function closeModal() { document.getElementById('pizzaModal').classList.add('hidden'); }
    </script>
</body>
</html>
