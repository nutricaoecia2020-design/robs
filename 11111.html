<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow mb-6 border-b-4 border-red-600">
            <h1 class="text-4xl font-black text-red-600 text-center">Cantinho do Robs</h1>
            <p class="text-center text-gray-500">📍 Aracaju, Bairro Luzia | 📞 (79) 92000-1038</p>
            <div id="statusLoja" class="text-center font-bold mt-2 py-1 rounded blink"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6">
                <!-- Cardápio -->
                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-xl font-bold mb-4 text-red-700">Cardápio</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Pizza -->
                        <div class="border p-4 rounded-lg hover:border-red-500 transition">
                            <p class="font-bold">Pizza Tradicional</p>
                            <button onclick="openModal()" class="bg-red-600 text-white px-4 py-2 mt-2 rounded">Selecionar Sabores</button>
                        </div>
                        <!-- Bebidas -->
                        <div class="border p-4 rounded-lg hover:border-red-500 transition flex flex-col items-center">
                            <img src="https://d39a3h63x4029u.cloudfront.net/eyJidWNrZXQiOiJzY3JpcHRzLWFzc2V0cyIsImtleSI6InByb2R1Y3RzLzE1NjU3Mzg3NjE2NTcuanBnIiwiZWRpdHMiOnsicmVzaXplIjp7IndpZHRoIjo2MH19fQ==" alt="Guaraná" class="w-12 h-16 object-contain mb-2">
                            <p class="font-bold">Guaraná 1 Litro</p>
                            <p class="text-sm text-gray-600">R$ 8,90</p>
                            <button onclick="adicionarItem('Guaraná 1 Litro', 8.90)" class="bg-red-600 text-white px-4 py-2 mt-2 rounded">Adicionar</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-lg font-bold mb-2 text-red-700">Painel de Avisos</h2>
                    <div id="listaAvisos" class="space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input id="inputAviso" class="border p-2 flex-1 rounded" placeholder="Novo aviso...">
                        <button onclick="addAviso()" class="bg-red-600 text-white px-4 py-2 rounded">Registrar</button>
                    </div>
                </div>
            </div>

            <!-- Resumo -->
            <div class="bg-white p-6 rounded-xl shadow h-fit sticky top-4 border-t-4 border-red-600">
                <h2 class="text-xl font-bold mb-4 text-red-700">Resumo do Pedido</h2>
                <div id="resumoItens" class="space-y-2 mb-4 text-sm"></div>
                
                <input id="nomeCliente" class="w-full border p-2 mb-2 rounded" placeholder="Nome Completo">
                <input id="endCliente" class="w-full border p-2 mb-2 rounded" placeholder="Endereço Completo">
                
                <select id="bairro" onchange="calcularTotal()" class="w-full border p-2 mb-2 rounded">
                    <option value="luzia">Luzia / Ponto Novo (Grátis)</option>
                    <option value="outro">Outros Bairros (R$ 6,00)</option>
                </select>
                
                <select id="pagamento" class="w-full border p-2 mb-2 rounded">
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão Débito">Cartão de Débito</option>
                    <option value="Cartão Crédito">Cartão de Crédito</option>
                    <option value="Pix">Pix</option>
                </select>
                <input id="troco" placeholder="Troco para quanto?" class="w-full border p-2 mb-4 rounded">
                
                <div class="font-bold text-lg mb-4 text-red-700">Total: R$ <span id="total">0,00</span></div>
                <button onclick="finalizar()" class="w-full bg-green-600 text-white py-3 rounded font-bold">FINALIZAR PEDIDO</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg w-full max-w-sm">
            <h2 class="font-bold mb-4">Escolha 2 sabores</h2>
            <div id="gridSabores" class="grid grid-cols-2 gap-2 mb-4"></div>
            <button onclick="confirmar()" class="w-full bg-red-600 text-white py-2 rounded mb-2">Confirmar</button>
            <button onclick="closeModal()" class="w-full bg-gray-200 py-2 rounded">Voltar</button>
        </div>
    </div>

    <script>
        let cart = [], avisos = [];
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Pepperoni"];

        function verificarHorario() {
            const h = new Date().getHours();
            const el = document.getElementById('statusLoja');
            if (h >= 17 && h < 22.5) {
                el.innerText = "🟢 LOJA ABERTA"; el.className = "text-center font-bold mt-2 py-1 rounded blink text-green-600";
            } else {
                el.innerText = "🟡 LOJA FECHADA, APENAS AGENDAMENTO"; el.className = "text-center font-bold mt-2 py-1 rounded blink text-yellow-500";
            }
        }

        function adicionarItem(nome, preco) { cart.push({ nome, preco }); render(); }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('gridSabores').innerHTML = sabores.map(s => 
                `<label class="text-sm"><input type="checkbox" value="${s}" onchange="check(this)"> ${s}</label>`).join('');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function check(el) {
            let selected = document.querySelectorAll('#gridSabores input:checked');
            if(selected.length > 2) el.checked = false;
        }

        function confirmar() {
            let selected = Array.from(document.querySelectorAll('#gridSabores input:checked')).map(i => i.value);
            if(selected.length !== 2) return alert("Escolha 2 sabores!");
            cart.push({ nome: "Pizza: " + selected.join(" + "), preco: 39.90 });
            closeModal();
            render();
        }

        function render() {
            document.getElementById('resumoItens').innerHTML = cart.map((c, i) => `
                <div class="flex justify-between"><span>${c.nome}</span> 
                <button onclick="cart.splice(${i},1); render()" class="text-red-500 font-bold">x</button></div>`).join('');
            calcularTotal();
        }

        function calcularTotal() {
            let sub = cart.reduce((a, b) => a + b.preco, 0);
            let taxa = document.getElementById('bairro').value === 'outro' ? 6 : 0;
            document.getElementById('total').innerText = (sub + taxa).toFixed(2);
        }

        function addAviso() {
            if(avisos.length < 10) { avisos.push(document.getElementById('inputAviso').value); renderAvisos(); }
        }

        function renderAvisos() {
            document.getElementById('listaAvisos').innerHTML = avisos.map((a, i) => 
                `<div class="bg-gray-100 p-2 text-sm flex justify-between rounded">${a} <button onclick="avisos.splice(${i},1); renderAvisos()" class="text-red-500 font-bold">x</button></div>`).join('');
        }

        function finalizar() {
            const pedidoNum = Math.floor(Math.random() * 9000 + 1000);
            const texto = `🧾 *CUPOM FISCAL - CANTINHO DO ROBS*\n\n` +
                          `🆔 Pedido #00${pedidoNum}\n` +
                          `👤 Cliente: ${document.getElementById('nomeCliente').value}\n` +
                          `📍 Endereço: ${document.getElementById('endCliente').value}\n\n` +
                          `🍕 Itens:\n${cart.map(c => '• ' + c.nome).join('\n')}\n\n` +
                          `💳 Pagamento: ${document.getElementById('pagamento').value}\n` +
                          `💵 Troco: ${document.getElementById('troco').value || 'Não precisa'}\n` +
                          `💰 Total: R$ ${document.getElementById('total').innerText}\n\n` +
                          `📞 Contato: (79) 92000-1038\n` +
                          `🏢 Aracaju, Bairro Luzia`;
            
            window.open(`https://wa.me/5579992001038?text=${encodeURIComponent(texto)}`);
        }

        verificarHorario();
    </script>
</body>
</html>
