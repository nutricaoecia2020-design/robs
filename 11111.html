<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .border-primary { border-color: var(--primary); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white p-4 shadow-sm text-center">
        <h1 class="text-xl font-bold">Cantinho do Robs</h1>
        <p class="text-sm text-gray-500">Loja Digital</p>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-lg shadow-sm mb-4">
            <h2 class="font-semibold mb-2">Pizza de Frango</h2>
            <p class="text-primary font-bold text-lg">R$ 24,90</p>
            <button onclick="addToCart('Pizza de Frango', 24.90)" class="mt-2 w-full bg-primary text-white py-2 rounded-md hover:bg-orange-600">Adicionar ao Carrinho</button>
        </div>
    </main>

    <button id="cartBtn" onclick="toggleCart()" class="fixed bottom-4 right-4 bg-primary text-white px-6 py-3 rounded-full shadow-lg font-bold">
        Ver Carrinho (R$ <span id="cartTotal">0,00</span>)
    </button>

    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-end">
        <div class="bg-white w-full max-w-sm h-full p-6 overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Seu Pedido</h2>
            <div id="cartItems" class="mb-4"></div>
            <div class="border-t pt-4">
                <p class="text-lg font-bold mb-4">Total: R$ <span id="finalTotal">0,00</span></p>
                
                <h3 class="font-semibold mb-2">Seus Dados:</h3>
                <input type="text" id="custName" placeholder="Nome" class="w-full border p-2 mb-2 rounded">
                <input type="text" id="custAddr" placeholder="Endereço" class="w-full border p-2 mb-2 rounded">
                
                <h3 class="font-semibold mt-4 mb-2">Pagamento:</h3>
                <select id="payMethod" class="w-full border p-2 mb-4 rounded">
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                </select>

                <button onclick="sendWhatsApp()" class="w-full bg-primary text-white py-3 rounded-lg font-bold">Enviar Pedido por WhatsApp</button>
                <button onclick="toggleCart()" class="w-full text-gray-500 mt-2">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateUI();
        }

        function updateUI() {
            document.getElementById('cartTotal').innerText = total.toFixed(2);
            document.getElementById('finalTotal').innerText = total.toFixed(2);
        }

        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('hidden');
            let itemsHtml = cart.map(item => `<p>${item.name} - R$ ${item.price.toFixed(2)}</p>`).join('');
            document.getElementById('cartItems').innerHTML = itemsHtml || 'Carrinho vazio';
        }

        function sendWhatsApp() {
            const name = document.getElementById('custName').value;
            const addr = document.getElementById('custAddr').value;
            const pay = document.getElementById('payMethod').value;
            
            if(!name || !addr) return alert("Preencha nome e endereço!");

            const msg = `Olá! Novo Pedido:%0A%0A${cart.map(i => i.name).join(', ')}%0ATotal: R$ ${total.toFixed(2)}%0A%0ACliente: ${name}%0AEndereço: ${addr}%0APagamento: ${pay}`;
            window.open(`https://wa.me/55799920001038?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
