<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-white p-4 shadow-sm border-b-2 border-primary sticky top-0 z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Cantinho do Robs</h1>
            <div onclick="toggleCart()" class="cursor-pointer bg-primary text-white p-2 rounded-lg flex items-center gap-2">
                <span class="font-bold">Sacola</span>
                <span id="cartCount" class="bg-white text-primary px-2 rounded-full">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2 space-y-4">
            <h2 class="text-lg font-bold text-gray-700">Cardápio de Pizzas</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h3 class="text-xl font-bold">Pizza Tradicional (2 Sabores)</h3>
                <p class="text-gray-500 mb-4">Escolha dois sabores clássicos da nossa casa.</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-bold text-primary">R$ 39,90</span>
                    <button onclick="openPizzaModal()" class="bg-primary text-white px-6 py-2 rounded-xl font-bold hover:bg-orange-600 transition">Montar Pizza</button>
                </div>
            </div>
        </div>

        <div class="md:col-span-1">
            <div id="checkoutPanel" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
                <h2 class="font-bold mb-4">Finalizar Pedido</h2>
                <div id="cartDetails" class="space-y-2 mb-4 text-sm text-gray-600"></div>
                <div class="space-y-3 border-t pt-4">
                    <input type="text" id="nome" placeholder="Nome Completo" class="w-full p-3 border rounded-lg">
                    <input type="text" id="end" placeholder="Endereço / Bairro" class="w-full p-3 border rounded-lg">
                    <input type="text" id="troco" placeholder="Troco para quanto?" class="w-full p-3 border rounded-lg">
                    <button onclick="sendWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg">Enviar Pedido (WhatsApp)</button>
                </div>
            </div>
        </div>
    </main>

    <div id="pizzaModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl">
            <h2 class="text-xl font-bold mb-4">Escolha 2 Sabores</h2>
            <div id="saboresList" class="grid grid-cols-2 gap-2 max-h-80 overflow-y-auto mb-4"></div>
            <button onclick="addPizzaToCart()" class="w-full bg-primary text-white py-3 rounded-lg font-bold">Confirmar Sabores</button>
        </div>
    </div>

    <script>
        let cart = [], selectedSabores = [];
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Quatro Queijos", "Pepperoni", "Baiana", "Milho c/ Bacon", "Atum"];

        function openPizzaModal() {
            let html = sabores.map(s => `<label class="border p-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" value="${s}" onchange="selectFlavor(this)"> ${s}</label>`).join('');
            document.getElementById('saboresList').innerHTML = html;
            document.getElementById('pizzaModal').classList.remove('hidden');
        }

        function selectFlavor(cb) {
            if(cb.checked) { if(selectedSabores.length < 2) selectedSabores.push(cb.value); else cb.checked = false; }
            else { selectedSabores = selectedSabores.filter(s => s !== cb.value); }
        }

        function addPizzaToCart() {
            if(selectedSabores.length !== 2) return alert("Por favor, escolha exatamente 2 sabores!");
            cart.push({ nome: "Pizza: " + selectedSabores.join(" + "), preco: 39.90 });
            document.getElementById('cartDetails').innerHTML += `<p>• ${selectedSabores.join(" e ")}</p>`;
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('pizzaModal').classList.add('hidden');
            selectedSabores = [];
        }

        function sendWhatsApp() {
            const n = document.getElementById('nome').value, e = document.getElementById('end').value, t = document.getElementById('troco').value;
            if(!n || !e) return alert("Preencha Nome e Endereço!");
            const msg = `*NOVO PEDIDO*%0AItens: ${cart.map(i => i.nome).join(', ')}%0ACliente: ${n}%0AEndereço: ${e}%0ATroco: ${t}`;
            window.open(`https://wa.me/55799920001038?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
