<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

    <header class="bg-white p-4 shadow-sm text-center">
        <h1 class="text-xl font-bold">Cantinho do Robs</h1>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-lg shadow-sm">
            <h2 class="font-bold text-lg">Pizza Tradicional (Escolha 2)</h2>
            <p class="text-primary font-bold text-xl">R$ 39,90</p>
            <button onclick="openPizzaModal()" class="mt-3 w-full bg-primary text-white py-2 rounded-md font-bold">Montar minha Pizza</button>
        </div>
    </main>

    <!-- Modal de Sabores -->
    <div id="pizzaModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-lg">
            <h2 class="text-lg font-bold mb-4">Escolha 2 sabores:</h2>
            <div id="saboresList" class="max-h-60 overflow-y-auto mb-4 border p-2"></div>
            <button onclick="confirmarPizza()" class="w-full bg-primary text-white py-2 rounded font-bold">Adicionar ao Carrinho</button>
        </div>
    </div>

    <!-- Carrinho e Checkout -->
    <div id="checkoutArea" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto p-4">
        <button onclick="toggleCheckout()" class="text-lg font-bold mb-4">← Voltar</button>
        <h2 class="text-xl font-bold mb-4">Seu Pedido</h2>
        <div id="resumoPedido" class="mb-6 text-gray-700 border-b pb-4"></div>
        
        <h3 class="font-bold mb-2">Dados de Entrega:</h3>
        <input type="text" id="nome" placeholder="Seu Nome" class="w-full border p-2 mb-2 rounded">
        <input type="text" id="endereco" placeholder="Endereço (Rua, Número, Bairro)" class="w-full border p-2 mb-4 rounded">
        
        <h3 class="font-bold mb-2">Forma de Pagamento:</h3>
        <select id="pagamento" class="w-full border p-2 mb-6 rounded">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Pix">Pix</option>
            <option value="Cartão Débito">Cartão Débito</option>
            <option value="Cartão Crédito">Cartão Crédito</option>
        </select>

        <button onclick="enviarPedido()" class="w-full bg-primary text-white py-4 rounded-lg font-bold text-lg">Enviar Pedido por WhatsApp</button>
    </div>

    <!-- Botão Flutuante -->
    <button id="btnVerCarrinho" onclick="toggleCheckout()" class="hidden fixed bottom-4 right-4 bg-primary text-white px-6 py-3 rounded-full shadow-lg font-bold">
        Ver Carrinho (R$ 39,90)
    </button>

    <script>
        const saboresDisponiveis = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Quatro Queijos", "Pepperoni", "Baiana", "Milho c/ Bacon", "Atum"];
        let selecaoAtual = [];
        let pedidoFinal = null;

        function openPizzaModal() {
            let html = saboresDisponiveis.map(s => `<label class="block py-1"><input type="checkbox" value="${s}" onchange="selecionar(this)"> ${s}</label>`).join('');
            document.getElementById('saboresList').innerHTML = html;
            document.getElementById('pizzaModal').classList.remove('hidden');
        }

        function selecionar(cb) {
            if(cb.checked) { if(selecaoAtual.length < 2) selecaoAtual.push(cb.value); else cb.checked = false; }
            else { selecaoAtual = selecaoAtual.filter(s => s !== cb.value); }
        }

        function confirmarPizza() {
            if(selecaoAtual.length !== 2) return alert("Selecione exatamente 2 sabores");
            pedidoFinal = selecaoAtual.join(' + ');
            document.getElementById('resumoPedido').innerHTML = `<p><strong>Pizza:</strong> ${pedidoFinal}</p><p><strong>Valor:</strong> R$ 39,90</p>`;
            document.getElementById('pizzaModal').classList.add('hidden');
            document.getElementById('btnVerCarrinho').classList.remove('hidden');
        }

        function toggleCheckout() { document.getElementById('checkoutArea').classList.toggle('hidden'); }

        function enviarPedido() {
            const nome = document.getElementById('nome').value;
            const end = document.getElementById('endereco').value;
            const pag = document.getElementById('pagamento').value;
            if(!nome || !end) return alert("Preencha nome e endereço!");

            const msg = `*NOVO PEDIDO*%0A%0A*Item:* Pizza: ${pedidoFinal}%0A*Valor:* R$ 39,90%0A%0A*Cliente:* ${nome}%0A*Endereço:* ${end}%0A*Pagamento:* ${pag}`;
            window.location.href = `https://wa.me/55799920001038?text=${msg}`;
        }
    </script>
</body>
</html>
