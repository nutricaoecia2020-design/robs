<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #f47527; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <!-- Header -->
    <header class="bg-white p-4 shadow-md text-center border-b-4 border-primary">
        <h1 class="text-2xl font-bold">Cantinho do Robs</h1>
    </header>

    <!-- Área de Identificação (Simulando "Novo Cliente") -->
    <div id="cadastroArea" class="max-w-md mx-auto p-4">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-4">Identifique-se</h2>
            <input type="text" id="userName" placeholder="Nome Completo" class="w-full border p-3 mb-2 rounded-lg">
            <input type="tel" id="userTel" placeholder="WhatsApp (79) 9..." class="w-full border p-3 mb-4 rounded-lg">
            <button onclick="salvarCliente()" class="w-full bg-primary text-white py-3 rounded-lg font-bold">Continuar</button>
        </div>
    </div>

    <!-- Cardápio (Visível apenas após cadastro) -->
    <main id="mainContent" class="hidden max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h2 class="font-bold text-lg">Pizza Tradicional (Escolha 2)</h2>
            <p class="text-primary font-bold text-2xl">R$ 39,90</p>
            <button onclick="openPizzaModal()" class="mt-3 w-full bg-primary text-white py-3 rounded-lg font-bold">Montar minha Pizza</button>
        </div>
    </main>

    <!-- Modal Seleção -->
    <div id="pizzaModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-xl">
            <h2 class="text-lg font-bold mb-4">Escolha 2 sabores:</h2>
            <div id="saboresList" class="max-h-60 overflow-y-auto mb-4 border rounded p-2"></div>
            <button onclick="confirmarPizza()" class="w-full bg-primary text-white py-3 rounded-lg font-bold">Adicionar à Sacola</button>
        </div>
    </div>

    <!-- Sacola (Sempre visível como card na tela) -->
    <div id="sacolaCard" class="hidden max-w-md mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border-2 border-primary">
            <h2 class="font-bold text-lg mb-2">📦 Minha Sacola</h2>
            <div id="cartItemsList" class="text-sm"></div>
            <div class="border-t mt-2 pt-2 font-bold flex justify-between">
                <span>Total:</span>
                <span>R$ <span id="totalValor">0,00</span></span>
            </div>
            <button onclick="enviarPedido()" class="mt-4 w-full bg-green-600 text-white py-3 rounded-lg font-bold">Finalizar no WhatsApp</button>
        </div>
    </div>

    <script>
        let cart = [], selecao = [], cliente = {};
        const sabores = ["Calabresa", "Mussarela", "Frango c/ Catupiry", "Portuguesa", "Marguerita", "Quatro Queijos", "Pepperoni", "Baiana", "Milho c/ Bacon", "Atum"];

        function salvarCliente() {
            cliente.nome = document.getElementById('userName').value;
            cliente.tel = document.getElementById('userTel').value;
            if(!cliente.nome || !cliente.tel) return alert("Preencha seus dados!");
            document.getElementById('cadastroArea').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('sacolaCard').classList.remove('hidden');
        }

        function openPizzaModal() {
            let html = sabores.map(s => `<label class="flex items-center gap-2 py-1"><input type="checkbox" value="${s}" onchange="selecionar(this)"> ${s}</label>`).join('');
            document.getElementById('saboresList').innerHTML = html;
            document.getElementById('pizzaModal').classList.remove('hidden');
        }

        function selecionar(cb) {
            if(cb.checked) { if(selecao.length < 2) selecao.push(cb.value); else cb.checked = false; }
            else { selecao = selecao.filter(s => s !== cb.value); }
        }

        function confirmarPizza() {
            if(selecao.length !== 2) return alert("Escolha 2 sabores!");
            cart.push({item: `Pizza: ${selecao.join(' + ')}`, valor: 39.90});
            document.getElementById('cartItemsList').innerHTML = cart.map(c => `<div>${c.item} - R$ 39,90</div>`).join('');
            document.getElementById('totalValor').innerText = (cart.length * 39.90).toFixed(2).replace('.', ',');
            document.getElementById('pizzaModal').classList.add('hidden');
            selecao = [];
        }

        function enviarPedido() {
            const msg = `*Novo Pedido - ${cliente.nome}*%0A%0A*Itens:* ${cart.map(i => i.item).join(', ')}%0A*Tel:* ${cliente.tel}`;
            window.location.href = `https://wa.me/55799920001038?text=${msg}`;
        }
    </script>
</body>
</html>
