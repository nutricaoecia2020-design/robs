<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Pedidos | Cantinho do Robs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-card { background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-orange-600">Cantinho do Robs</h1>
            <div class="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-sm font-semibold">Loja Digital</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Coluna Esquerda: Catálogo -->
        <div class="md:col-span-2 space-y-4">
            <h2 class="text-lg font-semibold text-slate-700">Nosso Cardápio</h2>
            <div class="gradient-card p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="font-bold text-lg">Pizza Tradicional</h3>
                <p class="text-slate-500 text-sm mb-3">Escolha 2 sabores tradicionais.</p>
                <div class="flex justify-between items-center">
                    <span class="text-xl font-bold text-orange-600">R$ 39,90</span>
                    <button onclick="adicionarItem()" class="bg-slate-900 text-white px-4 py-2 rounded-lg font-semibold hover:bg-orange-600 transition">Adicionar</button>
                </div>
            </div>
        </div>

        <!-- Coluna Direita: Dashboard da Sacola (Fixa) -->
        <div class="md:col-span-1">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xl sticky top-24">
                <h3 class="font-bold mb-4 flex items-center gap-2">📊 Resumo do Pedido</h3>
                <div id="listaItens" class="text-sm space-y-2 mb-4">
                    <p class="text-slate-400">Sacola vazia...</p>
                </div>
                <div class="border-t pt-4 space-y-3">
                    <input type="text" id="nome" placeholder="Seu Nome" class="w-full p-2 border rounded-lg text-sm">
                    <input type="text" id="endereco" placeholder="Endereço de entrega" class="w-full p-2 border rounded-lg text-sm">
                    <button onclick="finalizarPedido()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-orange-700 transition">Enviar Pedido (WhatsApp)</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let cart = [];
        function adicionarItem() {
            cart.push({ nome: "Pizza Tradicional", preco: 39.90 });
            document.getElementById('listaItens').innerHTML = `
                <div class="flex justify-between text-slate-700 font-medium">
                    <span>1x Pizza</span>
                    <span>R$ 39,90</span>
                </div>`;
        }

        function finalizarPedido() {
            const nome = document.getElementById('nome').value;
            const end = document.getElementById('endereco').value;
            if(!nome || !end) return alert("Preencha Nome e Endereço!");
            
            const msg = `*Novo Pedido - Dashboard*%0ACliente: ${nome}%0AEndereço: ${end}%0AItens: 1x Pizza Tradicional%0ATotal: R$ 39,90`;
            window.open(`https://wa.me/55799920001038?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
