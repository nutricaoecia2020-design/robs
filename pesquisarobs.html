<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .forum-container {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
        }
        .forum-header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-group textarea {
            resize: vertical;
            height: 100px;
        }
        .btn-enviar {
            background-color: #0056b3;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn-enviar:hover {
            background-color: #004085;
        }
        .comments-section {
            margin-top: 25px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        .comment-box {
            background-color: #f9f9f9;
            padding: 10px;
            border-left: 4px solid #0056b3;
            margin-bottom: 10px;
            border-radius: 0 4px 4px 0;
        }
        .comment-box h4 {
            margin: 0 0 5px 0;
            color: #333;
        }
        .comment-box h5 {
            margin: 0 0 8px 0;
            color: #666;
            font-size: 0.9em;
            font-weight: normal;
        }
        .comment-box p {
            margin: 0;
            color: #444;
        }
        .no-comments {
            color: #777;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="forum-container">
    <div class="forum-header">Pesquisa de Satisfação</div>
    
    <form id="commentForm">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label for="assunto">Assunto:</label>
            <input type="text" id="assunto" required placeholder="Ex: Excelente pizza!">
        </div>
        <div class="form-group">
            <label for="mensagem">Comentário:</label>
            <textarea id="mensagem" required placeholder="Deixe sua opinião aqui..."></textarea>
        </div>
        <button type="submit" class="btn-enviar">Enviar</button>
    </form>

    <div class="comments-section">
        <h3>Comentários dos Clientes</h3>
        <div id="commentsContainer">
            <p class="no-comments" id="noCommentsMessage">Nenhum comentário encontrado.</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('commentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Impede a página de recarregar

        // Captura os valores digitados
        const nome = document.getElementById('nome').value;
        const assunto = document.getElementById('assunto').value;
        const mensagem = document.getElementById('mensagem').value;

        // Oculta a mensagem de "Nenhum comentário" se for o primeiro
        const noCommentsMsg = document.getElementById('noCommentsMessage');
        if (noCommentsMsg) {
            noCommentsMsg.style.display = 'none';
        }

        // Cria a estrutura do novo comentário
        const commentBox = document.createElement('div');
        commentBox.classList.add('comment-box');

        const commentTitle = document.createElement('h4');
        commentTitle.textContent = assunto;

        const commentAuthor = document.createElement('h5');
        commentAuthor.textContent = `Por: ${nome}`;

        const commentText = document.createElement('p');
        commentText.textContent = mensagem;

        // Monta o bloco do comentário
        commentBox.appendChild(commentTitle);
        commentBox.appendChild(commentAuthor);
        commentBox.appendChild(commentText);

        // Insere o novo comentário no topo da lista
        const container = document.getElementById('commentsContainer');
        container.insertBefore(commentBox, container.firstChild);

        // Limpa o formulário para o próximo envio
        document.getElementById('commentForm').reset();
    });
</script>

</body>
</html>
