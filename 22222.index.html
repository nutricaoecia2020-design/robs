<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANTINHO DO ROBS</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; }
        .app { max-width: 430px; margin: auto; background: white; min-height: 100vh; padding-bottom: 80px; }
        .topo { background: #d62828; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Status Loja */
        .status { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .ponto { width: 10px; height: 10px; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .card { padding: 20px; border-bottom: 1px solid #eee; }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Carrinho Flutuante */
        #carrinho-flutuante { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 15px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="app">
    <div class="topo">
        <h2>🍕 CANTINHO DO ROBS</h2>
        <div id="status-loja" class="status"></div>
    </div>

    <div class="card">
        <h3>Cardápio de Pizzas (R$ 49,90)</h3>
        <p><small>Escolha 2 sabores:</small></p>
        <select id="sabor1">
            <option>Calabresa (Molho, mussarela, calabresa, cebola)</option>
            <option>Portuguesa (Mussarela, presunto, ovo, cebola)</option>
            <option>Frango c/ Catupiry (Frango desfiado, catupiry)</option>
            <option>Quatro Queijos (Mussarela, provolone, parmesão, gorgonzola)</option>
        </select>
        <select id="sabor2">
            <option>Calabresa</option>
            <option>Portuguesa</option>
            <option>Frango c/ Catupiry</option>
            <option>Quatro Queijos</option>
        </select>
        <button class="btn" style="background:#ff7b00;" onclick="addItem('Pizza Tradicional')">Adicionar Pizza</button>
    </div>

    <div class="card">
        <h3>Bebida</h3>
        <p>Guaraná 1L - R$ 8,90</p>
        <button class="btn" style="background:#ff7b00;" onclick="addItem('Guaraná 1L')">Adicionar Guaraná</button>
    </div>

    <!-- Finalização -->
    <div class="card">
        <h3>Finalizar Pedido</h3>
        <input type="text" id="nome" placeholder="Seu Nome">
        <input type="text" id="contato" placeholder="Seu Telefone/Contato">
        <input type="text" id="endereco" placeholder="Endereço">
        <select id="bairro" onchange="calcularEntrega()">
            <option value="0">Bairro Luzia ou Ponto Novo (Grátis)</option>
            <option value="7.00">Demais bairros (Entrega R$ 7,00)</option>
        </select>
        <select id="pagamento">
            <option>PIX</option>
            <option>Cartão (Máquina)</option>
        </select>
        <button class="btn" style="background:#25D366;" onclick="enviarPedido()">Enviar Pedido p/ WhatsApp</button>
    </div>
</div>

<div id="carrinho-flutuante" onclick="alert(itens.join('\n'))">🛒</div>

<script>
    let itens = [];
    let taxa = 0;

    // Status da loja
    function verificarHorario() {
        const h = new Date().getHours();
        const status = document.getElementById('status-loja');
        if(h >= 18 && h < 22.5) {
            status.innerHTML = '<div class="ponto" style="background:green"></div> Loja Aberta';
        } else {
            status.innerHTML = '<div class="ponto" style="background:yellow"></div> Agendamento';
        }
    }

    function addItem(nome) {
        itens.push(nome);
        alert(nome + " adicionado!");
    }

    function calcularEntrega() {
        taxa = parseFloat(document.getElementById('bairro').value);
    }

    function enviarPedido() {
        let msg = `Pedido: ${itens.join(', ')}%0ATaxa: R$ ${taxa.toFixed(2)}%0ANome: ${document.getElementById('nome').value}%0AContato: ${document.getElementById('contato').value}%0AEndereço: ${document.getElementById('endereco').value}%0APagamento: ${document.getElementById('pagamento').value}`;
        window.open(`https://wa.me/5579920001038?text=${msg}`);
    }

    verificarHorario();
</script>

</body>
</html>
