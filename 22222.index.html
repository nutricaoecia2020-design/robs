<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CANTINHO DO ROBS</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #d62828; color: white; padding: 20px; text-align: center; }
        .status { font-size: 14px; margin-top: 5px; }
        .ponto { display: inline-block; width: 10px; height: 10px; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #flutuante { position: fixed; bottom: 20px; right: 20px; background: #25D366; padding: 15px; border-radius: 20px; color: white; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #333; color: white; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <h1>CANTINHO DO ROBS</h1>
    <div id="status" class="status"></div>
</header>

<div class="container" id="lista-produtos">
    <!-- As Pizzas aparecerão aqui -->
</div>

<div id="flutuante" onclick="abrirCarrinho()">🛒 Ver Carrinho</div>

<div id="modal-carrinho" class="modal">
    <button onclick="fecharCarrinho()">Fechar X</button>
    <h2>Seu Pedido</h2>
    <div id="itens-lista"></div>
    <hr>
    <input type="text" id="nome" placeholder="Seu Nome" style="width:100%; padding:10px; margin-top:10px;">
    <input type="text" id="contato" placeholder="Seu Contato" style="width:100%; padding:10px;">
    <input type="text" id="endereco" placeholder="Endereço" style="width:100%; padding:10px;">
    <select id="bairro" style="width:100%; padding:10px;">
        <option value="0">Luzia ou Ponto Novo (Grátis)</option>
        <option value="7.00">Demais bairros (Entrega R$ 7,00)</option>
    </select>
    <select id="pagamento" style="width:100%; padding:10px;">
        <option>PIX</option>
        <option>Cartão (Máquina)</option>
    </select>
    <h3 id="total">Total: R$ 0,00</h3>
    <button class="btn" style="background:#25D366;" onclick="enviarZap()">Enviar Pedido p/ WhatsApp</button>
</div>

<script>
    const sabores = [
        {nome: "Calabresa", desc: "Mussarela, calabresa, cebola"},
        {nome: "Portuguesa", desc: "Mussarela, presunto, ovo, cebola"},
        {nome: "Frango c/ Catupiry", desc: "Frango desfiado, catupiry"},
        {nome: "Quatro Queijos", desc: "Mussarela, parmesão, provolone, gorgonzola"}
    ];
    let carrinho = [];

    // Status da Loja
    const h = new Date().getHours();
    document.getElementById('status').innerHTML = (h >= 18 && h < 23) ? 
        '<span class="ponto" style="background:lime"></span> Aberto agora' : 
        '<span class="ponto" style="background:yellow"></span> Agendamento';

    // Gerar Cardápio
    let html = `<h3>Pizza Tradicional (R$ 49,90)</h3>`;
    html += `<select id="s1">` + sabores.map(s => `<option>${s.nome}</option>`).join('') + `</select>`;
    html += `<select id="s2">` + sabores.map(s => `<option>${s.nome}</option>`).join('') + `</select>`;
    html += `<button class="btn" style="background:#d62828;" onclick="addPizza()">Adicionar Pizza</button>`;
    
    html += `<h3>Bebida</h3><div class="card">Guaraná 1L (R$ 8,90) <button class="btn" style="background:#ff7b00;" onclick="addBebida()">Adicionar</button></div>`;
    document.getElementById('lista-produtos').innerHTML = html;

    function addPizza() {
        let s1 = document.getElementById('s1').value;
        let s2 = document.getElementById('s2').value;
        carrinho.push({nome: `Pizza: ${s1} + ${s2}`, preco: 49.90});
        alert("Pizza adicionada!");
    }

    function addBebida() {
        carrinho.push({nome: "Guaraná 1L", preco: 8.90});
        alert("Bebida adicionada!");
    }

    function abrirCarrinho() {
        document.getElementById('modal-carrinho').style.display = 'block';
        let lista = document.getElementById('itens-lista');
        lista.innerHTML = carrinho.map((i, idx) => `<div>${i.nome} - R$ ${i.preco} <button onclick="remover(${idx})">Remover</button></div>`).join('');
    }

    function remover(idx) { carrinho.splice(idx, 1); abrirCarrinho(); }
    function fecharCarrinho() { document.getElementById('modal-carrinho').style.display = 'none'; }

    function enviarZap() {
        let msg = `Pedido: ${carrinho.map(i => i.nome).join(', ')}%0ANome: ${document.getElementById('nome').value}%0AEndereço: ${document.getElementById('endereco').value}%0APagamento: ${document.getElementById('pagamento').value}`;
        window.open(`https://wa.me/5579920001038?text=${msg}`);
    }
</script>

</body>
</html>
