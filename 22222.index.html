<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANTINHO DO ROBS</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #d62828; color: white; padding: 20px; text-align: center; }
        .status-bar { background: #d62828; color: white; padding: 5px; text-align: center; font-size: 12px; }
        .ponto { display: inline-block; width: 8px; height: 8px; background: lime; border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-add { background: #d62828; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #flutuante { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #333; color: white; padding: 20px; overflow-y: auto; }
        .total-valor { font-size: 20px; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<header><h1>CANTINHO DO ROBS</h1></header>
<div class="status-bar"><span class="ponto"></span> Aberto agora</div>

<div class="container">
    <div class="card">
        <h3>Pizza Tradicional (R$ 49,90)</h3>
        <select id="s1">
            <option value="">Selecione 1º Sabor</option>
            <option>Calabresa</option><option>Portuguesa</option><option>Mussarela</option>
            <option>Frango c/ Catupiry</option><option>Marguerita</option><option>Quatro Queijos</option>
            <option>Bacon</option><option>Atum</option><option>Carne de Sol</option>
        </select>
        <select id="s2">
            <option value="">Selecione 2º Sabor</option>
            <option>Calabresa</option><option>Portuguesa</option><option>Mussarela</option>
            <option>Frango c/ Catupiry</option><option>Marguerita</option><option>Quatro Queijos</option>
            <option>Bacon</option><option>Atum</option><option>Carne de Sol</option>
        </select>
        <button class="btn-add" onclick="addPizza()">Adicionar Pizza</button>
    </div>

    <div class="card">
        <h3>Bebida</h3>
        <p>Guaraná 1L (R$ 8,90)</p>
        <button class="btn-add" style="background:#ff7b00" onclick="addBebida()">Adicionar Guaraná</button>
    </div>
</div>

<div id="flutuante" onclick="abrirCarrinho()">🛒 Ver Carrinho</div>

<div id="modal" class="modal">
    <button onclick="document.getElementById('modal').style.display='none'">Fechar X</button>
    <h2>Seu Pedido</h2>
    <div id="itens-lista"></div>
    <input type="text" id="nome" placeholder="Seu Nome">
    <input type="text" id="contato" placeholder="Seu Contato">
    <input type="text" id="endereco" placeholder="Endereço">
    <select id="bairro" onchange="calcTotal()">
        <option value="0">Luzia ou Ponto Novo (Grátis)</option>
        <option value="7.00">Outros Bairros (Entrega R$ 7,00)</option>
    </select>
    <select id="pagamento"><option>PIX</option><option>Cartão (Máquina)</option></select>
    <div class="total-valor" id="total">Total: R$ 0,00</div>
    <button class="btn-add" style="background:#25D366" onclick="enviar()">Enviar Pedido p/ WhatsApp</button>
</div>

<script>
    let carrinho = [];
    function addPizza() {
        let s1 = document.getElementById('s1').value;
        let s2 = document.getElementById('s2').value;
        if(!s1 || !s2) return alert("Escolha os dois sabores!");
        carrinho.push({nome: `Pizza: ${s1} + ${s2}`, preco: 49.90});
        alert("Pizza adicionada!");
    }
    function addBebida() { carrinho.push({nome: "Guaraná 1L", preco: 8.90}); alert("Bebida adicionada!"); }
    
    function abrirCarrinho() {
        document.getElementById('modal').style.display = 'block';
        let html = carrinho.map((i, idx) => `<div>${i.nome} - R$ ${i.preco.toFixed(2)} <button onclick="rem(${idx})">Remover</button></div>`).join('');
        document.getElementById('itens-lista').innerHTML = html;
        calcTotal();
    }
    function rem(idx) { carrinho.splice(idx, 1); abrirCarrinho(); }
    function calcTotal() {
        let sub = carrinho.reduce((a, b) => a + b.preco, 0);
        let taxa = parseFloat(document.getElementById('bairro').value);
        document.getElementById('total').innerText = "Total: R$ " + (sub + taxa).toFixed(2);
    }
    function enviar() {
        let msg = `*Pedido:*%0A${carrinho.map(i => i.nome).join('%0A')}%0A%0ANome: ${document.getElementById('nome').value}%0AEndereço: ${document.getElementById('endereco').value}%0APagamento: ${document.getElementById('pagamento').value}`;
        window.open(`https://wa.me/5579920001038?text=${msg}`);
    }
</script>
</body>
</html>
