<script>
/* SUBSTITUIR A FUNÇÃO renderizarClientes() POR ESTA */

function renderizarClientes() {
    const tabela = document.getElementById('tabela-clientes');
    tabela.innerHTML = clientes.map(c => {
        return `<tr>
            <td>#${c.id}</td>
            <td>${c.nome}</td>
            <td>${c.telefone}</td>
            <td>${c.email || '-'}</td>
            <td>${c.endereco || '-'}</td>
            <td style="display:flex; gap:5px;">
                <button class="btn btn-primary" style="padding:4px 8px; font-size:10px;" onclick="abrirModalCliente(${c.id})">
                    <i class="fas fa-edit"></i>
                </button>

                <button class="btn btn-danger" style="padding:4px 8px; font-size:10px;" onclick="excluirCliente(${c.id})">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>`;
    }).join('');
}

/* ADICIONAR ESTA NOVA FUNÇÃO ABAIXO */

function excluirCliente(id) {
    if(confirm('Deseja excluir este cliente?')) {
        clientes = clientes.filter(c => c.id !== id);

        localStorage.setItem('robs_clientes', JSON.stringify(clientes));

        renderizarClientes();

        alert('Cliente excluído com sucesso!');
    }
}
</script><!-- ========================= -->

<script>
/* ADICIONE ESTA VARIÁVEL JUNTO DAS OUTRAS */

let compromissoEditando = null;


/* SUBSTITUIR A FUNÇÃO abrirModalCompromisso() */

function abrirModalCompromisso(editId = null) {

    const modal = document.getElementById('modal-compromisso');

    compromissoEditando = editId;

    if(editId) {

        const comp = compromissos.find(c => c.id === editId);

        if(comp) {

            document.getElementById('comp-titulo').value = comp.titulo;
            document.getElementById('comp-cliente').value = comp.cliente;
            document.getElementById('comp-data').value = comp.data;
            document.getElementById('comp-descricao').value = comp.descricao;
        }

    } else {

        document.getElementById('comp-titulo').value = '';
        document.getElementById('comp-cliente').value = '';
        document.getElementById('comp-data').value = '';
        document.getElementById('comp-descricao').value = '';
    }

    modal.style.display = 'flex';
}


/* SUBSTITUIR A FUNÇÃO salvarCompromisso() */

function salvarCompromisso() {

    const titulo = document.getElementById('comp-titulo').value;
    const cliente = document.getElementById('comp-cliente').value;
    const data = document.getElementById('comp-data').value;
    const descricao = document.getElementById('comp-descricao').value;

    if(titulo && data) {

        if(compromissoEditando) {

            const index = compromissos.findIndex(c => c.id === compromissoEditando);

            if(index !== -1) {

                compromissos[index] = {
                    ...compromissos[index],
                    titulo,
                    cliente,
                    data,
                    descricao
                };
            }

        } else {

            const novoId = compromissos.length
                ? Math.max(...compromissos.map(c => c.id)) + 1
                : 1;

            const compromisso = {
                id: novoId,
                titulo,
                cliente,
                data,
                descricao
            };

            compromissos.push(compromisso);
        }

        localStorage.setItem(
            'robs_compromissos',
            JSON.stringify(compromissos)
        );

        compromissoEditando = null;

        fecharModalCompromisso();

        renderizarAgenda();

        alert('Compromisso salvo com sucesso!');

    } else {

        alert('Título e data são obrigatórios!');
    }
}


/* SUBSTITUIR A FUNÇÃO fecharModalCompromisso() */

function fecharModalCompromisso() {

    compromissoEditando = null;

    document.getElementById('modal-compromisso').style.display = 'none';
}
</script><!-- ========================= -->

<script>
/* ADICIONE ESTA VARIÁVEL */

let clienteEditando = null;


/* SUBSTITUIR abrirModalCliente() */

function abrirModalCliente(editId = null) {

    const modal = document.getElementById('modal-cliente');
    const titulo = document.getElementById('modal-cliente-titulo');

    clienteEditando = editId;

    if(editId) {

        const cli = clientes.find(c => c.id === editId);

        if(cli) {

            titulo.innerText = 'Editar Cliente';

            document.getElementById('cli-nome').value = cli.nome;
            document.getElementById('cli-telefone').value = cli.telefone;
            document.getElementById('cli-email').value = cli.email;
            document.getElementById('cli-endereco').value = cli.endereco;
        }

    } else {

        titulo.innerText = 'Novo Cliente';

        document.getElementById('cli-nome').value = '';
        document.getElementById('cli-telefone').value = '';
        document.getElementById('cli-email').value = '';
        document.getElementById('cli-endereco').value = '';
    }

    modal.style.display = 'flex';
}


/* SUBSTITUIR salvarCliente() */

function salvarCliente() {

    const nome = document.getElementById('cli-nome').value;
    const telefone = document.getElementById('cli-telefone').value;
    const email = document.getElementById('cli-email').value;
    const endereco = document.getElementById('cli-endereco').value;

    if(nome && telefone) {

        if(clienteEditando) {

            const index = clientes.findIndex(c => c.id === clienteEditando);

            if(index !== -1) {

                clientes[index] = {
                    ...clientes[index],
                    nome,
                    telefone,
                    email,
                    endereco
                };
            }

        } else {

            const novoId = clientes.length
                ? Math.max(...clientes.map(c => c.id)) + 1
                : 1;

            const cliente = {
                id: novoId,
                nome,
                telefone,
                email,
                endereco
            };

            clientes.push(cliente);
        }

        localStorage.setItem(
            'robs_clientes',
            JSON.stringify(clientes)
        );

        clienteEditando = null;

        fecharModalCliente();

        renderizarClientes();

        alert('Cliente salvo com sucesso!');

    } else {

        alert('Nome e telefone são obrigatórios!');
    }
}


/* SUBSTITUIR fecharModalCliente() */

function fecharModalCliente() {

    clienteEditando = null;

    document.getElementById('modal-cliente').style.display = 'none';
}
</script>
