<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cantinho do Robs - Sistema PDV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg-card:#131825;--bg-hover:#1a2035;--bg-input:#0d1220;--border:#1e2740;--border-light:#2a3550;--text:#e8eaf0;--text-dim:#8892a8;--text-muted:#5a6378;--accent:#e8850c;--accent-hover:#d47600;--accent-soft:rgba(232,133,12,.12);--green:#10b981;--green-soft:rgba(16,185,129,.12);--red:#ef4444;--red-soft:rgba(239,68,68,.12);--blue:#3b82f6;--blue-soft:rgba(59,130,246,.12);--purple:#8b5cf6;--purple-soft:rgba(139,92,246,.12);--yellow:#f59e0b;--yellow-soft:rgba(245,158,11,.12);--radius:10px;--radius-sm:6px;--radius-lg:16px}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:var(--text);background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;outline:none;transition:all .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select{cursor:pointer}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-logo{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sidebar-title{font-size:15px;font-weight:700;color:var(--text)}
.sidebar-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 8px}
.nav-section{margin-bottom:16px}
.nav-section-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text-dim);transition:all .2s;cursor:pointer;margin-bottom:2px}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav-item i{width:18px;text-align:center;font-size:14px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);text-align:center}
.sidebar-footer p{font-size:10px;color:var(--text-muted);line-height:1.5}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.page-title{font-size:18px;font-weight:700}
.clock{font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:1px}
.date-display{font-size:12px;color:var(--text-dim);text-align:right}
.user-info{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg-hover);border-radius:var(--radius-sm)}
.user-avatar{width:32px;height:32px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--bg)}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.green::before{background:var(--green)}.kpi.red::before{background:var(--red)}.kpi.blue::before{background:var(--blue)}.kpi.purple::before{background:var(--purple)}.kpi.yellow::before{background:var(--yellow)}
.kpi-icon{width:44px;height:44px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.kpi.green .kpi-icon{background:var(--green-soft);color:var(--green)}.kpi.red .kpi-icon{background:var(--red-soft);color:var(--red)}.kpi.blue .kpi-icon{background:var(--blue-soft);color:var(--blue)}.kpi.purple .kpi-icon{background:var(--purple-soft);color:var(--purple)}.kpi.yellow .kpi-icon{background:var(--yellow-soft);color:var(--yellow)}
.kpi-label{font-size:12px;color:var(--text-dim);margin-bottom:6px}.kpi-value{font-size:28px;font-weight:800}
.btn{padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:var(--bg)}.btn-primary:hover{background:var(--accent-hover)}
.btn-success{background:var(--green);color:#fff}.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--bg-hover);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:6px 12px;font-size:12px}.btn-lg{padding:14px 28px;font-size:15px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--bg-input)}
td{padding:12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:hover{background:var(--bg-hover)}
.status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.status.success{background:var(--green-soft);color:var(--green)}.status.danger{background:var(--red-soft);color:var(--red)}.status.warning{background:var(--yellow-soft);color:var(--yellow)}.status.info{background:var(--blue-soft);color:var(--blue)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);cursor:pointer;transition:all .2s}
.modal-close:hover{background:var(--bg-hover);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pdv-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;height:calc(100vh - 104px)}
.pdv-products{overflow-y:auto}
.pdv-categories{display:flex;gap:8px;margin-bottom:16px}
.cat-btn{padding:8px 16px;background:var(--bg-hover);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text)}
.cat-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.product-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.product-card:active{transform:scale(.96)}
.product-emoji{font-size:48px;margin-bottom:10px;display:block}
.product-name{font-size:12px;font-weight:600;margin-bottom:6px}
.product-price{font-size:14px;font-weight:800;color:var(--accent)}
.cart{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;height:100%}
.cart-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.cart-count{background:var(--accent);color:var(--bg);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.cart-items{flex:1;overflow-y:auto;padding:12px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-hover);border-radius:var(--radius-sm);margin-bottom:8px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:11px;color:var(--text-dim);margin-top:2px}
.cart-item-qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:all .2s;cursor:pointer}
.qty-btn:hover{background:var(--accent);color:var(--bg)}
.cart-item-total{font-size:13px;font-weight:700;color:var(--accent);min-width:60px;text-align:right}
.cart-footer{padding:16px;border-top:1px solid var(--border)}
.cart-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.cart-row.total{font-size:18px;font-weight:800;color:var(--accent);border-top:1px solid var(--border);padding-top:12px;margin-top:8px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media print{.sidebar,.topbar{display:none!important}.main{margin:0}.content{padding:0}#reportArea .no-print{display:none!important}#reportArea{background:#fff;padding:20px}}#reportArea table{width:100%;border-collapse:collapse;margin-top:16px;background:#fff}#reportArea th,#reportArea td{border:1px solid #ddd;padding:8px;text-align:left}#reportArea th{background:#131825;color:#fff}#reportArea h3{color:#e8850c;margin-bottom:12px}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="sidebar-header">
<div class="sidebar-logo">🍕</div>
<div><div class="sidebar-title">Cantinho do Robs</div><div class="sidebar-sub">Sistema PDV v2.0</div></div>
</div>
<nav class="sidebar-nav">
<div class="nav-section"><div class="nav-section-title">Principal</div>

</div>

<div style="display:flex;align-items:center;gap:20px">
<div><div class="clock" id="clock">00:00:00</div><div class="date-display" id="dateDisplay">--</div></div>
<div class="user-info"><div class="user-avatar">A</div><div><div style="font-size:12px;font-weight:600">Admin</div><div style="font-size:10px;color:var(--text-dim)">Gerente</div></div></div>
</div>
</div>
<div class="content">

<div class="page" id="page-cash"></div>
<div class="page" id="page-payable"></div>
<div class="page" id="page-receivable"></div>
<div class="page" id="page-financial"></div>

</div>
</div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<script>
const fmt=v=>'R$ '+v.toFixed(2).replace('.',',');
const produtos=[
{id:1,nome:'Mussarela',cat:'pizzas',emoji:'🧀',preco:49.90},
{id:2,nome:'Marguerita',cat:'pizzas',emoji:'🌿',preco:49.90},
{id:3,nome:'Alho',cat:'pizzas',emoji:'🧄',preco:49.90},
{id:4,nome:'Brócolis com Alho',cat:'pizzas',emoji:'🥦',preco:49.90},
{id:5,nome:'Frango com Brócolis',cat:'pizzas',emoji:'🍗',preco:49.90},
{id:6,nome:'Brócolis c/ 3 Queijos',cat:'pizzas',emoji:'🫕',preco:49.90},
{id:7,nome:'Frango com Catupiry',cat:'pizzas',emoji:'🍗',preco:49.90},
{id:8,nome:'Frango 3 Queijos',cat:'pizzas',emoji:'🧀',preco:49.90},
{id:9,nome:'Moda da Casa',cat:'pizzas',emoji:'🏠',preco:49.90},
{id:10,nome:'Carijó',cat:'pizzas',emoji:'🌽',preco:49.90},
{id:11,nome:'Francabon',cat:'pizzas',emoji:'🥓',preco:49.90},
{id:12,nome:'Bacon',cat:'pizzas',emoji:'🥓',preco:49.90},
{id:13,nome:'Quatro Queijos',cat:'pizzas',emoji:'🫕',preco:49.90},
{id:14,nome:'Peito de Peru',cat:'pizzas',emoji:'🦃',preco:49.90},
{id:15,nome:'Francesa',cat:'pizzas',emoji:'🇫🇷',preco:49.90},
{id:16,nome:'Calabresa',cat:'pizzas',emoji:'🌶️',preco:49.90},
{id:17,nome:'Calabresa Paulistana',cat:'pizzas',emoji:'🌶️',preco:49.90},
{id:18,nome:'Calabresa c/ Requeijão',cat:'pizzas',emoji:'🌶️',preco:49.90},
{id:19,nome:'Paulista',cat:'pizzas',emoji:'🏙️',preco:49.90},
{id:20,nome:'Vegetariana',cat:'pizzas',emoji:'🥗',preco:49.90},
{id:21,nome:'Presunto e Queijo',cat:'pizzas',emoji:'🥩',preco:49.90},
{id:22,nome:'Bauru',cat:'pizzas',emoji:'🥪',preco:49.90},
{id:23,nome:'Portuguesa',cat:'pizzas',emoji:'🥚',preco:49.90},
{id:24,nome:'Pizzaiolo',cat:'pizzas',emoji:'🍕',preco:49.90},
{id:25,nome:'Americana',cat:'pizzas',emoji:'🍳',preco:49.90},
{id:26,nome:'Ciciliana',cat:'pizzas',emoji:'🍄',preco:49.90},
{id:27,nome:'Brasileira',cat:'pizzas',emoji:'🇧🇷',preco:49.90},
{id:28,nome:'Milho Verde',cat:'pizzas',emoji:'🌽',preco:49.90},
{id:29,nome:'Guaraná 1 Litro',cat:'bebidas',emoji:'🥤',preco:9.00}
];
let cart=[],currentCat='all';
let sales=[],customers=[],cashMovements=[],payableBills=[],receivableBills=[],financials=[],stock=[],refunds=[];
try{
sales=JSON.parse(localStorage.getItem('pdv_sales')||'[]');
customers=JSON.parse(localStorage.getItem('pdv_customers')||'[]');
cashMovements=JSON.parse(localStorage.getItem('pdv_cash')||'[]');
payableBills=JSON.parse(localStorage.getItem('pdv_payable')||'[]');
receivableBills=JSON.parse(localStorage.getItem('pdv_receivable')||'[]');
financials=JSON.parse(localStorage.getItem('pdv_financials')||'[]');
stock=JSON.parse(localStorage.getItem('pdv_stock')||'[]');
refunds=JSON.parse(localStorage.getItem('pdv_refunds')||'[]');
}catch(e){}
if(!stock.length)stock=produtos.map(p=>({id:p.id,name:p.nome,category:p.cat,qty:10,min:2,price:p.preco}));
function saveData(){try{
localStorage.setItem('pdv_sales',JSON.stringify(sales));
localStorage.setItem('pdv_customers',JSON.stringify(customers));
localStorage.setItem('pdv_cash',JSON.stringify(cashMovements));
localStorage.setItem('pdv_payable',JSON.stringify(payableBills));
localStorage.setItem('pdv_receivable',JSON.stringify(receivableBills));
localStorage.setItem('pdv_financials',JSON.stringify(financials));
localStorage.setItem('pdv_stock',JSON.stringify(stock));
localStorage.setItem('pdv_refunds',JSON.stringify(refunds));
}catch(e){}}
function updateClock(){const now=new Date();document.getElementById('clock').textContent=now.toLocaleTimeString('pt-BR');document.getElementById('dateDisplay').textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
setInterval(updateClock,1000);updateClock();
document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{
document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
item.classList.add('active');
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('page-'+item.dataset.page).classList.add('active');
document.getElementById('pageTitle').textContent=item.textContent.trim();
refreshPage(item.dataset.page);
});});
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.add('open');}

// DASHBOARD
function refreshDashboard(){
const today=new Date().toDateString();
const todaySales=sales.filter(s=>new Date(s.date).toDateString()===today);
const totalSales=todaySales.reduce((s,v)=>s+v.total,0);
const totalItems=todaySales.reduce((s,v)=>s+v.items.reduce((a,b)=>a+b.qty,0),0);
const ticket=todaySales.length?totalSales/todaySales.length:0;
const payments={};todaySales.forEach(s=>{payments[s.payment]=(payments[s.payment]||0)+s.total;});
const labels={dinheiro:'💵 Dinheiro',pix:'📱 PIX',debito:'💳 Débito',credito:'💳 Crédito'};
let chartHtml='';Object.entries(payments).forEach(([k,v])=>{const pct=totalSales?(v/totalSales*100):0;chartHtml+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px"><span>'+(labels[k]||k)+'</span><span style="font-weight:700">'+fmt(v)+'</span></div><div style="background:var(--bg-hover);height:8px;border-radius:4px;overflow:hidden"><div style="background:var(--accent);height:100%;width:'+pct+'%;border-radius:4px"></div></div></div>';});
if(!chartHtml)chartHtml='<p style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px">Nenhuma venda hoje</p>';
const prodCount={};todaySales.forEach(s=>s.items.forEach(i=>{prodCount[i.nome]=(prodCount[i.nome]||0)+i.qty;}));
const topProd=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
let topHtml='';topProd.forEach(([name,qty])=>{const p=produtos.find(x=>x.nome===name);topHtml+='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-hover);border-radius:var(--radius-sm);margin-bottom:6px"><span style="font-size:24px">'+(p?p.emoji:'🍕')+'</span><div style="flex:1"><div style="font-size:13px;font-weight:600">'+name+'</div><div style="font-size:11px;color:var(--text-dim)">'+qty+' vendidos</div></div><div style="font-size:14px;font-weight:700;color:var(--accent)">'+qty+'x</div></div>';});
if(!topHtml)topHtml='<p style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px">Nenhuma venda hoje</p>';
const recent=sales.slice(-5).reverse();

// PDV
function refreshPDV(){
document.getElementById('page-pdv').innerHTML='<div class="pdv-layout"><div class="pdv-products"><div class="pdv-categories"><button class="cat-btn '+(currentCat==='all'?'active':'')+'" onclick="filterCat(\'all\')">Todas</button><button class="cat-btn '+(currentCat==='pizzas'?'active':'')+'" onclick="filterCat(\'pizzas\')">Pizzas</button><button class="cat-btn '+(currentCat==='bebidas'?'active':'')+'" onclick="filterCat(\'bebidas\')">Bebidas</button></div><div class="product-grid" id="productGrid"></div></div><div class="cart"><div class="cart-header"><div class="cart-title"><i class="fa-solid fa-basket-shopping"></i>Pedido Atual <span class="cart-count" id="cartCount">'+cart.reduce((s,i)=>s+i.qty,0)+'</span></div><button class="btn btn-sm btn-danger" onclick="clearCart()"><i class="fa-solid fa-trash"></i></button></div><div class="cart-items" id="cartItems"></div><div class="cart-footer"><div class="cart-row"><span>Subtotal</span><span id="cartSubtotal">'+fmt(cartTotal())+'</span></div><div class="cart-row total"><span>Total</span><span id="cartTotal">'+fmt(cartTotal())+'</span></div><div class="form-group" style="margin-top:12px"><input type="text" id="customerSearch" placeholder="Buscar cliente (opcional)"></div><div class="form-group"><select id="paymentMethod"><option value="dinheiro">💵 Dinheiro</option><option value="pix">📱 PIX</option><option value="debito">💳 Débito</option><option value="credito">💳 Crédito</option></select></div><button class="btn btn-primary btn-lg" style="width:100%;justify-content:center" onclick="completeSale()"><i class="fa-solid fa-check"></i>Finalizar Venda</button></div></div></div>';
renderProductGrid();renderCartItems();
}
function filterCat(c){currentCat=c;refreshPDV();}
function renderProductGrid(){const filtered=currentCat==='all'?produtos:produtos.filter(p=>p.cat===currentCat);let h='';filtered.forEach(p=>{h+='<div class="product-card" onclick="addToCart('+p.id+')"><span class="product-emoji">'+p.emoji+'</span><div class="product-name">'+p.nome+'</div><div class="product-price">'+fmt(p.preco)+'</div></div>';});document.getElementById('productGrid').innerHTML=h;}
function cartTotal(){return cart.reduce((s,i)=>s+i.preco*i.qty,0);}
function addToCart(id){const p=produtos.find(x=>x.id===id);const ex=cart.find(c=>c.id===id);if(ex)ex.qty++;else cart.push({...p,qty:1});renderCartItems();}
function renderCartItems(){const el=document.getElementById('cartItems');const cc=document.getElementById('cartCount');if(cc)cc.textContent=cart.reduce((s,i)=>s+i.qty,0);if(!cart.length){el.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--text-muted)"><i class="fa-solid fa-basket-shopping" style="font-size:48px;opacity:.2;margin-bottom:12px;display:block"></i><p>Nenhum item adicionado</p></div>';}else{let h='';cart.forEach((item,i)=>{h+='<div class="cart-item"><div style="font-size:24px;margin-right:8px">'+item.emoji+'</div><div class="cart-item-info"><div class="cart-item-name">'+item.nome+'</div><div class="cart-item-price">'+fmt(item.preco)+'</div></div><div class="cart-item-qty"><button class="qty-btn" onclick="changeQty('+i+',-1)">-</button><span style="font-weight:700;min-width:20px;text-align:center">'+item.qty+'</span><button class="qty-btn" onclick="changeQty('+i+',1)">+</button></div><div class="cart-item-total">'+fmt(item.preco*item.qty)+'</div></div>';});el.innerHTML=h;}const t=fmt(cartTotal());const st=document.getElementById('cartSubtotal');const tt=document.getElementById('cartTotal');if(st)st.textContent=t;if(tt)tt.textContent=t;}
function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);renderCartItems();}
function clearCart(){cart=[];renderCartItems();}
function completeSale(){if(!cart.length){alert('Adicione itens ao pedido');return;}const customer=document.getElementById('customerSearch')?.value||'Balcão';const payment=document.getElementById('paymentMethod')?.value||'dinheiro';const total=cartTotal();const sale={id:'V'+Date.now(),date:new Date().toISOString(),customer:customer||'Balcão',items:cart.map(c=>({...c})),total:total,payment:payment,status:'completed'};sales.push(sale);cart.forEach(item=>{const si=stock.find(s=>s.id===item.id);if(si)si.qty=Math.max(0,si.qty-item.qty);});cashMovements.push({id:'C'+Date.now(),date:new Date().toISOString(),type:'in',desc:'Venda #'+sale.id+' - '+sale.customer,value:total,method:payment});if(customer&&customer!=='Balcão'){const c=customers.find(x=>x.name===customer);if(c){c.orders++;c.total+=total;}}saveData();alert('Venda finalizada!\nID: '+sale.id+'\nTotal: '+fmt(total));cart=[];renderCartItems();}

// SALES
function refreshSales(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-receipt" style="color:var(--accent);margin-right:8px"></i>Histórico de Vendas</div><div style="display:flex;gap:8px"><button class="btn btn-sm btn-secondary" onclick="exportSalesPDF()"><i class="fa-solid fa-file-pdf"></i>Exportar PDF</button></div></div><div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>Data/Hora</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Ações</th></tr></thead><tbody>';const labels={dinheiro:'💵 Dinheiro',pix:'📱 PIX',debito:'💳 Débito',credito:'💳 Crédito'};sales.slice().reverse().forEach(s=>{const items=s.items.map(i=>i.emoji+' '+i.nome+' x'+i.qty).join('<br>');h+='<tr><td><strong>'+s.id+'</strong></td><td>'+new Date(s.date).toLocaleString('pt-BR')+'</td><td>'+s.customer+'</td><td style="font-size:12px;line-height:1.6">'+items+'</td><td><strong style="color:var(--green)">'+fmt(s.total)+'</strong></td><td>'+(labels[s.payment]||s.payment)+'</td><td><span class="status '+(s.status==='refunded'?'warning':'success')+'">'+(s.status==='refunded'?'Estornada':'Concluída')+'</span></td><td>'+(s.status!=='refunded'?'<button class="btn btn-sm btn-danger" onclick="refundSale(\''+s.id+'\')"><i class="fa-solid fa-rotate-left"></i></button>':'—')+'</td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-sales').innerHTML=h;}
function refundSale(id){const reason=prompt('Motivo do estorno:');if(!reason)return;const sale=sales.find(s=>s.id===id);if(!sale)return;sale.status='refunded';refunds.push({id:'E'+Date.now(),saleId:id,date:new Date().toISOString(),customer:sale.customer,total:sale.total,reason:reason,status:'completed'});cashMovements.push({id:'C'+Date.now(),date:new Date().toISOString(),type:'out',desc:'Estorno #'+id,value:sale.total,method:sale.payment});saveData();alert('Estorno realizado!');refreshSales();refreshDashboard();}
function exportSalesPDF(){const date=new Date().toISOString().split('T')[0];const filtered=sales.filter(s=>s.date.startsWith(date));const total=filtered.reduce((s,v)=>s+v.total,0);const w=window.open('','','width=900,height=700');let c='<!DOCTYPE html><html><head><title>Relatório de Vendas</title><style>body{font-family:Arial;padding:40px}h1{color:#e8850c}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#131825;color:#fff}</style></head><body><h1>Cantinho do Robs - Relatório de Vendas</h1><p>Data: '+new Date(date).toLocaleDateString('pt-BR')+'</p><p>Total de vendas: '+filtered.length+' | Faturamento: '+fmt(total)+'</p><table><thead><tr><th>ID</th><th>Hora</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Pagamento</th></tr></thead><tbody>';filtered.forEach(s=>{c+='<tr><td>'+s.id+'</td><td>'+new Date(s.date).toLocaleTimeString('pt-BR')+'</td><td>'+s.customer+'</td><td>'+s.items.map(i=>i.nome+' x'+i.qty).join(', ')+'</td><td>'+fmt(s.total)+'</td><td>'+s.payment+'</td></tr>';});c+='</tbody></table><h3 style="margin-top:20px">Total: '+fmt(total)+'</h3></body></html>';w.document.write(c);w.document.close();setTimeout(()=>w.print(),500);}

// CASH
function refreshCash(){const today=new Date().toDateString();const todayMov=cashMovements.filter(m=>new Date(m.date).toDateString()===today);const inV=todayMov.filter(m=>m.type==='in').reduce((s,m)=>s+m.value,0);const outV=todayMov.filter(m=>m.type==='out').reduce((s,m)=>s+m.value,0);let h='<div class="grid grid-3" style="margin-bottom:20px"><div class="kpi green"><div class="kpi-icon"><i class="fa-solid fa-money-bill-wave"></i></div><div class="kpi-label">Entradas Hoje</div><div class="kpi-value">'+fmt(inV)+'</div></div><div class="kpi red"><div class="kpi-icon"><i class="fa-solid fa-money-bill-trend-up"></i></div><div class="kpi-label">Saídas Hoje</div><div class="kpi-value">'+fmt(outV)+'</div></div><div class="kpi blue"><div class="kpi-icon"><i class="fa-solid fa-vault"></i></div><div class="kpi-label">Saldo do Caixa</div><div class="kpi-value">'+fmt(inV-outV)+'</div></div></div><div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-vault" style="color:var(--blue);margin-right:8px"></i>Movimentações</div><button class="btn btn-sm btn-primary" onclick="openCashModal()"><i class="fa-solid fa-plus"></i>Nova Movimentação</button></div><div style="overflow-x:auto"><table><thead><tr><th>Data/Hora</th><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Forma</th></tr></thead><tbody>';cashMovements.slice().reverse().forEach(m=>{const tl=m.type==='in'?'<span class="status success">Entrada</span>':'<span class="status danger">Saída</span>';const vc=m.type==='in'?'var(--green)':'var(--red)';const vs=m.type==='in'?'+':'-';h+='<tr><td>'+new Date(m.date).toLocaleString('pt-BR')+'</td><td>'+tl+'</td><td>'+m.desc+'</td><td style="color:'+vc+';font-weight:700">'+vs+' '+fmt(m.value)+'</td><td>'+(m.method||'--')+'</td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-cash').innerHTML=h;}
function openCashModal(){showModal('<div class="modal-header"><div class="modal-title">Nova Movimentação</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Tipo</label><select id="cashType"><option value="in">Entrada</option><option value="out">Saída</option></select></div><div class="form-group"><label class="form-label">Descrição</label><input type="text" id="cashDesc"></div><div class="form-group"><label class="form-label">Valor</label><input type="number" id="cashValue" step="0.01"></div><div class="form-group"><label class="form-label">Forma</label><select id="cashMethod"><option value="dinheiro">Dinheiro</option><option value="pix">PIX</option><option value="debito">Débito</option><option value="credito">Crédito</option></select></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCashMovement()">Salvar</button></div>');}
function saveCashMovement(){const type=document.getElementById('cashType').value;const desc=document.getElementById('cashDesc').value;const value=parseFloat(document.getElementById('cashValue').value);const method=document.getElementById('cashMethod').value;if(!desc||!value){alert('Preencha todos os campos');return;}cashMovements.push({id:'C'+Date.now(),date:new Date().toISOString(),type:type,desc:desc,value:value,method:method});saveData();closeModal();refreshCash();refreshDashboard();}

// PAYABLE
function refreshPayable(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-file-invoice-dollar" style="color:var(--red);margin-right:8px"></i>Contas a Pagar</div><button class="btn btn-sm btn-primary" onclick="openBillModal(\'payable\')"><i class="fa-solid fa-plus"></i>Nova Conta</button></div><div style="overflow-x:auto"><table><thead><tr><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Ações</th></tr></thead><tbody>';payableBills.slice().reverse().forEach(b=>{const st=b.paid?'<span class="status success">Pago</span>':'<span class="status danger">Pendente</span>';const act=b.paid?'':'<button class="btn btn-sm btn-success" onclick="payBill(\'payable\',\''+b.id+'\')">Pagar</button>';h+='<tr><td>'+b.desc+'</td><td>'+fmt(b.value)+'</td><td>'+new Date(b.dueDate).toLocaleDateString('pt-BR')+'</td><td>'+st+'</td><td>'+act+'</td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-payable').innerHTML=h;}

// RECEIVABLE
function refreshReceivable(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-hand-holding-dollar" style="color:var(--green);margin-right:8px"></i>Contas a Receber</div><button class="btn btn-sm btn-primary" onclick="openBillModal(\'receivable\')"><i class="fa-solid fa-plus"></i>Nova Conta</button></div><div style="overflow-x:auto"><table><thead><tr><th>Cliente</th><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Ações</th></tr></thead><tbody>';receivableBills.slice().reverse().forEach(b=>{const st=b.paid?'<span class="status success">Recebido</span>':'<span class="status warning">Pendente</span>';const act=b.paid?'':'<button class="btn btn-sm btn-success" onclick="payBill(\'receivable\',\''+b.id+'\')">Baixar</button>';h+='<tr><td>'+(b.customer||'--')+'</td><td>'+b.desc+'</td><td>'+fmt(b.value)+'</td><td>'+new Date(b.dueDate).toLocaleDateString('pt-BR')+'</td><td>'+st+'</td><td>'+act+'</td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-receivable').innerHTML=h;}
function openBillModal(type){const title=type==='payable'?'Conta a Pagar':'Conta a Receber';const custField=type==='receivable'?'<div class="form-group"><label class="form-label">Cliente</label><input type="text" id="billCustomer"></div>':'';showModal('<div class="modal-header"><div class="modal-title">'+title+'</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body">'+custField+'<div class="form-group"><label class="form-label">Descrição</label><input type="text" id="billDesc"></div><div class="form-group"><label class="form-label">Valor</label><input type="number" id="billValue" step="0.01"></div><div class="form-group"><label class="form-label">Vencimento</label><input type="date" id="billDueDate"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveBill(\''+type+'\')">Salvar</button></div>');}
function saveBill(type){const desc=document.getElementById('billDesc').value;const value=parseFloat(document.getElementById('billValue').value);const dueDate=document.getElementById('billDueDate').value;const customer=type==='receivable'?(document.getElementById('billCustomer')?.value||''):'';if(!desc||!value||!dueDate){alert('Preencha todos os campos');return;}const bill={id:'B'+Date.now(),desc:desc,value:value,dueDate:dueDate,customer:customer,paid:false};if(type==='payable')payableBills.push(bill);else receivableBills.push(bill);saveData();closeModal();if(type==='payable')refreshPayable();else refreshReceivable();}
function payBill(type,id){const bills=type==='payable'?payableBills:receivableBills;const bill=bills.find(b=>b.id===id);if(!bill)return;bill.paid=true;cashMovements.push({id:'C'+Date.now(),date:new Date().toISOString(),type:type==='receivable'?'in':'out',desc:(type==='receivable'?'Recebimento: ':'Pagamento: ')+bill.desc,value:bill.value,method:'dinheiro'});saveData();if(type==='payable')refreshPayable();else refreshReceivable();refreshCash();refreshDashboard();}

// FINANCIAL
function refreshFinancial(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-scale-balanced" style="color:var(--purple);margin-right:8px"></i>Entradas e Saídas</div><button class="btn btn-sm btn-primary" onclick="openFinancialModal()"><i class="fa-solid fa-plus"></i>Nova Movimentação</button></div><div style="overflow-x:auto"><table><thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th>Ações</th></tr></thead><tbody>';financials.slice().reverse().forEach(f=>{const tl=f.type==='in'?'<span class="status success">Entrada</span>':'<span class="status danger">Saída</span>';const vc=f.type==='in'?'var(--green)':'var(--red)';const vs=f.type==='in'?'+':'-';h+='<tr><td>'+new Date(f.date).toLocaleDateString('pt-BR')+'</td><td>'+tl+'</td><td>'+f.category+'</td><td>'+f.desc+'</td><td style="color:'+vc+';font-weight:700">'+vs+' '+fmt(f.value)+'</td><td><button class="btn btn-sm btn-danger" onclick="deleteFinancial(\''+f.id+'\')"><i class="fa-solid fa-trash"></i></button></td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-financial').innerHTML=h;}
function openFinancialModal(){showModal('<div class="modal-header"><div class="modal-title">Nova Movimentação</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Tipo</label><select id="finType"><option value="in">Entrada</option><option value="out">Saída</option></select></div><div class="form-group"><label class="form-label">Categoria</label><input type="text" id="finCategory" placeholder="Ex: Fornecedores, Salários..."></div><div class="form-group"><label class="form-label">Descrição</label><input type="text" id="finDesc"></div><div class="form-group"><label class="form-label">Valor</label><input type="number" id="finValue" step="0.01"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveFinancial()">Salvar</button></div>');}
function saveFinancial(){const type=document.getElementById('finType').value;const category=document.getElementById('finCategory').value;const desc=document.getElementById('finDesc').value;const value=parseFloat(document.getElementById('finValue').value);if(!category||!desc||!value){alert('Preencha todos os campos');return;}financials.push({id:'F'+Date.now(),date:new Date().toISOString(),type:type,category:category,desc:desc,value:value});saveData();closeModal();refreshFinancial();}
function deleteFinancial(id){if(!confirm('Excluir?'))return;financials=financials.filter(f=>f.id!==id);saveData();refreshFinancial();}

// STOCK
function refreshStock(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-boxes-stacked" style="color:var(--yellow);margin-right:8px"></i>Controle de Estoque</div><button class="btn btn-sm btn-primary" onclick="openStockModal()"><i class="fa-solid fa-plus"></i>Novo Produto</button></div><div style="overflow-x:auto"><table><thead><tr><th>Produto</th><th>Categoria</th><th>Estoque</th><th>Mínimo</th><th>Preço</th><th>Status</th><th>Ações</th></tr></thead><tbody>';stock.forEach(s=>{const st=s.qty<=s.min?'<span class="status danger">Baixo</span>':s.qty<=s.min*2?'<span class="status warning">Atenção</span>':'<span class="status success">OK</span>';h+='<tr><td>'+s.name+'</td><td>'+(s.category||'--')+'</td><td>'+s.qty+'</td><td>'+s.min+'</td><td>'+fmt(s.price)+'</td><td>'+st+'</td><td><button class="btn btn-sm btn-secondary" onclick="editStock(\''+s.id+'\')"><i class="fa-solid fa-edit"></i></button></td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-stock').innerHTML=h;}
function openStockModal(){showModal('<div class="modal-header"><div class="modal-title">Novo Produto</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Nome</label><input type="text" id="stockName"></div><div class="form-group"><label class="form-label">Categoria</label><input type="text" id="stockCategory"></div><div class="form-group"><label class="form-label">Quantidade</label><input type="number" id="stockQty"></div><div class="form-group"><label class="form-label">Mínimo</label><input type="number" id="stockMin"></div><div class="form-group"><label class="form-label">Preço</label><input type="number" id="stockPrice" step="0.01"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStock()">Salvar</button></div>');}
function saveStock(){const name=document.getElementById('stockName').value;const category=document.getElementById('stockCategory').value;const qty=parseInt(document.getElementById('stockQty').value);const min=parseInt(document.getElementById('stockMin').value);const price=parseFloat(document.getElementById('stockPrice').value);if(!name||!category||isNaN(qty)||isNaN(min)||isNaN(price)){alert('Preencha todos os campos');return;}stock.push({id:'S'+Date.now(),name:name,category:category,qty:qty,min:min,price:price});saveData();closeModal();refreshStock();}
function editStock(id){const s=stock.find(x=>x.id===id);if(!s)return;const n=prompt('Nova quantidade:',s.qty);if(n===null)return;s.qty=parseInt(n);saveData();refreshStock();}

// CUSTOMERS
function refreshCustomers(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-users" style="color:var(--green);margin-right:8px"></i>Cadastro de Clientes</div><button class="btn btn-sm btn-primary" onclick="openCustomerModal()"><i class="fa-solid fa-user-plus"></i>Novo Cliente</button></div><div style="overflow-x:auto"><table><thead><tr><th>Nome</th><th>Telefone</th><th>Email</th><th>Endereço</th><th>Pedidos</th><th>Total Gasto</th><th>Ações</th></tr></thead><tbody>';customers.forEach(c=>{h+='<tr><td><strong>'+c.name+'</strong></td><td>'+c.phone+'</td><td>'+(c.email||'--')+'</td><td>'+(c.address||'--')+'</td><td>'+(c.orders||0)+'</td><td style="color:var(--green);font-weight:700">'+fmt(c.total||0)+'</td><td><button class="btn btn-sm btn-danger" onclick="deleteCustomer(\''+c.id+'\')"><i class="fa-solid fa-trash"></i></button></td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-customers').innerHTML=h;}
function openCustomerModal(){showModal('<div class="modal-header"><div class="modal-title">Novo Cliente</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Nome</label><input type="text" id="custName"></div><div class="form-group"><label class="form-label">Telefone</label><input type="text" id="custPhone"></div><div class="form-group"><label class="form-label">Email</label><input type="email" id="custEmail"></div><div class="form-group"><label class="form-label">Endereço</label><input type="text" id="custAddress"></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCustomer()">Salvar</button></div>');}
function saveCustomer(){const name=document.getElementById('custName').value;const phone=document.getElementById('custPhone').value;const email=document.getElementById('custEmail').value;const address=document.getElementById('custAddress').value;if(!name||!phone){alert('Nome e telefone obrigatórios');return;}customers.push({id:'U'+Date.now(),name:name,phone:phone,email:email,address:address,orders:0,total:0});saveData();closeModal();refreshCustomers();}
function deleteCustomer(id){if(!confirm('Excluir?'))return;customers=customers.filter(c=>c.id!==id);saveData();refreshCustomers();}

// REFUND
function refreshRefund(){let h='<div class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-rotate-left" style="color:var(--yellow);margin-right:8px"></i>Estornos e Devoluções</div></div><div style="overflow-x:auto"><table><thead><tr><th>ID Venda</th><th>Data</th><th>Cliente</th><th>Total Original</th><th>Motivo</th><th>Status</th></tr></thead><tbody>';refunds.slice().reverse().forEach(r=>{h+='<tr><td><strong>'+r.saleId+'</strong></td><td>'+new Date(r.date).toLocaleString('pt-BR')+'</td><td>'+r.customer+'</td><td style="color:var(--red);font-weight:700">'+fmt(r.total)+'</td><td>'+r.reason+'</td><td><span class="status warning">Estornado</span></td></tr>';});h+='</tbody></table></div></div>';document.getElementById('page-refund').innerHTML=h;}

// REPORTS
function refreshReports(){document.getElementById('page-reports').innerHTML='<div id="reportArea"><div class="grid grid-3"><div class="card" style="cursor:pointer" onclick="generateReport(\'sales\')"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--green-soft);color:var(--green);margin-bottom:12px"><i class="fa-solid fa-receipt"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:4px">Vendas do Dia</div><div style="font-size:12px;color:var(--text-dim)">Relatório completo de vendas</div></div><div class="card" style="cursor:pointer" onclick="generateReport(\'financial\')"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--blue-soft);color:var(--blue);margin-bottom:12px"><i class="fa-solid fa-chart-line"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:4px">Financeiro</div><div style="font-size:12px;color:var(--text-dim)">Entradas, saídas e lucro</div></div><div class="card" style="cursor:pointer" onclick="generateReport(\'stock\')"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--yellow-soft);color:var(--yellow);margin-bottom:12px"><i class="fa-solid fa-boxes-stacked"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:4px">Estoque</div><div style="font-size:12px;color:var(--text-dim)">Posição atual do estoque</div></div><div class="card" style="cursor:pointer" onclick="generateReport(\'customers\')"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--purple-soft);color:var(--purple);margin-bottom:12px"><i class="fa-solid fa-users"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:4px">Clientes</div><div style="font-size:12px;color:var(--text-dim)">Lista de clientes cadastrados</div></div><div class="card" style="cursor:pointer" onclick="generateReport(\'products\')"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--accent-soft);color:var(--accent);margin-bottom:12px"><i class="fa-solid fa-fire"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:4px">Mais Vendidos</div><div style="font-size:12px;color:var(--text-dim)">Ranking por quantidade</div></div><div class="card" style="cursor:pointer" onclick="generateReport(\'cash\')"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--red-soft);color:var(--red);margin-bottom:12px"><i class="fa-solid fa-vault"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:4px">Caixa</div><div style="font-size:12px;color:var(--text-dim)">Movimentações do caixa</div></div></div></div>';}
function generateReport(type){
const date=new Date().toISOString().split('T')[0];
let title='',content='';
if(type==='sales'){const ts=sales.filter(s=>s.date.startsWith(date));const total=ts.reduce((s,v)=>s+v.total,0);title='Relatório de Vendas - '+new Date(date).toLocaleDateString('pt-BR');content='<h3>'+title+'</h3><p>Total: '+ts.length+' vendas | Faturamento: '+fmt(total)+'</p><table><thead><tr><th>ID</th><th>Hora</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Pagamento</th></tr></thead><tbody>';ts.forEach(s=>{content+='<tr><td>'+s.id+'</td><td>'+new Date(s.date).toLocaleTimeString('pt-BR')+'</td><td>'+s.customer+'</td><td>'+s.items.map(i=>i.nome+' x'+i.qty).join(', ')+'</td><td>'+fmt(s.total)+'</td><td>'+s.payment+'</td></tr>';});content+='</tbody></table>';}
else if(type==='financial'){const ft=financials.filter(f=>f.date.startsWith(date));const inV=ft.filter(f=>f.type==='in').reduce((s,f)=>s+f.value,0);const outV=ft.filter(f=>f.type==='out').reduce((s,f)=>s+f.value,0);title='Relatório Financeiro - '+new Date(date).toLocaleDateString('pt-BR');content='<h3>'+title+'</h3><p>Entradas: '+fmt(inV)+' | Saídas: '+fmt(outV)+' | Saldo: '+fmt(inV-outV)+'</p><table><thead><tr><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Valor</th></tr></thead><tbody>';ft.forEach(f=>{content+='<tr><td>'+(f.type==='in'?'Entrada':'Saída')+'</td><td>'+f.category+'</td><td>'+f.desc+'</td><td>'+fmt(f.value)+'</td></tr>';});content+='</tbody></table>';}
else if(type==='stock'){title='Relatório de Estoque';content='<h3>'+title+'</h3><table><thead><tr><th>Produto</th><th>Categoria</th><th>Qtd</th><th>Mín</th><th>Preço</th><th>Status</th></tr></thead><tbody>';stock.forEach(s=>{const st=s.qty<=s.min?'BAIXO':s.qty<=s.min*2?'ATENÇÃO':'OK';content+='<tr><td>'+s.name+'</td><td>'+(s.category||'--')+'</td><td>'+s.qty+'</td><td>'+s.min+'</td><td>'+fmt(s.price)+'</td><td>'+st+'</td></tr>';});content+='</tbody></table>';}
else if(type==='customers'){title='Relatório de Clientes';content='<h3>'+title+'</h3><table><thead><tr><th>Nome</th><th>Telefone</th><th>Pedidos</th><th>Total Gasto</th></tr></thead><tbody>';customers.forEach(c=>{content+='<tr><td>'+c.name+'</td><td>'+c.phone+'</td><td>'+(c.orders||0)+'</td><td>'+fmt(c.total||0)+'</td></tr>';});content+='</tbody></table>';}
else if(type==='products'){const pc={};sales.forEach(s=>s.items.forEach(i=>{pc[i.nome]=(pc[i.nome]||0)+i.qty;}));const top=Object.entries(pc).sort((a,b)=>b[1]-a[1]);title='Produtos Mais Vendidos';content='<h3>'+title+'</h3><table><thead><tr><th>Produto</th><th>Quantidade</th></tr></thead><tbody>';top.forEach(([n,q])=>{content+='<tr><td>'+n+'</td><td>'+q+'</td></tr>';});content+='</tbody></table>';}
else if(type==='cash'){const cm=cashMovements.filter(m=>m.date.startsWith(date));const inV=cm.filter(m=>m.type==='in').reduce((s,m)=>s+m.value,0);const outV=cm.filter(m=>m.type==='out').reduce((s,m)=>s+m.value,0);title='Relatório de Caixa - '+new Date(date).toLocaleDateString('pt-BR');content='<h3>'+title+'</h3><p>Entradas: '+fmt(inV)+' | Saídas: '+fmt(outV)+' | Saldo: '+fmt(inV-outV)+'</p><table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Valor</th></tr></thead><tbody>';cm.forEach(m=>{content+='<tr><td>'+new Date(m.date).toLocaleString('pt-BR')+'</td><td>'+(m.type==='in'?'Entrada':'Saída')+'</td><td>'+m.desc+'</td><td>'+fmt(m.value)+'</td></tr>';});content+='</tbody></table>';}
const reportHtml='<div style="padding:20px;background:#fff;color:#000;min-height:100vh"><div class="no-print" style="margin-bottom:20px;display:flex;gap:10px"><button onclick="refreshReports()" style="padding:10px 20px;background:#666;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">← Voltar</button><button onclick="window.print()" style="padding:10px 20px;background:#e8850c;color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:600">🖨️ Imprimir / Salvar PDF</button></div><div style="max-width:900px;margin:0 auto">'+content+'</div></div>';
document.getElementById('reportArea').innerHTML=reportHtml;
}

function refreshPage(page){
if(page==='dashboard')refreshDashboard();
else if(page==='pdv')refreshPDV();
else if(page==='sales')refreshSales();
else if(page==='cash')refreshCash();
else if(page==='payable')refreshPayable();
else if(page==='receivable')refreshReceivable();
else if(page==='financial')refreshFinancial();
else if(page==='stock')refreshStock();
else if(page==='customers')refreshCustomers();
else if(page==='refund')refreshRefund();
else if(page==='reports')refreshReports();
}
refreshDashboard();
</script>
</body>
</html>
