
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Cantinho do Robs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    
    /* LOGIN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #d94f2a, #b8421f);
      padding: 20px;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 {
      text-align: center;
      color: #d94f2a;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .login-box p {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #d94f2a;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #d94f2a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #b8421f; }
    .error {
      background: #ffebee;
      color: #d32f2f;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    
    /* PAINEL */
    .painel { display: none; }
    .painel.active { display: block; }
    
    .header {
      background: white;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 {
      color: #d94f2a;
      font-size: 24px;
    }
    .btn-sair {
      padding: 10px 20px;
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* ESTATÍSTICAS */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat h3 {
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat .valor {
      font-size: 28px;
      font-weight: 700;
      color: #d94f2a;
    }
    .stat.verde .valor { color: #2e8b3d; }
    .stat.amarelo .valor { color: #f0a500; }
    
    /* FILTROS */
    .filtros {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .filtros h2 { margin-bottom: 15px; font-size: 18px; }
    .botoes-filtro {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-filtro {
      padding: 10px 20px;
      background: #f5f5f5;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-filtro:hover { border-color: #d94f2a; color: #d94f2a; }
    .btn-filtro.ativo { background: #d94f2a; border-color: #d94f2a; color: white; }
    
    /* PEDIDOS */
    .pedido {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .pedido-topo {
      padding: 20px;
      background: #f9f9f9;
      border-bottom: 2px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pedido-id {
      font-weight: 700;
      font-size: 18px;
      color: #d94f2a;
    }
    .pedido-data {
      color: #666;
      font-size: 14px;
    }
    .status {
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
    }
    .status-novo { background: #e3f2fd; color: #1976d2; }
    .status-aceito { background: #e8f5e9; color: #388e3c; }
    .status-preparando { background: #fff3e0; color: #f57c00; }
    .status-pronto { background: #e0f2f1; color: #00796b; }
    .status-entrega { background: #f3e5f5; color: #7b1fa2; }
    .status-concluido { background: #e8f5e9; color: #388e3c; }
    .status-cancelado { background: #ffebee; color: #d32f2f; }
    
    .pedido-corpo { padding: 20px; }
    .pedido-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }
    .info-item h4 {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-item p { font-weight: 600; }
    
    .pedido-itens {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .pedido-itens h4 { font-size: 14px; margin-bottom: 10px; color: #666; }
    .pedido-itens ul { list-style: none; }
    .pedido-itens li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }
    .pedido-itens li:last-child { border-bottom: none; }
    
    .pedido-total {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .pedido-total .valor { color: #2e8b3d; font-size: 22px; }
    
    .pedido-acoes {
      padding: 20px;
      background: #f9f9f9;
      border-top: 2px solid #eee;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-acao {
      flex: 1;
      min-width: 150px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-aceitar { background: #2e8b3d; color: white; }
    .btn-aceitar:hover { background: #257a34; }
    .btn-preparar { background: #f57c00; color: white; }
    .btn-preparar:hover { background: #e56b00; }
    .btn-pronto { background: #00796b; color: white; }
    .btn-pronto:hover { background: #00695c; }
    .btn-entrega { background: #7b1fa2; color: white; }
    .btn-entrega:hover { background: #6a1b9a; }
    .btn-concluir { background: #2e8b3d; color: white; }
    .btn-concluir:hover { background: #257a34; }
    .btn-cancelar { background: #d32f2f; color: white; }
    .btn-cancelar:hover { background: #b71c1c; }
    .btn-zap { background: #25d366; color: white; }
    .btn-zap:hover { background: #20bd5a; }
    
    .vazio {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .vazio h3 { font-size: 24px; margin-bottom: 10px; }
    
    .atualizar {
      background: #2196F3;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .atualizar:hover { background: #1976d2; }
    
    @media (max-width: 768px) {
      .pedido-acoes { flex-direction: column; }
      .btn-acao { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-screen" id="telaLogin">
    <div class="login-box">
      <h1>🍕 Cantinho do Robs</h1>
      <p>Painel Administrativo</p>
      <div class="error" id="erroLogin"></div>
      <form id="formLogin">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="usuario" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" required>
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>
      <p style="margin-top: 20px; font-size: 13px; color: #999; text-align: center;">
        Usuário: <strong>admin</strong> | Senha: <strong>admin123</strong>
      </p>
    </div>
  </div>

  <!-- PAINEL -->
  <div class="painel" id="painel">
    <div class="header">
      <h1>🍕 Painel Admin - Cantinho do Robs</h1>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>

    <div class="container">
      <div class="stats">
        <div class="stat">
          <h3>Pedidos Hoje</h3>
          <div class="valor" id="statHoje">0</div>
        </div>
        <div class="stat verde">
          <h3>Faturamento Hoje</h3>
          <div class="valor" id="statFaturamento">R$ 0,00</div>
        </div>
        <div class="stat amarelo">
          <h3>Pedidos Novos</h3>
          <div class="valor" id="statNovos">0</div>
        </div>
        <div class="stat">
          <h3>Total de Pedidos</h3>
          <div class="valor" id="statTotal">0</div>
        </div>
      </div>

      <button class="atualizar" onclick="carregarPedidos()">🔄 Atualizar Pedidos</button>
      <button class="atualizar" style="background: #d32f2f; margin-left: 10px;" onclick="apagarPedidosHoje()">🗑️ Apagar Pedidos do Dia</button>

      <div class="filtros">
        <h2>Filtrar Pedidos</h2>
        <div class="botoes-filtro">
          <button class="btn-filtro ativo" data-status="todos">Todos</button>
          <button class="btn-filtro" data-status="novo">Novos</button>
          <button class="btn-filtro" data-status="aceito">Aceitos</button>
          <button class="btn-filtro" data-status="preparando">Preparando</button>
          <button class="btn-filtro" data-status="pronto">Prontos</button>
          <button class="btn-filtro" data-status="entrega">Em Entrega</button>
          <button class="btn-filtro" data-status="concluido">Concluídos</button>
          <button class="btn-filtro" data-status="cancelado">Cancelados</button>
        </div>
      </div>

      <div id="listaPedidos"></div>
    </div>
  </div>

  <script>
    // Credenciais
    const USUARIO = 'admin';
    const SENHA = 'admin123';
    let filtroAtual = 'todos';

    // Login
    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value;

      if (usuario === USUARIO && senha === SENHA) {
        localStorage.setItem('logado', 'true');
        mostrarPainel();
      } else {
        const erro = document.getElementById('erroLogin');
        erro.textContent = 'Usuário ou senha incorretos!';
        erro.style.display = 'block';
      }
    });

    function mostrarPainel() {
      document.getElementById('telaLogin').style.display = 'none';
      document.getElementById('painel').classList.add('active');
      carregarPedidos();
    }

    function sair() {
      localStorage.removeItem('logado');
      location.reload();
    }

    // Verificar se já está logado
    if (localStorage.getItem('logado') === 'true') {
      mostrarPainel();
    }

    // Carregar pedidos do localStorage
    function carregarPedidos() {
      const pedidos = JSON.parse(localStorage.getItem('pedidos') || '[]');
      const lista = document.getElementById('listaPedidos');

      // Estatísticas
      const hoje = new Date().toDateString();
      const pedidosHoje = pedidos.filter(p => new Date(p.data).toDateString() === hoje);
      const faturamentoHoje = pedidosHoje.reduce((sum, p) => sum + p.total, 0);
      const pedidosNovos = pedidos.filter(p => p.status === 'novo').length;

      document.getElementById('statHoje').textContent = pedidosHoje.length;
      document.getElementById('statFaturamento').textContent = 'R$ ' + faturamentoHoje.toFixed(2).replace('.', ',');
      document.getElementById('statNovos').textContent = pedidosNovos;
      document.getElementById('statTotal').textContent = pedidos.length;

      // Filtrar pedidos
      let pedidosFiltrados = pedidos;
      if (filtroAtual !== 'todos') {
        pedidosFiltrados = pedidos.filter(p => p.status === filtroAtual);
      }

      // Ordenar por data (mais recente primeiro)
      pedidosFiltrados.sort((a, b) => new Date(b.data) - new Date(a.data));

      if (pedidosFiltrados.length === 0) {
        lista.innerHTML = '<div class="vazio"><h3>Nenhum pedido encontrado</h3><p>Os pedidos feitos no site do cliente aparecerão aqui</p></div>';
        return;
      }

      lista.innerHTML = pedidosFiltrados.map(pedido => renderizarPedido(pedido)).join('');
    }

    function renderizarPedido(pedido) {
      const statusLabels = {
        'novo': 'Novo',
        'aceito': 'Aceito',
        'preparando': 'Preparando',
        'pronto': 'Pronto',
        'entrega': 'Em Entrega',
        'concluido': 'Concluído',
        'cancelado': 'Cancelado'
      };

      const data = new Date(pedido.data).toLocaleString('pt-BR');
      const itens = pedido.itens;

      let botoes = '';
      
      if (pedido.status === 'novo') {
        botoes = `
          <button class="btn-acao btn-aceitar" onclick="mudarStatus('${pedido.id}', 'aceito')">✓ Aceitar</button>
          <button class="btn-acao btn-cancelar" onclick="mudarStatus('${pedido.id}', 'cancelado')">✕ Cancelar</button>
        `;
      } else if (pedido.status === 'aceito') {
        botoes = `
          <button class="btn-acao btn-preparar" onclick="mudarStatus('${pedido.id}', 'preparando')">👨‍🍳 Preparar</button>
          <button class="btn-acao btn-cancelar" onclick="mudarStatus('${pedido.id}', 'cancelado')">✕ Cancelar</button>
        `;
      } else if (pedido.status === 'preparando') {
        botoes = `
          <button class="btn-acao btn-pronto" onclick="mudarStatus('${pedido.id}', 'pronto')">✓ Pronto</button>
        `;
      } else if (pedido.status === 'pronto') {
        botoes = `
          <button class="btn-acao btn-entrega" onclick="mudarStatus('${pedido.id}', 'entrega')">🛵 Enviar Entrega</button>
        `;
      } else if (pedido.status === 'entrega') {
        botoes = `
          <button class="btn-acao btn-concluir" onclick="mudarStatus('${pedido.id}', 'concluido')">✓ Concluir</button>
        `;
      }

      botoes += `<button class="btn-acao btn-zap" onclick="enviarZap('${pedido.telefone}', '${pedido.id}')">📱 WhatsApp</button>`;

      return `
        <div class="pedido">
          <div class="pedido-topo">
            <div>
              <div class="pedido-id">${pedido.id}</div>
              <div class="pedido-data">${data}</div>
            </div>
            <span class="status status-${pedido.status}">${statusLabels[pedido.status]}</span>
          </div>
          <div class="pedido-corpo">
            <div class="pedido-info">
              <div class="info-item">
                <h4>Cliente</h4>
                <p>${pedido.cliente}</p>
              </div>
              <div class="info-item">
                <h4>Telefone</h4>
                <p>${pedido.telefone}</p>
              </div>
              <div class="info-item">
                <h4>Bairro</h4>
                <p>${pedido.bairro}</p>
              </div>
              <div class="info-item">
                <h4>Pagamento</h4>
                <p>${pedido.pagamento}</p>
              </div>
            </div>
            <div class="pedido-itens">
              <h4>Itens do Pedido</h4>
              <ul>
                ${itens.map(item => `<li><span>${item.nome}</span><span>R$ ${item.preco.toFixed(2).replace('.', ',')}</span></li>`).join('')}
              </ul>
            </div>
            <div class="pedido-total">
              <span>Total</span>
              <span class="valor">R$ ${pedido.total.toFixed(2).replace('.', ',')}</span>
            </div>
          </div>
          <div class="pedido-acoes">
            ${botoes}
          </div>
        </div>
      `;
    }

    function mudarStatus(pedidoId, novoStatus) {
      const pedidos = JSON.parse(localStorage.getItem('pedidos') || '[]');
      const pedido = pedidos.find(p => p.id === pedidoId);
      
      if (pedido) {
        pedido.status = novoStatus;
        localStorage.setItem('pedidos', JSON.stringify(pedidos));
        carregarPedidos();
        alert('Status atualizado para: ' + novoStatus.toUpperCase());
      }
    }

    function enviarZap(telefone, pedidoId) {
      const pedidos = JSON.parse(localStorage.getItem('pedidos') || '[]');
      const pedido = pedidos.find(p => p.id === pedidoId);
      
      if (!pedido) return;

      const statusMensagens = {
        'aceito': '✅ Pedido ACEITO! Em breve começaremos a preparar.',
        'preparando': '👨‍🍳 Pedido em PREPARAÇÃO!',
        'pronto': '✅ Pedido PRONTO! Aguardando entrega.',
        'entrega': '🛵 Pedido em ROTA DE ENTREGA! Em breve estará aí.',
        'concluido': '✅ Pedido CONCLUÍDO! Obrigado!',
        'cancelado': '❌ Pedido CANCELADO.'
      };

      const mensagem = `*Cantinho do Robs* - Pedido ${pedidoId}\n\n${statusMensagens[pedido.status] || 'Olá! Sobre seu pedido...'}`;
      const telefoneLimpo = telefone.replace(/\D/g, '');
      const link = `https://wa.me/55${telefoneLimpo}?text=${encodeURIComponent(mensagem)}`;
      window.open(link, '_blank');
    }

    function apagarPedidosHoje() {
      const pedidos = JSON.parse(localStorage.getItem('pedidos') || '[]');
      const hoje = new Date().toDateString();
      
      const pedidosHoje = pedidos.filter(p => new Date(p.data).toDateString() === hoje);
      
      if (pedidosHoje.length === 0) {
        alert('Não há pedidos de hoje para apagar!');
        return;
      }
      
      const confirmar = confirm(`Tem certeza que deseja apagar ${pedidosHoje.length} pedido(s) de hoje?\n\nEsta ação não pode ser desfeita!`);
      
      if (confirmar) {
        const pedidosAntigos = pedidos.filter(p => new Date(p.data).toDateString() !== hoje);
        localStorage.setItem('pedidos', JSON.stringify(pedidosAntigos));
        carregarPedidos();
        alert(`${pedidosHoje.length} pedido(s) de hoje foram apagados!`);
      }
    }

    // Filtros
    document.querySelectorAll('.btn-filtro').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
        this.classList.add('ativo');
        filtroAtual = this.dataset.status;
        carregarPedidos();
      });
    });

    // Atualizar a cada 5 segundos
    setInterval(carregarPedidos, 5000);
  </script>

</body>
</html>
