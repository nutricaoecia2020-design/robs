<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Robs | Premium Delivery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #00a8ff; 
            --bg-dark: #0f172a; 
            --bg-card: #1e293b; 
            --dark-deep: #020617;
            --text-white: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        
        body { background: var(--bg-dark); color: var(--text-white); margin: 0; padding-bottom: 50px; }

        header {
            background: rgba(15, 23, 42, 0.9);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .destaque-topo {
            background: var(--primary); color: white; text-align: center; padding: 8px;
            font-weight: 800; letter-spacing: 1px; font-size: 14px; text-transform: uppercase;
        }

        .logo h1 { color: white; margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }

        /* CESTINHA AUMENTADA */
        .cart-trigger {
            background: var(--primary); 
            color: white; 
            padding: 15px 25px; /* Aumentado */
            border-radius: 50px;
            cursor: pointer; 
            position: relative; 
            transition: 0.3s; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-trigger i {
            font-size: 28px; /* Ícone da cesta muito maior */
        }
        .cart-count {
            position: absolute; 
            top: -8px; 
            right: -5px; 
            background: white; 
            color: var(--primary);
            font-size: 14px; 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            font-weight: 900;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* Status Gigante e Piscante */
        #statusLoja { 
            padding: 20px 40px; 
            border-radius: 20px; 
            font-size: 38px; 
            font-weight: 900; 
            display: inline-block; 
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .aberto { 
            background: var(--success); 
            animation: piscar 1.2s infinite; 
        }
        .fechado { background: var(--danger); }

        @keyframes piscar {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.03); }
            100% { opacity: 1; transform: scale(1); }
        }

        .contato-loja {
            display: block;
            margin-top: 15px;
            font-size: 24px;
            font-weight: 800;
            color: var(--success);
        }

        .category-title {
            margin: 40px 0 20px 0;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            border-left: 8px solid var(--primary);
            font-size: 26px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grid-produtos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        .produto-card {
            background: var(--bg-card); border-radius: 18px; overflow: hidden; color: white;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        .produto-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .prod-img { width: 100%; height: 200px; object-fit: cover; }
        .prod-info { padding: 18px; }
        .prod-price { color: var(--primary); font-weight: 900; font-size: 24px; margin: 12px 0; }

        input, select, textarea { 
            width: 100%; padding: 16px; border-radius: 12px; margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--dark-deep); color: white;
            font-size: 16px;
        }

        .btn-add { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.2s; }
        
        .cart-sidebar {
            position: fixed; right: -100%; top: 0; width: 400px; height: 100%;
            background: var(--dark-deep); z-index: 1001; transition: 0.4s; padding: 30px; color: white;
            overflow-y: auto; border-left: 1px solid rgba(255,255,255,0.1);
        }
        .cart-sidebar.active { right: 0; }

        .item-carrinho {
            background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        @media(max-width: 600px) { 
            .cart-sidebar { width: 100%; } 
            #statusLoja { font-size: 26px; }
            .logo h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="destaque-topo">
    <i class="fas fa-star"></i> ROBS DELIVERY - BAIRRO LUZIA <i class="fas fa-star"></i>
</div>

<header>
    <div class="logo"><h1>Robs<span>🍕</span></h1></div>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-count" id="contagem">0</span>
    </div>
</header>

<div class="container">
    <div style="text-align:center; margin-bottom: 30px; background: var(--bg-card); padding: 40px 20px; border-radius: 25px;">
        <div id="statusLoja">Carregando...</div>
        <div class="contato-loja"><i class="fab fa-whatsapp"></i> (79) 92000-1038</div>
        <div style="margin-top:15px; font-size: 18px; color: var(--text-dim);"><i class="far fa-clock"></i> <span id="relogio">00:00:00</span></div>
    </div>

    <!-- SEÇÕES DO CARDÁPIO -->
    <div id="cardapio-completo">
        <h3 class="category-title"><i class="fas fa-pizza-slice"></i> Pizzas</h3>
        <div id="cat-pizzas" class="grid-produtos"></div>

        <h3 class="category-title"><i class="fas fa-birthday-cake"></i> Bolos</h3>
        <div id="cat-bolos" class="grid-produtos"></div>

        <h3 class="category-title"><i class="fas fa-hotdog"></i> Coxinhas</h3>
        <div id="cat-coxinhas" class="grid-produtos"></div>

        <h3 class="category-title"><i class="fas fa-utensils"></i> Pastéis</h3>
        <div id="cat-pasteis" class="grid-produtos"></div>

        <h3 class="category-title"><i class="fas fa-wine-glass-alt"></i> Bebidas</h3>
        <div id="cat-bebidas" class="grid-produtos"></div>
    </div>

    <!-- FINALIZAÇÃO -->
    <div id="finalizacao" style="margin-top: 50px; background: var(--bg-card); padding: 35px; border-radius: 25px;">
        <h3 style="margin-bottom:25px; font-size: 24px;"><i class="fas fa-truck"></i> Dados de Entrega</h3>
        <input id="nome" placeholder="Seu Nome Completo">
        <input id="endereco" placeholder="Endereço (Rua, Número, Ponto de Ref.)">
        <select id="bairro" onchange="renderCarrinho()">
            <option value="" data-taxa="0">Escolha o Bairro</option>
            <option value="Luzia" data-taxa="0">Luzia - Grátis</option>
            <option value="Ponto Novo" data-taxa="0">Ponto Novo - Grátis</option>
            <option value="Grageru" data-taxa="6">Grageru - R$ 6,00</option>
            <option value="Salgado Filho" data-taxa="6">Salgado Filho - R$ 6,00</option>
            <option value="Atalaia" data-taxa="12">Atalaia - R$ 12,00</option>
        </select>
        <input id="contato" placeholder="WhatsApp (DDD + Número)">
        <select id="pagamento">
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>
        <div style="margin-bottom: 10px; color: var(--text-dim); font-weight: bold;">Data para entrega/agendamento:</div>
        <input type="date" id="dataAgendamento">
        <textarea id="obs" placeholder="Alguma observação? (Ex: tirar cebola, troco para R$ 50)"></textarea>
        
        <button class="btn-add" style="background: #25d366; padding: 22px; font-size: 22px;" onclick="finalizar()">
            <i class="fab fa-whatsapp"></i> ENVIAR PARA O WHATSAPP
        </button>
    </div>
</div>

<!-- CARRINHO SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h3 style="font-size: 24px;">Meu Pedido</h3>
        <span onclick="toggleCart()" style="cursor:pointer; font-size: 35px;">&times;</span>
    </div>
    
    <div id="carrinhoItens"></div>
    <div id="vazioMsg" style="text-align:center; color:var(--text-dim); padding: 40px 0;">Seu carrinho está vazio</div>

    <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <div style="font-size: 18px; margin-bottom: 10px; display:flex; justify-content: space-between;">
            <span>Subtotal:</span>
            <span>R$ <span id="subtotalVal">0.00</span></span>
        </div>
        <div style="font-size: 28px; font-weight: 900; display:flex; justify-content: space-between; color: var(--primary);">
            <span>Total:</span>
            <span>R$ <span id="total">0.00</span></span>
        </div>
        
        <button class="btn-add" style="background: var(--danger); margin-top: 25px;" onclick="limparCarrinho()">
            <i class="fas fa-trash-alt"></i> LIMPAR TUDO
        </button>
        <button class="btn-add" style="margin-top: 12px; background: #475569;" onclick="toggleCart()">VOLTAR AO MENU</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzK5DrWIcbh1p_0VGzc5PQIbke6PJS6RoGwbrkNxUNLQor1-oaQoks3Hxs2f5o9upFi/exec";
    let carrinho = [];
    let produtosDoBanco = [];

    async function carregarProdutos() {
        try {
            const res = await fetch(API_URL);
            produtosDoBanco = await res.json();
            renderizarCardapio();
        } catch (e) { console.error("Erro ao carregar cardápio"); }
    }

    function renderizarCardapio() {
        const cats = {
            pizzas: document.getElementById("cat-pizzas"),
            bolos: document.getElementById("cat-bolos"),
            coxinhas: document.getElementById("cat-coxinhas"),
            pasteis: document.getElementById("cat-pasteis"),
            bebidas: document.getElementById("cat-bebidas")
        };
        Object.values(cats).forEach(div => div.innerHTML = "");

        produtosDoBanco.forEach((p, i) => {
            const cardHTML = `
                <div class="produto-card">
                    <img src="${p.url_imagem || p.URL}" class="prod-img" onerror="this.src='https://via.placeholder.com/300x200/1e293b/ffffff?text=Robs+Pizzaria'">
                    <div class="prod-info">
                        <strong style="font-size:19px; display:block; height:45px;">${p.nome}</strong>
                        <div class="prod-price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                        <button class="btn-add" onclick="add(${i})">Adicionar</button>
                    </div>
                </div>`;

            const nome = p.nome.toUpperCase();
            if (nome.includes("PASTEL") || nome.includes("PASTEIS")) cats.pasteis.innerHTML += cardHTML;
            else if (nome.includes("COXINHA")) cats.coxinhas.innerHTML += cardHTML;
            else if (nome.includes("BOLO")) cats.bolos.innerHTML += cardHTML;
            else if (nome.includes("COCA") || nome.includes("SUCO") || nome.includes("LITRO") || nome.includes("AGUA")) cats.bebidas.innerHTML += cardHTML;
            else cats.pizzas.innerHTML += cardHTML;
        });
    }

    window.add = (i) => { 
        carrinho.push(produtosDoBanco[i]); 
        renderCarrinho(); 
        const trigger = document.querySelector('.cart-trigger');
        trigger.style.transform = "scale(1.1)";
        setTimeout(() => trigger.style.transform = "scale(1)", 200);
    };

    window.removerItem = (index) => {
        carrinho.splice(index, 1);
        renderCarrinho();
    };

    window.limparCarrinho = () => {
        if(confirm("Deseja esvaziar o carrinho?")) {
            carrinho = [];
            renderCarrinho();
        }
    };

    window.renderCarrinho = () => {
        const area = document.getElementById("carrinhoItens");
        const msgVazio = document.getElementById("vazioMsg");
        const selBairro = document.getElementById("bairro");
        const taxa = parseFloat(selBairro.options[selBairro.selectedIndex].getAttribute("data-taxa") || 0);
        
        let subtotal = 0;
        area.innerHTML = "";
        
        if (carrinho.length === 0) msgVazio.style.display = "block";
        else {
            msgVazio.style.display = "none";
            carrinho.forEach((p, i) => {
                subtotal += parseFloat(p.preco);
                area.innerHTML += `
                    <div class="item-carrinho">
                        <div>
                            <div style="font-weight:bold;">${p.nome}</div>
                            <div style="color:var(--primary); font-weight:bold;">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                        </div>
                        <button style="background:none; border:none; color:var(--danger); cursor:pointer;" onclick="removerItem(${i})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        document.getElementById("subtotalVal").innerText = subtotal.toFixed(2);
        document.getElementById("total").innerText = (subtotal + taxa).toFixed(2);
        document.getElementById("contagem").innerText = carrinho.length;
    };

    window.toggleCart = () => document.getElementById('cartSidebar').classList.toggle('active');

    async function finalizar() {
        const nome = document.getElementById("nome").value;
        const end = document.getElementById("endereco").value;
        const bairro = document.getElementById("bairro").value;
        const total = document.getElementById("total").innerText;
        const contato = document.getElementById("contato").value;

        if(!nome || !end || carrinho.length === 0 || !bairro) return alert("Por favor, preencha todos os dados!");

        const produtosTxt = carrinho.map(p => p.nome).join("\n• ");
        const dataPed = document.getElementById("dataAgendamento").value;
        const obs = document.getElementById("obs").value;

        const msg = `*NOVO PEDIDO ROBS*\n\n*Cliente:* ${nome}\n*WhatsApp:* ${contato}\n\n*Itens:*\n• ${produtosTxt}\n\n*Total:* R$ ${total}\n*Endereço:* ${end}\n*Bairro:* ${bairro}\n*Agendamento:* ${dataPed}\n*Obs:* ${obs}`;
        window.open(`https://wa.me/5579920001038?text=${encodeURIComponent(msg)}`);
        
        carrinho = [];
        renderCarrinho();
        location.reload();
    }

    function verificarStatus() {
        const agora = new Date();
        const hora = agora.getHours();
        const statusBadge = document.getElementById("statusLoja");
        document.getElementById("relogio").innerText = agora.toLocaleTimeString('pt-BR');

        if (hora >= 18 && hora < 23) {
            statusBadge.innerText = "🟢 LOJA ABERTA";
            statusBadge.className = "aberto";
        } else {
            statusBadge.innerText = "🔴 FECHADO (AGENDAMENTO)";
            statusBadge.className = "fechado";
        }
    }

    setInterval(verificarStatus, 1000);
    carregarProdutos();
    document.getElementById('dataAgendamento').valueAsDate = new Date();
</script>

</body>
</html>
