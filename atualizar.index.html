<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --primary: #6200ea; --bg: #f0f2f5; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { color: #333; margin-bottom: 25px; text-align: center; }
    label { font-size: 14px; color: #666; margin-bottom: 5px; display: block; }
    input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
    input:focus { border-color: var(--primary); }
    button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background-color: #4500b5; }
    #statusMessage { margin-top: 20px; text-align: center; font-weight: 500; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🚚 Atualizar Pedido</h2>
    <label>ID do Pedido</label>
    <input id="idPedido" type="text" placeholder="Ex: 1001">
    
    <label>Novo Status</label>
    <select id="statusNovo">
      <option value="Recebido">Recebido</option>
      <option value="Preparando">Preparando</option>
      <option value="Pronto">Pronto</option>
      <option value="A caminho">A caminho</option>
      <option value="Entregue">Entregue</option>
    </select>
    
    <button onclick="salvar()">Atualizar Status</button>
    <div id="statusMessage"></div>
  </div>

  <script>
    function salvar() {
      var id = document.getElementById('idPedido').value;
      var status = document.getElementById('statusNovo').value;
      var msg = document.getElementById('statusMessage');
      
      if(!id) { msg.innerText = "Por favor, insira um ID."; return; }
      
      msg.style.color = "#666";
      msg.innerText = "Enviando...";
      
      google.script.run
        .withSuccessHandler(function(res) {
          msg.style.color = (res === "Sucesso") ? "#2e7d32" : "#d32f2f";
          msg.innerText = (res === "Sucesso") ? "Status atualizado com sucesso!" : "Erro: ID não encontrado.";
          if(res === "Sucesso") document.getElementById('idPedido').value = "";
        })
        .atualizarStatus(id, status);
    }
  </script>
</body>
</html>
