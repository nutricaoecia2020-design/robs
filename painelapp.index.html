
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Cantinho do Robs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #d94f2a;
      --primary-dark: #b8421f;
      --success: #2e8b3d;
      --warning: #f0a500;
      --danger: #d63a2a;
      --info: #2196F3;
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #333333;
      --text-light: #666666;
      --border: #e0e0e0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* LOGIN */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }
    .login-box {
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 8px;
      font-size: 28px;
    }
    .login-box p {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--primary-dark);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-msg {
      background: #ffebee;
      color: var(--danger);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .error-msg.show {
      display: block;
    }

    /* DASHBOARD */
    .dashboard {
      display: none;
    }
    .dashboard.active {
      display: block;
    }
    .header {
      background: var(--card);
      padding: 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 24px;
      color: var(--primary);
    }
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .user-info {
      color: var(--text-light);
      font-size: 14px;
    }
    .btn-logout {
      padding: 8px 16px;
      background: transparent;
      color: var(--danger);
      border: 2px solid var(--danger);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      background: var(--danger);
      color: white;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* ESTATÍSTICAS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card h3 {
      font-size: 14px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-card.success .value { color: var(--success); }
    .stat-card.warning .value { color: var(--warning); }
    
    /* FILTROS */
    .filters {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .filters h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }
    .filter-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 10px 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    /* LISTA DE PEDIDOS */
    .orders-grid {
      display: grid;
      gap: 20px;
    }
    .order-card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .order-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .order-header {
      padding: 20px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .order-id {
      font-weight: 700;
      font-size: 18px;
      color: var(--primary);
    }
    .order-time {
      color: var(--text-light);
      font-size: 14px;
    }
    .status-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
    }
    .status-novo { background: #e3f2fd; color: #1976d2; }
    .status-aceito { background: #e8f5e9; color: #388e3c; }
    .status-preparando { background: #fff3e0; color: #f57c00; }
    .status-pronto { background: #e0f2f1; color: #00796b; }
    .status-entrega { background: #f3e5f5; color: #7b1fa2; }
    .status-concluido { background: #e8f5e9; color: #388e3c; }
    .status-cancelado { background: #ffebee; color: #d32f2f; }
    
    .order-body {
      padding: 20px;
    }
    .order-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .info-item h4 {
      font-size: 12px;
      color: var(--text-light);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-item p {
      font-weight: 600;
      color: var(--text);
    }
    .order-items {
      background: var(--bg);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .order-items h4 {
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--text-light);
    }
    .item-list {
      list-style: none;
    }
    .item-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }
    .item-list li:last-child {
      border-bottom: none;
    }
    .order-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .order-total .value {
      color: var(--success);
      font-size: 24px;
    }
    
    .order-actions {
      padding: 20px;
      background: var(--bg);
      border-top: 2px solid var(--border);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1;
      min-width: 150px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .action-btn.primary {
      background: var(--primary);
      color: white;
    }
    .action-btn.primary:hover {
      background: var(--primary-dark);
    }
    .action-btn.success {
      background: var(--success);
      color: white;
    }
    .action-btn.success:hover {
      background: #257a34;
    }
    .action-btn.info {
      background: var(--info);
      color: white;
    }
    .action-btn.info:hover {
      background: #1976d2;
    }
    .action-btn.whatsapp {
      background: #25d366;
      color: white;
    }
    .action-btn.whatsapp:hover {
      background: #20bd5a;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-state h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: var(--card);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 20px;
      border-bottom: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 {
      font-size: 20px;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-light);
    }
    .modal-body {
      padding: 20px;
    }
    .modal-footer {
      padding: 20px;
      border-top: 2px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    /* RESPONSIVO */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 12px;
      }
      .order-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .order-actions {
        flex-direction: column;
      }
      .action-btn {
        width: 100%;
      }
    }
    
    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      border: 3px solid var(--border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <h1>🍕 Cantinho do Robs</h1>
      <p>Painel Administrativo</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <header class="header">
      <h1>🍕 Painel Admin - Cantinho do Robs</h1>
      <div class="header-actions">
        <span class="user-info" id="userInfo"></span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="container">
      <!-- ESTATÍSTICAS -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <h3>Pedidos Hoje</h3>
          <div class="value" id="statHoje">0</div>
        </div>
        <div class="stat-card success">
          <h3>Faturamento Hoje</h3>
          <div class="value" id="statFaturamento">R$ 0,00</div>
        </div>
        <div class="stat-card warning">
          <h3>Pedidos Novos</h3>
          <div class="value" id="statNovos">0</div>
        </div>
        <div class="stat-card">
          <h3>Total de Pedidos</h3>
          <div class="value" id="statTotal">0</div>
        </div>
      </div>

      <!-- FILTROS -->
      <div class="filters">
        <h2>Filtrar Pedidos</h2>
        <div class="filter-buttons">
          <button class="filter-btn active" data-status="todos">Todos</button>
          <button class="filter-btn" data-status="novo">Novos</button>
          <button class="filter-btn" data-status="aceito">Aceitos</button>
          <button class="filter-btn" data-status="preparando">Preparando</button>
          <button class="filter-btn" data-status="pronto">Prontos</button>
          <button class="filter-btn" data-status="entrega">Em Entrega</button>
          <button class="filter-btn" data-status="concluido">Concluídos</button>
          <button class="filter-btn" data-status="cancelado">Cancelados</button>
        </div>
      </div>

      <!-- LISTA DE PEDIDOS -->
      <div class="orders-grid" id="ordersGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Carregando pedidos...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DE DETALHES -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Detalhes do Pedido</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api';
    let token = localStorage.getItem('token');
    let currentFilter = 'todos';

    // Verificar autenticação ao carregar
    if (token) {
      verificarToken();
    }

    // LOGIN
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          token = data.token;
          localStorage.setItem('token', token);
          showDashboard(data.usuario);
        } else {
          showError(data.erro || 'Erro ao fazer login');
        }
      } catch (error) {
        showError('Erro de conexão com o servidor');
      }
    });

    async function verificarToken() {
      try {
        const response = await fetch(`${API_URL}/verificar`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          const data = await response.json();
          showDashboard(data.usuario);
        } else {
          localStorage.removeItem('token');
          token = null;
        }
      } catch (error) {
        localStorage.removeItem('token');
        token = null;
      }
    }

    function showDashboard(usuario) {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      document.getElementById('userInfo').textContent = `Olá, ${usuario.nome}`;
      carregarEstatisticas();
      carregarPedidos();
    }

    function logout() {
      localStorage.removeItem('token');
      token = null;
      location.reload();
    }

    function showError(msg) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.textContent = msg;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 3000);
    }

    // ESTATÍSTICAS
    async function carregarEstatisticas() {
      try {
        const response = await fetch(`${API_URL}/estatisticas`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        document.getElementById('statHoje').textContent = data.pedidos_hoje;
        document.getElementById('statFaturamento').textContent = `R$ ${data.faturamento_hoje.toFixed(2).replace('.', ',')}`;
        document.getElementById('statNovos').textContent = data.pedidos_novos;
        document.getElementById('statTotal').textContent = data.total_pedidos;
      } catch (error) {
        console.error('Erro ao carregar estatísticas:', error);
      }
    }

    // PEDIDOS
    async function carregarPedidos() {
      try {
        const response = await fetch(`${API_URL}/pedidos?status=${currentFilter}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const pedidos = await response.json();

        const grid = document.getElementById('ordersGrid');

        if (pedidos.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <h3>Nenhum pedido encontrado</h3>
              <p>Não há pedidos com o filtro selecionado</p>
            </div>
          `;
          return;
        }

        grid.innerHTML = pedidos.map(pedido => renderizarPedido(pedido)).join('');
      } catch (error) {
        console.error('Erro ao carregar pedidos:', error);
      }
    }

    function renderizarPedido(pedido) {
      const statusLabels = {
        'novo': 'Novo',
        'aceito': 'Aceito',
        'preparando': 'Preparando',
        'pronto': 'Pronto',
        'entrega': 'Em Entrega',
        'concluido': 'Concluído',
        'cancelado': 'Cancelado'
      };

      const data = new Date(pedido.created_at).toLocaleString('pt-BR');
      const itens = pedido.itens;

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">${pedido.pedido_id}</div>
              <div class="order-time">${data}</div>
            </div>
            <span class="status-badge status-${pedido.status}">${statusLabels[pedido.status]}</span>
          </div>
          <div class="order-body">
            <div class="order-info">
              <div class="info-item">
                <h4>Cliente</h4>
                <p>${pedido.cliente_nome}</p>
              </div>
              <div class="info-item">
                <h4>Telefone</h4>
                <p>${pedido.cliente_telefone}</p>
              </div>
              <div class="info-item">
                <h4>Bairro</h4>
                <p>${pedido.bairro}</p>
              </div>
              <div class="info-item">
                <h4>Pagamento</h4>
                <p>${pedido.forma_pagamento}${pedido.parcelas ? ` (${pedido.parcelas})` : ''}</p>
              </div>
            </div>
            <div class="order-items">
              <h4>Itens do Pedido</h4>
              <ul class="item-list">
                ${itens.map(item => `
                  <li>
                    <span>${item.nome}</span>
                    <span>R$ ${item.preco.toFixed(2).replace('.', ',')}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
            <div class="order-total">
              <span>Total</span>
              <span class="value">R$ ${pedido.total.toFixed(2).replace('.', ',')}</span>
            </div>
          </div>
          <div class="order-actions">
            ${pedido.status === 'novo' ? `
              <button class="action-btn success" onclick="atualizarStatus('${pedido.pedido_id}', 'aceito')">
                ✓ Aceitar Pedido
              </button>
            ` : ''}
            ${pedido.status === 'aceito' ? `
              <button class="action-btn primary" onclick="atualizarStatus('${pedido.pedido_id}', 'preparando')">
                👨‍🍳 Iniciar Preparação
              </button>
            ` : ''}
            ${pedido.status === 'preparando' ? `
              <button class="action-btn info" onclick="atualizarStatus('${pedido.pedido_id}', 'pronto')">
                ✓ Marcar como Pronto
              </button>
            ` : ''}
            ${pedido.status === 'pronto' ? `
              <button class="action-btn primary" onclick="atualizarStatus('${pedido.pedido_id}', 'entrega')">
                🛵 Enviar para Entrega
              </button>
            ` : ''}
            ${pedido.status === 'entrega' ? `
              <button class="action-btn success" onclick="atualizarStatus('${pedido.pedido_id}', 'concluido')">
                ✓ Marcar como Concluído
              </button>
            ` : ''}
            <button class="action-btn whatsapp" onclick="enviarWhatsApp('${pedido.cliente_telefone}', '${pedido.pedido_id}')">
              📱 WhatsApp
            </button>
          </div>
        </div>
      `;
    }

    async function atualizarStatus(pedidoId, novoStatus) {
      if (!confirm(`Deseja alterar o status para "${novoStatus}"?`)) return;

      try {
        const response = await fetch(`${API_URL}/pedidos/${pedidoId}/status`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: novoStatus })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Status atualizado com sucesso!\n\nLink do WhatsApp gerado para notificar o cliente.');
          carregarPedidos();
          carregarEstatisticas();
          
          // Abrir WhatsApp automaticamente
          if (data.whatsapp_link) {
            window.open(data.whatsapp_link, '_blank');
          }
        } else {
          alert('Erro ao atualizar status: ' + data.erro);
        }
      } catch (error) {
        alert('Erro de conexão com o servidor');
      }
    }

    function enviarWhatsApp(telefone, pedidoId) {
      const telefoneLimpo = telefone.replace(/\D/g, '');
      const mensagem = `Olá! Gostaria de falar sobre o pedido ${pedidoId}.`;
      const link = `https://wa.me/55${telefoneLimpo}?text=${encodeURIComponent(mensagem)}`;
      window.open(link, '_blank');
    }

    // FILTROS
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        carregarPedidos();
      });
    });

    // MODAL
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Atualizar a cada 30 segundos
    setInterval(() => {
      if (token) {
        carregarPedidos();
        carregarEstatisticas();
      }
    }, 30000);
  </script>
