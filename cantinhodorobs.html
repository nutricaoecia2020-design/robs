<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Container Principal -->
    <main class="max-w-[900px] mx-auto bg-white min-h-screen shadow-lg relative">
        
        <!-- Header com Imagem de Capa -->
        <header class="relative">
            <img src="https://assets.diggy.menu/menu/669873e43d4742c9c18e53c3/logo/29ed9d79-ffd9-4b16-8891-f1e7195b9a63-large.jpg" 
                 class="h-[150px] w-full object-cover" alt="Capa">
            
            <!-- Card de Info (Sobreposto) -->
            <div class="bg-white p-4 mx-4 -mt-10 rounded-2xl shadow-md border border-slate-100 relative">
                <div class="flex items-center gap-4">
                    <img src="https://assets.diggy.menu/menu/669873e43d4742c9c18e53c3/logo/b22c09a3-50cd-4ea4-af62-dae934404a69-low.jpg" 
                         class="w-16 h-16 rounded-full object-cover -mt-12 border-4 border-white shadow-md">
                    <div>
                        <h1 class="font-bold text-lg">Pizzaria Gardini</h1>
                        <p class="text-green-600 text-sm font-semibold">Aberto até as 23:30</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navegação de Categorias -->
        <nav class="p-4 flex gap-2 overflow-x-auto scrollbar-hide">
            <button class="bg-pink-600 text-white px-4 py-2 rounded-full whitespace-nowrap">Ofertas</button>
            <button class="bg-gray-100 px-4 py-2 rounded-full whitespace-nowrap">Pizzas</button>
            <button class="bg-gray-100 px-4 py-2 rounded-full whitespace-nowrap">Bebidas</button>
        </nav>

        <!-- Lista de Produtos -->
        <section class="p-4">
            <h2 class="text-lg font-bold mb-4">Ofertas</h2>
            
            <!-- Exemplo de Card de Produto -->
            <div class="flex items-center border border-slate-100 p-3 rounded-2xl mb-3 shadow-sm">
                <div class="flex-1">
                    <h3 class="font-medium">Pizza Grande + Refri</h3>
                    <p class="text-xs text-slate-500 line-clamp-2">Deliciosa pizza acompanhada de um refrigerante gelado.</p>
                    <p class="font-bold text-sm mt-2">R$ 49,99</p>
                </div>
                <img src="https://assets.diggy.menu/menu/669873e43d4742c9c18e53c3/products/055ef910-4bf5-4b93-98fe-eb984a76924a-low.jpg" 
                     class="w-20 h-20 rounded-xl object-cover">
            </div>
        </section>

    </main>

</body>
</html>
