<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Delivery Integrado</title>
    <style>
        :root { --primary: #22c55e; --bg-dark: #0b0b0b; --bg-card: #181818; --text-white: #ffffff; }
        body { background: var(--bg-dark); color: var(--text-white); font-family: sans-serif; margin: 0; }
        
        /* Navegação */
        .tab-nav { display: flex; justify-content: center; padding: 20px; gap: 10px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); }
        
        /* Seções */
        .page { display: none; padding: 20px; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        
        /* Ajuste do Filtro */
        #filtro { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #262626; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; color: #000; }
        th, td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="openPage('cardapio')">Cardápio</button>
        <button class="tab-btn" onclick="openPage('busca')">Busca</button>
        <button class="tab-btn" onclick="openPage('admin')">Admin</button>
    </div>

    <div id="cardapio" class="page active">
        <h1>Cardápio</h1>
        <p>Bem-vindo! Selecione seus itens abaixo.</p>
        </div>

    <div id="busca" class="page">
        <input type="text" id="filtro" onkeyup="filtrarTabela()" placeholder="Buscar ingredientes...">
        <table id="tabelaPizzas">
            <thead>
                <tr><th>Sabor</th><th>Ingredientes</th></tr>
            </thead>
            <tbody>
                <tr><td>Atum</td><td>Atum, Cebola, Azeitonas</td></tr>
            </tbody>
        </table>
    </div>

    <div id="admin" class="page">
        <h2>Painel de Gestão</h2>
        </div>

    <script>
        function openPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function filtrarTabela() {
            let filter = document.getElementById("filtro").value.toUpperCase();
            let tr = document.getElementById("tabelaPizzas").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let txt = tr[i].innerText.toUpperCase();
                tr[i].style.display = txt.indexOf(filter) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
