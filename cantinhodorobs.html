<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs - Pizzaria</title>
    <style>
        :root { --cor-principal: #f8f9fa; --cor-destaque: #e74c3c; --cor-texto: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--cor-principal); color: var(--cor-texto); margin: 0; padding-bottom: 80px; }
        header { background: #fff; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .aviso-horario { background: #fff3cd; padding: 15px; text-align: center; font-weight: bold; border-bottom: 2px solid #ffeeba; margin-bottom: 20px; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); gap: 15px; }
        .img-produto { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .botoes-prod { display: flex; flex-direction: column; gap: 5px; }
        button { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; color: white; }
        .btn-add { background: var(--cor-destaque); }
        .btn-detalhe { background: #3498db; }
        
        #sacola-flutuante { position: fixed; bottom: 20px; right: 20px; background: var(--cor-destaque); color: white; padding: 15px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 500px; margin: 50px auto; padding: 20px; border-radius: 10px; }
        .item-sacola { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Cantinho do Robs</h1>
    <span style="color: green; font-weight: bold;">● LOJA ABERTA</span>
</header>
<div class="aviso-horario">ATENÇÃO: Nosso horário oficial é das 18h às 22:30. Fora deste horário, aberto apenas para agendamento.</div>

<div class="container">
    <h2>Pizzas</h2>
    <div class="card">
        <img src="https://via.placeholder.com/80" alt="Pizza" class="img-produto">
        <div style="flex-grow: 1;"><strong>Pizza de Atum (30cm)</strong><br>R$ 49,90</div>
        <div class="botoes-prod">
            <button class="btn-add" onclick="adicionar('Pizza de Atum', 49.90)">Adicionar</button>
            <button class="btn-detalhe" onclick="alert('Ingredientes: Atum, Mussarela, Cebola, Molho de Tomate.')">Detalhes</button>
        </div>
    </div>
</div>

<div id="sacola-flutuante" onclick="abrirSacola()">🛒 Sacola <span id="contador-sacola">0</span></div>

<div id="modal">
    <div class="modal-content">
        <h3>Seu Pedido</h3>
        <div id="lista-itens"></div>
        <p>Bairro: 
            <select id="bairro" onchange="calcularTotal()">
                <option value="Luzia">Luzia (Taxa Grátis)</option>
                <option value="Outros">Outros Bairros (Taxa R$ 6,00)</option>
            </select>
        </p>
        <p><strong>Total: R$ <span id="valor-total">0,00</span></strong></p>
        <input type="text" id="nome" placeholder="Seu Nome">
        <input type="text" id="contato" placeholder="Seu WhatsApp">
        <input type="text" id="endereco" placeholder="Endereço">
        <input type="text" id="referencia" placeholder="Ponto de Referência">
        <select id="pagamento">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cartão">Cartão</option>
            <option value="Pix">Pix</option>
        </select>
        <button onclick="finalizarPedido()" style="width:100%; margin-top:10px; background: #27ae60; padding:15px;">Finalizar no WhatsApp</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; background: gray;">Fechar</button>
    </div>
</div>

<audio id="som-adicionar" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
    let carrinho = [];
    function adicionar(nome, preco) {
        carrinho.push({id: Date.now(), nome, preco});
        document.getElementById('som-adicionar').play();
        atualizarSacola();
    }
    function remover(id) {
        carrinho = carrinho.filter(item => item.id !== id);
        atualizarSacola();
    }
    function atualizarSacola() {
        document.getElementById('contador-sacola').innerText = carrinho.length;
        let lista = document.getElementById('lista-itens');
        lista.innerHTML = carrinho.map(i => `
            <div class="item-sacola">
                <span>${i.nome} - R$ ${i.preco.toFixed(2)}</span>
                <button onclick="remover(${i.id})" style="background:red; padding: 2px 5px;">X</button>
            </div>
        `).join('');
        calcularTotal();
    }
    function calcularTotal() {
        let subtotal = carrinho.reduce((acc, item) => acc + item.preco, 0);
        let taxa = document.getElementById('bairro').value === 'Luzia' ? 0 : 6.00;
        document.getElementById('valor-total').innerText = (subtotal + taxa).toFixed(2);
    }
    function abrirSacola() { document.getElementById('modal').style.display = 'block'; }
    function finalizarPedido() {
        let itens = carrinho.map(i => i.nome).join(', ');
        let total = document.getElementById('valor-total').innerText;
        let msg = `Olá! Meu pedido: ${itens}. Total: R$ ${total}. Cliente: ${document.getElementById('nome').value}. Pagamento: ${document.getElementById('pagamento').value}.`;
        window.open(`https://wa.me/5579920001038?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
