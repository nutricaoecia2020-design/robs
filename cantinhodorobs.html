<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs - Pizzaria</title>
    <style>
        :root { --cor-principal: #fff9f0; --cor-destaque: #d35400; --cor-texto: #2c3e50; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cor-principal); color: var(--cor-texto); margin: 0; padding-bottom: 100px; }
        
        /* Cabeçalho */
        header { background: #fff; padding: 30px; text-align: center; border-bottom: 5px solid var(--cor-destaque); }
        .header-imgs { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .header-imgs img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--cor-destaque); }
        
        /* Status e Avisos */
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .status-container { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; margin-top: 10px; }
        .pingo { width: 12px; height: 12px; border-radius: 50%; animation: piscar 1s infinite; }
        .aberta { color: green; }
        .fechada { color: red; }
        .aviso-chamativo { background: #f1c40f; color: #000; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; border: 3px dashed #d35400; margin: 20px; animation: piscar 2s infinite; }
        
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 15px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); gap: 20px; }
        .img-produto { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; }
        .botoes-prod { display: flex; flex-direction: column; gap: 8px; }
        button { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-add { background: var(--cor-destaque); }
        .btn-detalhe { background: #2980b9; }
        
        #sacola-flutuante { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

<header>
    <div class="header-imgs">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=160" alt="Pizza">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=160" alt="Pizza">
    </div>
    <h1>Cantinho do Robs</h1>
    <div id="status-loja" class="status-container"></div>
</header>
<div id="aviso-loja" class="aviso-chamativo"></div>

<div class="container">
    <h2>Pizzas</h2>
    <div class="card">
        <img src="https://via.placeholder.com/100" alt="Pizza" class="img-produto">
        <div style="flex-grow: 1;"><strong>Pizza de Atum (30cm)</strong><br>R$ 49,90</div>
        <div class="botoes-prod">
            <button class="btn-add" onclick="adicionar('Pizza de Atum', 49.90)">Adicionar</button>
            <button class="btn-detalhe" onclick="alert('Ingredientes: Atum, Mussarela, Cebola.')">Detalhes</button>
        </div>
    </div>
</div>

<div id="sacola-flutuante" onclick="alert('Abra a sacola para finalizar')">🛒 Sacola <span id="contador-sacola">0</span></div>

<script>
    // Lógica para horário
    function verificarHorario() {
        const agora = new Date();
        const hora = agora.getHours();
        const status = document.getElementById('status-loja');
        const aviso = document.getElementById('aviso-loja');
        
        if (hora >= 18 && hora < 22) {
            status.innerHTML = '<span class="pingo" style="background:green"></span> <span class="aberta">LOJA ABERTA</span>';
            aviso.innerText = 'PEÇA AGORA! Estamos atendendo das 18h às 22:30.';
        } else {
            status.innerHTML = '<span class="pingo" style="background:red"></span> <span class="fechada">LOJA FECHADA</span>';
            aviso.innerText = 'FORA DO HORÁRIO: Aberto apenas para agendamentos.';
        }
    }
    verificarHorario();
</script>
</body>
</html>
