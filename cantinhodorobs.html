<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs - Pizzaria</title>
    <style>
        :root { --cor-principal: #fff9f0; --cor-destaque: #d35400; --cor-texto: #2c3e50; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--cor-principal); color: var(--cor-texto); margin: 0; padding-bottom: 150px; }
        header { background: #fff; padding: 30px; text-align: center; border-bottom: 5px solid var(--cor-destaque); }
        .status-container { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; margin-top: 10px; }
        .aviso-chamativo { background: #f1c40f; color: #000; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; border: 3px dashed #d35400; margin: 20px; }
        .aviso-sabores { background: #e74c3c; color: white; padding: 10px; text-align: center; border-radius: 8px; margin: 20px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 15px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); gap: 20px; }
        .img-produto { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; }
        .botoes-prod { display: flex; flex-direction: column; gap: 8px; }
        button { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-add { background: var(--cor-destaque); }
        .btn-detalhe { background: #2980b9; }
        .sacola-box { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        #sacola-flutuante { background: #27ae60; color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 500px; margin: 50px auto; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .item-sacola { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Cantinho do Robs</h1>
    <div id="status-loja" class="status-container"></div>
</header>

<div id="aviso-loja" class="aviso-chamativo">PEÇA AGORA! Estamos atendendo das 18h às 22:30.</div>
<div class="aviso-sabores">⚠️ ATENÇÃO: É obrigatório escolher 2 sabores para fechar sua pizza!</div>

<div class="container">
    <h2>Pizzas</h2>
    <div class="card">
        <div style="flex-grow: 1;"><strong>Pizza de Atum (30cm)</strong><br>R$ 49,90</div>
        <div class="botoes-prod">
            <button class="btn-add" onclick="adicionar('Pizza de Atum', 49.90)">Adicionar</button>
        </div>
    </div>
</div>

<div class="sacola-box">
    <div id="sacola-flutuante" onclick="abrirSacola()">🛒 Sacola <span id="contador-sacola">0</span></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3>🛒 Seu Pedido</h3>
        <div id="lista-itens"></div>
        <p>Bairro: <select id="bairro" onchange="calcularTotal()"><option value="Luzia">Luzia (Grátis)</option><option value="Outros">Outros (Taxa R$ 6,00)</option></select></p>
        <p><strong>Total (com taxa): R$ <span id="valor-total">0,00</span></strong></p>
        
        <input type="text" id="nome" placeholder="👤 Seu Nome">
        <input type="text" id="contato" placeholder="📱 Seu WhatsApp/Contato">
        <input type="text" id="endereco" placeholder="🏠 Endereço de Entrega">
        <input type="text" id="referencia" placeholder="📍 Ponto de Referência">
        <select id="pagamento">
            <option value="Dinheiro">💵 Dinheiro</option>
            <option value="Cartão">💳 Cartão</option>
            <option value="Pix">📱 Pix</option>
        </select>
        
        <button onclick="finalizarPedido()" style="width:100%; margin-top:10px; background: #27ae60; padding:15px; color:white; border:none; border-radius:5px; font-weight:bold;">Finalizar no WhatsApp</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; background: gray; color:white; border:none; border-radius:5px; padding:10px;">Fechar</button>
    </div>
</div>

<script>
    let carrinho = [];
    
    function adicionar(nome, preco) {
        carrinho.push({id: Date.now(), nome, preco});
        atualizarSacola();
    }
    
    function remover(id) {
        carrinho = carrinho.filter(item => item.id !== id);
        atualizarSacola();
        abrirSacola();
    }
    
    function atualizarSacola() {
        document.getElementById('contador-sacola').innerText = carrinho.length;
    }
    
    function abrirSacola() {
        document.getElementById('modal').style.display = 'block';
        let lista = document.getElementById('lista-itens');
        lista.innerHTML = carrinho.map(i => `
            <div class="item-sacola">
                <span>${i.nome} - R$ ${i.preco.toFixed(2)}</span>
                <button onclick="remover(${i.id})" style="background:red; color:white; border:none; padding: 2px 5px; border-radius:3px;">X</button>
            </div>
        `).join('');
        calcularTotal();
    }
    
    function calcularTotal() {
        let subtotal = carrinho.reduce((acc, item) => acc + item.preco, 0);
        let taxa = document.getElementById('bairro').value === 'Luzia' ? 0 : 6.00;
        let total = subtotal + taxa;
        document.getElementById('valor-total').innerText = total.toFixed(2);
        return {subtotal, total};
    }
    
    function finalizarPedido() {
        let {subtotal, total} = calcularTotal();
        
        if (subtotal < 40) {
            alert("❌ Pedido mínimo de R$ 40,00 não atingido. Adicione mais itens!");
            return;
        }
        
        let itens = carrinho.map(i => i.nome).join(', ');
        let msg = `Olá! Novo Pedido:
        Produtos: ${itens}
        Total: R$ ${total.toFixed(2)}
        --- DADOS DO CLIENTE ---
        Nome: ${document.getElementById('nome').value}
        Contato: ${document.getElementById('contato').value}
        Endereço: ${document.getElementById('endereco').value}
        Referência: ${document.getElementById('referencia').value}
        Pagamento: ${document.getElementById('pagamento').value}`;
        
        window.open(`https://wa.me/5579920001038?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
