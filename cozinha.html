<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel da Cozinha - Cantinho do Robs</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .pedido-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #22c55e; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { cursor: pointer; padding: 8px; margin-right: 5px; }
    </style>
</head>
<body>
    <h1>Cozinha - Cantinho do Robs</h1>
    <div id="painel">Carregando pedidos...</div>

    <script>
        // COLE AQUI A SUA URL QUE APARECEU EM image_ac5b7c.png
        const URL_API = "https://script.google.com/macros/s/AKfycbxhbYuvZrmNDmrODxAbpZUm0HKnor2diJgXklzDfFquNo1vXjMDyEQOaiGH9aFTgUbIA/exec";

        async function carregarPedidos() {
            let res = await fetch(URL_API + "?acao=ler");
            let pedidos = await res.json();
            let div = document.getElementById("painel");
            div.innerHTML = "";

            pedidos.forEach(p => {
                div.innerHTML += `
                    <div class="pedido-card">
                        <h3>#${p.id} - ${p.nome}</h3>
                        <p><strong>Pedido:</strong> ${p.itens}</p>
                        <p><strong>Status:</strong> ${p.status}</p>
                        <button onclick="atualizar(${p.id}, 'Em Preparo')">Aceitar</button>
                        <button onclick="atualizar(${p.id}, 'Pronto')">Pronto</button>
                        <button onclick="atualizar(${p.id}, 'Finalizado')">Finalizar</button>
                    </div>
                `;
            });
        }

        async function atualizar(id, status) {
            await fetch(`${URL_API}?acao=atualizar&id=${id}&status=${status}`);
            carregarPedidos();
        }

        setInterval(carregarPedidos, 5000); // Atualiza a cada 5 segundos
        carregarPedidos();
    </script>
</body>
</html>
