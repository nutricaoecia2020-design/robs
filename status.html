<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Entrega</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 25px; border: 2px solid #25d366; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #25d366; margin-bottom: 5px; }
        #relogio { font-size: 50px; font-weight: bold; color: #ffcc00; margin: 15px 0; text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .box { margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        input { padding: 15px; width: 80%; border-radius: 12px; border: none; font-size: 18px; text-align: center; margin-bottom: 15px; }
        button { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; width: 85%; transition: 0.3s; }
        button:hover { background: #1da851; }
        .grupo-link { display: block; margin-top: 20px; color: #fff; text-decoration: none; font-weight: bold; font-size: 16px; background: #333; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Cantinho do Robs</h1>
        <p>Horário atual:</p>
        <div id="relogio">00:00:00</div>
        
        <div class="box">
            <h3>🛵 Finalizar Entrega</h3>
            <input type="number" id="codigo" placeholder="4 dígitos do cliente" maxlength="4">
            <br>
            <button onclick="finalizar()">✅ Confirmar Entrega</button>
        </div>

        <div class="box">
            <a href="https://chat.whatsapp.com/K1Z7QMoPs8i6FCi9J2UCXJ" class="grupo-link">📱 Acompanhe nosso Grupo de Avisos</a>
        </div>
    </div>

    <script>
        // Registra o horário que o cliente abriu o link
        const horarioAbertura = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'});

        // Relógio Digital
        function atualizarRelogio() {
            document.getElementById('relogio').textContent = new Date().toLocaleTimeString('pt-BR');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        function finalizar() {
            let cod = document.getElementById('codigo').value;
            let url = "https://script.google.com/macros/s/AKfycbyrTaDgZWTdA_f_nxon7Cvs_82eEtWMOUNhjywLRa5VToPtDpsyJGDgRy0dk3l8xiq8eA/exec";
            
            if(cod.length === 4) {
                const agora = new Date();
                const horarioFinalizacao = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                const dataAtual = agora.toLocaleDateString('pt-BR');
                let doisUltimos = cod.slice(-2);
                
                // Registra na planilha
                fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify({ acao: "finalizar", codigo: cod }) });
                
                // Mensagem formatada para o grupo
                let msg = `✅ *ENTREGA FINALIZADA!*%0A%0A` +
                          `📅 Data: ${dataAtual}%0A` +
                          `🕒 Abertura do link: ${horarioAbertura}%0A` +
                          `🏁 Hora da entrega: ${horarioFinalizacao}%0A%0A` +
                          `📦 Pedidos com final *${doisUltimos}* confirmados com sucesso no ato da entrega.%0A%0A` +
                          `🍕 Agradecemos pelo seu pedido e volte sempre! ❤️`;
                
                window.open("https://wa.me/5579920001038?text=" + msg, "_blank");
            } else {
                alert("Por favor, digite os 4 dígitos corretos.");
            }
        }
    </script>
</body>
</html>
