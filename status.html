<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Entrega</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 25px; border: 2px solid #25d366; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #25d366; margin-bottom: 5px; }
        #relogio { font-size: 40px; font-weight: bold; color: #ffcc00; margin: 10px 0; }
        .box { margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        .input-horario { margin-bottom: 10px; text-align: left; }
        .input-horario label { font-size: 14px; color: #bbb; display: block; margin-bottom: 2px; }
        input { padding: 12px; width: 80%; border-radius: 12px; border: none; font-size: 16px; text-align: center; margin-bottom: 10px; background: #333; color: white; }
        button { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; width: 85%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1da851; }
        .grupo-link { display: block; margin-top: 20px; color: #fff; text-decoration: none; font-weight: bold; font-size: 16px; background: #333; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Cantinho do Robs</h1>
        <p>Horário atual:</p>
        <div id="relogio">00:00:00</div>
        
        <div class="box">
            <div class="input-horario">
                <label>Horário que aceitou o pedido:</label>
                <input type="time" id="horaAceite">
            </div>
            <div class="input-horario">
                <label>Horário que despachou o pedido:</label>
                <input type="time" id="horaDespacho">
            </div>
            <div class="input-horario">
                <label>Horário da entrega do pedido:</label>
                <input type="time" id="horaEntrega">
            </div>
        </div>

        <div class="box">
            <h3>🛵 Finalizar Entrega</h3>
            <input type="number" id="codigo" placeholder="4 dígitos do cliente" maxlength="4">
            <br>
            <button onclick="finalizar()">✅ Confirmar Entrega</button>
        </div>

        <div class="box">
            <a href="https://chat.whatsapp.com/GEVXmyUJTez1KztXQn3uTR" class="grupo-link">📱 Acompanhe nosso Grupo de Avisos</a>
        </div>
    </div>

    <script>
        function atualizarRelogio() {
            document.getElementById('relogio').textContent = new Date().toLocaleTimeString('pt-BR');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        function finalizar() {
            let cod = document.getElementById('codigo').value;
            let hAceite = document.getElementById('horaAceite').value || "--:--";
            let hDespacho = document.getElementById('horaDespacho').value || "--:--";
            let hEntrega = document.getElementById('horaEntrega').value || "--:--";
            
            let url = "https://script.google.com/macros/s/AKfycbyrTaDgZWTdA_f_nxon7Cvs_82eEtWMOUNhjywLRa5VToPtDpsyJGDgRy0dk3l8xiq8eA/exec";
            
            if(cod.length === 4) {
                const dataAtual = new Date().toLocaleDateString('pt-BR');
                let doisUltimos = cod.slice(-2);
                
                fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify({ acao: "finalizar", codigo: cod }) });
                
                let msg = `✅ *ENTREGA FINALIZADA!*%0A%0A` +
                          `📅 Data: ${dataAtual}%0A` +
                          `🕒 Aceite: ${hAceite}%0A` +
                          `🚀 Despacho: ${hDespacho}%0A` +
                          `🏁 Entrega: ${hEntrega}%0A%0A` +
                          `📦 Pedidos com final *${doisUltimos}* confirmados com sucesso.%0A%0A` +
                          `🍕 Agradecemos pelo seu pedido e volte sempre!%0A` +
                          `✨ Esperamos por você novamente!%0A%0A` +
                          `📖 *Confira nosso cardápio:* https://www.robsaju.space/`;
                
                window.open("https://wa.me/5579920001038?text=" + msg, "_blank");
                window.location.href = "https://chat.whatsapp.com/GEVXmyUJTez1KztXQn3uTR";
            } else {
                alert("Por favor, digite os 4 dígitos corretos.");
            }
        }
    </script>
</body>
</html>
