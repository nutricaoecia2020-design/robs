<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Completo OAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-800 mb-6 text-center">Painel de Estudos OAB</h1>
        
        <!-- Timer -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-6 text-center">
            <h2 class="text-xl font-semibold">Exame 47: Setembro/2026</h2>
            <div id="timer" class="text-4xl font-mono text-blue-600 font-bold">Calculando...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Disciplinas -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Disciplinas OAB</h2>
                <div id="disciplinasList" class="space-y-1 text-sm h-64 overflow-y-auto">
                    <!-- Gerado via JS -->
                </div>
            </div>

            <!-- Upload PDF -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Arquivos de Provas</h2>
                <input type="file" id="fileInput" accept=".pdf" class="block w-full text-sm mb-4">
                <ul id="listaArquivos" class="space-y-2"></ul>
            </div>
        </div>

        <!-- Caderno de Erros -->
        <div class="bg-white p-6 rounded-lg shadow-md mt-6">
            <h2 class="text-xl font-semibold mb-4">Caderno de Erros</h2>
            <textarea id="erroInput" class="w-full p-2 border rounded" placeholder="Questão e fundamentação..."></textarea>
            <button onclick="salvarErro()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded">Salvar</button>
            <ul id="listaErros" class="mt-4 space-y-2"></ul>
        </div>
    </div>

    <script>
        const disciplinas = ["Ética Profissional", "Direito Civil", "Direito Processual Civil", "Direito Constitucional", "Direito Administrativo", "Direito Penal", "Direito Processual Penal", "Direito do Trabalho", "Direito Processual do Trabalho", "Direito Tributário", "Direito Empresarial", "Direito Internacional", "Direito Ambiental", "Direito Previdenciário", "Direito Financeiro", "Direito Eleitoral", "Direitos Humanos", "Filosofia do Direito", "Direito do Consumidor", "Estatuto da Criança e do Adolescente"];

        // Renderizar Disciplinas
        const container = document.getElementById('disciplinasList');
        disciplinas.forEach(d => {
            container.innerHTML += `<div class="flex items-center"><input type="checkbox" class="mr-2"> ${d}</div>`;
        });

        // Lógica de Arquivos (Simulação de visualização)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0].name;
            const li = document.createElement('li');
            li.className = "flex justify-between bg-blue-50 p-2 rounded";
            li.innerHTML = `<span>${fileName}</span> <button class="text-red-500" onclick="this.parentElement.remove()">Excluir</button>`;
            document.getElementById('listaArquivos').appendChild(li);
        });

        // Contador
        setInterval(() => {
            const diff = new Date("Sep 1, 2026").getTime() - new Date().getTime();
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerText = `${d} dias restantes`;
        }, 1000);

        function salvarErro() {
            const input = document.getElementById("erroInput");
            const li = document.createElement("li");
            li.className = "p-2 border-b flex justify-between";
            li.innerHTML = `<span>${input.value}</span><button onclick="this.parentElement.remove()" class="text-xs text-gray-400">Apagar</button>`;
            document.getElementById("listaErros").appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>
