<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel OAB - Estudo Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-800 mb-6 text-center">Painel de Estudos OAB</h1>

        <div class="bg-white p-4 rounded-lg shadow-md mb-6 text-center">
            <h2 class="text-xl font-semibold">Exame 47: 76 dias restantes (Setembro/2026)</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Disciplinas e Provas</h2>
                <select id="disciplinaSelect" class="w-full p-2 border rounded mb-4"></select>
                <div id="displayTempo" class="text-3xl font-mono text-center mb-4">00:00:00</div>
                <div class="flex gap-2">
                    <button onclick="toggleEstudo()" id="btnStart" class="bg-green-600 text-white px-4 py-2 rounded flex-1">Iniciar</button>
                    <button onclick="finalizarEstudo()" class="bg-red-600 text-white px-4 py-2 rounded flex-1">Finalizar</button>
                </div>
                <button onclick="registrarProva()" class="w-full mt-4 bg-indigo-700 text-white py-3 rounded font-bold">REGISTRAR: Prova Respondida</button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Arquivos de Provas</h2>
                <input type="file" id="fileInput" accept="application/pdf" class="block w-full text-sm mb-4">
                <ul id="listaArquivos" class="space-y-2"></ul>
                <div id="pdfViewer" class="mt-4 hidden">
                    <p class="text-xs font-bold text-gray-500">Visualizador:</p>
                    <embed id="pdfEmbed" src="" type="application/pdf" width="100%" height="200px" />
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Mural de Estudos e Provas</h2>
                <ul id="muralHistorico" class="text-sm space-y-2 h-64 overflow-y-auto"></ul>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Caderno de Erros (Tamanho Grande)</h2>
                <textarea id="erroInput" rows="15" class="w-full p-3 border rounded text-sm" placeholder="Cole suas questões e fundamentações aqui..."></textarea>
                <button onclick="salvarErro()" class="mt-2 w-full bg-blue-600 text-white py-2 rounded font-semibold">Salvar Erro</button>
                <ul id="listaErros" class="mt-4 space-y-2 h-64 overflow-y-auto border-t pt-2"></ul>
            </div>
        </div>
    </div>

    <script>
        const disciplinas = ["PROVA", "Ética Profissional", "Direito Civil", "Direito Processual Civil", "Direito Constitucional", "Direito Administrativo", "Direito Penal", "Direito Processual Penal", "Direito do Trabalho", "Direito Processual do Trabalho", "Direito Tributário", "Direito Empresarial"];
        let tempoSegundos = 0, timerInterval, startTime;

        document.getElementById('disciplinaSelect').innerHTML = disciplinas.map(d => `<option value="${d}">${d}</option>`).join('');

        // Função para abrir PDF no visualizador
        function abrirPdf(url) {
            const viewer = document.getElementById('pdfViewer');
            const embed = document.getElementById('pdfEmbed');
            embed.src = url;
            viewer.classList.remove('hidden');
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-gray-50 p-2 rounded";
            li.innerHTML = `<span class="cursor-pointer text-blue-700 underline" onclick="abrirPdf('${url}')">${file.name}</span> 
                            <button class="text-red-500 font-bold ml-2" onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('listaArquivos').appendChild(li);
        });

        // Funções de cronômetro e histórico mantidas como antes...
        function toggleEstudo() {
            const btn = document.getElementById('btnStart');
            if (btn.innerText === "Iniciar") {
                startTime = new Date().toLocaleTimeString();
                timerInterval = setInterval(() => { tempoSegundos++; updateDisplay(); }, 1000);
                btn.innerText = "Pausar";
            } else {
                clearInterval(timerInterval);
                btn.innerText = "Iniciar";
            }
        }

        function updateDisplay() {
            const h = Math.floor(tempoSegundos / 3600).toString().padStart(2, '0');
            const m = Math.floor((tempoSegundos % 3600) / 60).toString().padStart(2, '0');
            const s = (tempoSegundos % 60).toString().padStart(2, '0');
            document.getElementById('displayTempo').innerText = `${h}:${m}:${s}`;
        }

        function finalizarEstudo() {
            clearInterval(timerInterval);
            const disc = document.getElementById('disciplinaSelect').value;
            const li = document.createElement('li');
            li.className = "border-b p-1 flex justify-between";
            li.innerHTML = `<span>📚 <b>${disc}</b>: ${startTime} às ${new Date().toLocaleTimeString()}</span> 
                            <button onclick="this.parentElement.remove()" class="text-red-500 font-bold ml-2">X</button>`;
            document.getElementById('muralHistorico').appendChild(li);
            tempoSegundos = 0;
            document.getElementById('displayTempo').innerText = "00:00:00";
        }

        function registrarProva() {
            const disc = document.getElementById('disciplinaSelect').value;
            const li = document.createElement('li');
            li.className = "border-b p-2 flex justify-between bg-indigo-50";
            li.innerHTML = `<span>📝 <b>${disc}</b>: ${new Date().toLocaleDateString()} às ${new Date().toLocaleTimeString()}</span> 
                            <button onclick="this.parentElement.remove()" class="text-red-500 font-bold ml-2">X</button>`;
            document.getElementById('muralHistorico').appendChild(li);
        }

        function salvarErro() {
            const input = document.getElementById("erroInput");
            if (!input.value) return;
            const li = document.createElement('li');
            li.className = "border-b pb-2 text-sm flex justify-between";
            li.innerHTML = `<span style="white-space: pre-wrap;">${input.value}</span> <button onclick="this.parentElement.remove()" class="text-red-500 font-bold ml-2">X</button>`;
            document.getElementById('listaErros').appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>
