<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Estudos - OAB Exame 47</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-800 mb-6 text-center">Meu Cronograma OAB - Exame 47</h1>

        <!-- Cronômetro -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-6 text-center">
            <h2 class="text-xl font-semibold mb-2">Tempo Restante para a Prova (Setembro/2026)</h2>
            <div id="timer" class="text-4xl font-mono text-blue-600 font-bold">--:--:--:--</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Cronograma Disciplinas -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Disciplinas</h2>
                <ul class="space-y-2">
                    <li class="flex justify-between items-center bg-gray-50 p-2 rounded">Ética Profissional <input type="checkbox"></li>
                    <li class="flex justify-between items-center bg-gray-50 p-2 rounded">Direito Civil <input type="checkbox"></li>
                    <li class="flex justify-between items-center bg-gray-50 p-2 rounded">Direito Constitucional <input type="checkbox"></li>
                    <li class="flex justify-between items-center bg-gray-50 p-2 rounded">Direito Administrativo <input type="checkbox"></li>
                </ul>
            </div>

            <!-- Upload de Provas -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4">Upload de Provas (PDF)</h2>
                <input type="file" accept=".pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

        </div>

        <!-- Caderno de Erros -->
        <div class="bg-white p-6 rounded-lg shadow-md mt-6">
            <h2 class="text-xl font-semibold mb-4">Caderno de Revisão (Erros)</h2>
            <div class="space-y-4">
                <textarea id="erroInput" class="w-full p-2 border rounded" placeholder="Digite a questão errada e a fundamentação..."></textarea>
                <button onclick="adicionarErro()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Salvar Erro</button>
            </div>
            <ul id="listaErros" class="mt-4 space-y-2"></ul>
        </div>
    </div>

    <script>
        // Contador Regressivo para 01 de Setembro de 2026
        const targetDate = new Date("Sep 1, 2026 08:00:00").getTime();
        
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("timer").innerHTML = `${days}d ${hours}h ${minutes}m`;
        }, 1000);

        // Função Caderno de Erros
        function adicionarErro() {
            const input = document.getElementById("erroInput");
            const lista = document.getElementById("listaErros");
            if (input.value.trim() !== "") {
                const li = document.createElement("li");
                li.className = "bg-red-50 p-3 rounded border-l-4 border-red-500";
                li.innerText = input.value;
                lista.appendChild(li);
                input.value = "";
            }
        }
    </script>
</body>
</html>
