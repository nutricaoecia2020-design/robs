<script>
(() => {

    {id:'demo-1',active:true,featured:true,title:'Condomínio Vila Vitória',ref:'520',purpose:'Venda',type:'Apartamento',price:320000,city:'Aracaju',neighborhood:'Jabotiana',address:'Endereço sob consulta',area:78,bedrooms:3,suites:1,bathrooms:2,parking:1,condo:480,iptu:950,description:'Apartamento bem localizado, com sala ventilada, cozinha planejada, quartos confortáveis e vaga de garagem. Descrição completa pode ser editada na área interna.',features:'Portaria 24h\nElevador\nÁrea de lazer\nSalão de festas\nGaragem',photos:[],createdAt:Date.now()-80000,updatedAt:Date.now()-80000},

  ];

  function loadLocal(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){ state.data = {...state.data, ...JSON.parse(raw)}; } }catch(e){} }
  function baseUrl(){ return (state.data.config.firebaseUrl || DEFAULT_DB).replace(/\/$/,''); }
  async function fbGet(path){ const r = await fetch(`${baseUrl()}/${APP_PATH}/${path}.json?ts=${Date.now()}`); if(!r.ok) throw new Error('Firebase bloqueou a leitura'); return await r.json(); }
  async function fbPut(path, value){ const r = await fetch(`${baseUrl()}/${APP_PATH}/${path}.json`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(value)}); if(!r.ok) throw new Error('Firebase bloqueou a gravação'); return await r.json(); }
  async function fbPatch(path, value){ const r = await fetch(`${baseUrl()}/${APP_PATH}/${path}.json`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(value)}); if(!r.ok) throw new Error('Firebase bloqueou a gravação'); return await r.json(); }
  async function fbDel(path){ const r = await fetch(`${baseUrl()}/${APP_PATH}/${path}.json`, {method:'DELETE'}); if(!r.ok) throw new Error('Firebase bloqueou a exclusão'); return await r.json(); }
  async function loadFirebase(){
    try{
      const remote = await fbGet('');
      if(remote){
        state.data.profile = {...state.data.profile, ...(remote.profile||{})};

        state.data.properties = Object.values(remote.properties || {}).filter(Boolean);

      state.connected = true; state.message = 'Firebase conectado.';

    if(!state.data.properties.length) state.data.properties = sample;
    saveLocal();
  }
  function waLink(text){ return `https://wa.me/${whatsNumber(state.data.profile.phone)}?text=${encodeURIComponent(text)}`; }

  function renderHome(){ const prof=state.data.profile; const filters = getFilters(); let items = state.data.properties.filter(p=>p.active!==false);

    if(filters.max) items=items.filter(p=>(+p.price||0)<=+filters.max); if(filters.bedrooms) items=items.filter(p=>(+p.bedrooms||0)>=+filters.bedrooms);

    $('#app').innerHTML = publicLayout(html); bindHome(); }
  function card(p){ const image=imgOf(p); const msg=`Olá Roberto, tenho interesse no imóvel ${p.title} (ref. ${p.ref||p.id}).`; return `<article class="card"><div class="photo ${image?'':'empty'}" style="${image?`background-image:url('${cssUrl(image)}')`:''}">${image?'':'<div class="camera"></div>'}<span class="badge">${esc(p.purpose||'Imóvel')}</span><span class="type">${esc(p.type||'Imóvel')}</span></div><div class="card-body"><h3>${esc(p.title||'Imóvel sem título')}</h3><div class="price">${money(p.price)}</div><div class="meta"><span class="pill">Ref. ${esc(p.ref||'-')}</span><span class="pill">${esc(p.neighborhood||p.city||'Localização')}</span><span class="pill">${p.bedrooms||0} quartos</span><span class="pill">${p.area||0} m²</span></div><div class="card-actions"><button class="primary" data-detail="${esc(p.id)}">Detalhes</button><a class="ghost" href="${waLink(msg)}" target="_blank" rel="noopener">WhatsApp</a></div></div></article>`; }
  function renderDetail(id){ const p=state.data.properties.find(x=>x.id===id); if(!p){ renderHome(); return; } state.galleryIndex=0; const prof=state.data.profile; const photos=(p.photos||[]).filter(Boolean); const main=photos[0]||''; const msg=`Olá Roberto, quero detalhes do imóvel ${p.title} (ref. ${p.ref||p.id}).`; const content=`<main class="wrap detail"><a class="back" href="#">← Voltar para imóveis</a><h1>${esc(p.title)} <span class="tiny">(ref. ${esc(p.ref||'-')})</span></h1><div class="detail-grid"><section><div class="panel gallery"><div class="main-img ${main?'':'empty'}" id="mainImg" style="${main?`background-image:url('${cssUrl(main)}')`:''}">${main?'':'<div class="camera"></div>'}</div>${photos.length>1?`<div class="thumbs">${photos.map((src,i)=>`<button class="thumb ${i===0?'active':''}" data-thumb="${i}" style="background-image:url('${cssUrl(src)}')" aria-label="Foto ${i+1}"></button>`).join('')}</div>`:''}</div><div class="panel detail-copy"><h2>${money(p.price)}</h2><div class="meta"><span class="pill">${esc(p.purpose)}</span><span class="pill">${esc(p.type)}</span><span class="pill">${esc(p.neighborhood||'')}</span><span class="pill">${esc(p.city||'')}</span></div><div class="specs"><div class="spec"><small>Área</small><b>${p.area||0} m²</b></div><div class="spec"><small>Quartos</small><b>${p.bedrooms||0}</b></div><div class="spec"><small>Suítes</small><b>${p.suites||0}</b></div><div class="spec"><small>Banheiros</small><b>${p.bathrooms||0}</b></div><div class="spec"><small>Vagas</small><b>${p.parking||0}</b></div><div class="spec"><small>Condomínio</small><b>${money(p.condo)}</b></div><div class="spec"><small>IPTU</small><b>${money(p.iptu)}</b></div><div class="spec"><small>Ref.</small><b>${esc(p.ref||'-')}</b></div></div><h3>Descrição completa</h3><p class="desc">${esc(p.description||'Descrição não informada.')}</p>${p.features?`<h3>Características</h3><ul>${String(p.features).split('\n').filter(Boolean).map(f=>`<li>${esc(f)}</li>`).join('')}</ul>`:''}</div></section><aside class="side"><div class="panel"><h3>Compartilhe</h3><div class="share-row"><a class="share s-wa" href="${waLink(msg)}" target="_blank" rel="noopener">W</a><a class="share s-tg" href="https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(p.title)}" target="_blank" rel="noopener">T</a><a class="share s-fb" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank" rel="noopener">f</a><a class="share s-em" href="mailto:?subject=${encodeURIComponent(p.title)}&body=${encodeURIComponent(location.href)}">@</a></div></div><div class="panel"><h3>WhatsApp</h3><a class="whatsapp-big" href="${waLink(msg)}" target="_blank" rel="noopener">Envie uma mensagem</a></div><div class="panel"><h3>Entre em contato</h3><div class="contact-row"><b>${esc(prof.name)}</b></div><div class="contact-row">${esc(prof.role)} · ${esc(prof.creci)}</div><div class="contact-row">${esc(prof.phone)}</div><div class="contact-row">${esc(prof.city||'')}</div></div></aside></div></main>`; $('#app').innerHTML = publicLayout(content); bindDetail(p); }
  function renderLogin(){ $('#app').innerHTML = `<div class="login"><div class="login-card"><div class="logo">RV</div><h1>Área interna</h1><p>Cadastro dos seus imóveis, fotos, descrição completa e dados do corretor.</p><div class="notice danger-note">Esta tela funciona como painel administrativo no site estático. Para produção, proteja o Firebase com Authentication e regras de segurança.</div><div class="field"><label>Senha</label><input id="pass" type="password" placeholder="Digite a senha"></div><div class="form-actions"><button class="primary" id="loginBtn">Entrar</button><button class="ghost" id="goSite">Ver site externo</button></div></div></div>`; $('#loginBtn').onclick=()=>{ if($('#pass').value === String(state.data.config.adminPassword||'2703')){ sessionStorage.setItem(ADMIN_KEY,'1'); state.view='admin'; renderAdmin(); } else alert('Senha incorreta.'); }; $('#goSite').onclick=()=>{ state.view='public'; renderHome(); }; }
  function renderAdmin(){ if(sessionStorage.getItem(ADMIN_KEY)!=='1'){ renderLogin(); return; } const tabs={properties:'Imóveis',profile:'Meus dados',firebase:'Firebase'}; $('#app').innerHTML = `<div class="admin-shell"><aside class="admin-side"><div class="logo">RV</div><h2>Roberto Imóveis</h2><p>Painel interno</p>${Object.entries(tabs).map(([k,v])=>`<button class="navbtn ${state.adminTab===k?'active':''}" data-tab="${k}">${v}</button>`).join('')}<hr style="border:0;border-top:1px solid #2d485c;margin:22px 0"><button class="navbtn" id="viewSite">Ver site externo</button><button class="navbtn" id="logout">Sair</button></aside><main class="admin-main"><div class="admin-head"><h1>${tabs[state.adminTab]}</h1><span class="status"><span class="dot ${state.connected?'ok':'bad'}"></span>${state.connected?'Firebase conectado':'Modo local'}</span></div>${state.message?`<div class="notice ${state.connected?'success':''}">${esc(state.message)}</div>`:''}<div id="adminContent"></div></main></div>`; $$('.navbtn[data-tab]').forEach(b=>b.onclick=()=>{state.adminTab=b.dataset.tab;renderAdmin();}); $('#viewSite').onclick=()=>{state.view='public';renderHome();}; $('#logout').onclick=()=>{sessionStorage.removeItem(ADMIN_KEY);renderHome();}; if(state.adminTab==='properties') renderAdminProperties(); if(state.adminTab==='profile') renderProfile(); if(state.adminTab==='firebase') renderFirebase(); }
  function renderAdminProperties(editId){ const p = editId ? state.data.properties.find(x=>x.id===editId) : blankProperty(); $('#adminContent').innerHTML = `<section class="admin-card"><h2>${editId?'Editar imóvel':'Cadastrar imóvel'}</h2><form id="propForm"><input type="hidden" name="id" value="${esc(p.id||'')}"><div class="grid3"><div class="field"><label>Título</label><input name="title" required value="${esc(p.title||'')}" placeholder="Condomínio, casa, terreno..."></div><div class="field"><label>Referência</label><input name="ref" value="${esc(p.ref||'')}" placeholder="Ex: 520"></div><div class="field"><label>Status</label><select name="active"><option value="true" ${p.active!==false?'selected':''}>Publicado</option><option value="false" ${p.active===false?'selected':''}>Rascunho</option></select></div></div><div class="grid4"><div class="field"><label>Finalidade</label><select name="purpose">${opts(['Venda','Aluguel','Temporada'],p.purpose||'Venda')}</select></div><div class="field"><label>Tipo</label><input name="type" value="${esc(p.type||'Apartamento')}" placeholder="Apartamento, casa..."></div><div class="field"><label>Preço</label><input name="price" type="number" value="${esc(p.price||'')}"></div><div class="field"><label>Destaque</label><select name="featured"><option value="false" ${!p.featured?'selected':''}>Não</option><option value="true" ${p.featured?'selected':''}>Sim</option></select></div></div><div class="grid3"><div class="field"><label>Cidade</label><input name="city" value="${esc(p.city||'Aracaju')}"></div><div class="field"><label>Bairro</label><input name="neighborhood" value="${esc(p.neighborhood||'')}"></div><div class="field"><label>Endereço</label><input name="address" value="${esc(p.address||'')}"></div></div><div class="grid4"><div class="field"><label>Área m²</label><input name="area" type="number" value="${esc(p.area||'')}"></div><div class="field"><label>Quartos</label><input name="bedrooms" type="number" value="${esc(p.bedrooms||'')}"></div><div class="field"><label>Suítes</label><input name="suites" type="number" value="${esc(p.suites||'')}"></div><div class="field"><label>Banheiros</label><input name="bathrooms" type="number" value="${esc(p.bathrooms||'')}"></div></div><div class="grid3"><div class="field"><label>Vagas</label><input name="parking" type="number" value="${esc(p.parking||'')}"></div><div class="field"><label>Condomínio</label><input name="condo" type="number" value="${esc(p.condo||'')}"></div><div class="field"><label>IPTU anual</label><input name="iptu" type="number" value="${esc(p.iptu||'')}"></div></div><div class="field"><label>Descrição total do imóvel</label><textarea name="description" placeholder="Informe todos os detalhes do imóvel">${esc(p.description||'')}</textarea></div><div class="field"><label>Características, uma por linha</label><textarea name="features" placeholder="Piscina\nElevador\nÁrea gourmet">${esc(p.features||'')}</textarea></div><div class="field"><label>Fotos por link</label><div class="photo-inputs" id="photoInputs">${[...(p.photos||[]),''].slice(0,12).map(src=>photoInput(src)).join('')}</div><button class="ghost" type="button" id="addPhoto">Adicionar campo de foto</button></div><div class="field"><label>Enviar fotos do computador</label><input type="file" id="filePhotos" accept="image/*" multiple><p class="tiny">As fotos são reduzidas antes de salvar. Para muitas fotos em alta resolução, use Firebase Storage e cole os links.</p></div><div class="form-actions"><button class="primary" type="submit">Salvar imóvel</button><button class="ghost" type="button" id="newForm">Novo cadastro</button>${editId?'<button class="danger" type="button" id="deleteProp">Excluir</button>':''}</div></form></section><section class="admin-card"><h2>Imóveis cadastrados</h2><table class="list-table"><thead><tr><th>Imóvel</th><th>Preço</th><th>Status</th><th>Ações</th></tr></thead><tbody>${state.data.properties.map(rowProp).join('')}</tbody></table></section>`; bindPropForm(editId); }
  function rowProp(p){ return `<tr><td><b>${esc(p.title)}</b><div class="tiny">Ref. ${esc(p.ref||'-')} · ${esc(p.type||'')} · ${esc(p.neighborhood||p.city||'')}</div></td><td>${money(p.price)}</td><td>${p.active!==false?'Publicado':'Rascunho'}${p.featured?' · Destaque':''}</td><td><button class="ghost" data-edit="${esc(p.id)}">Editar</button> <button class="secondary" data-open="${esc(p.id)}">Ver</button></td></tr>`; }
  function renderProfile(){ const p=state.data.profile; $('#adminContent').innerHTML = `<section class="admin-card"><h2>Dados no site interno e externo</h2><form id="profileForm"><div class="grid2"><div class="field"><label>Nome</label><input name="name" value="${esc(p.name)}"></div><div class="field"><label>Função</label><input name="role" value="${esc(p.role)}"></div></div><div class="grid3"><div class="field"><label>CRECI</label><input name="creci" value="${esc(p.creci)}"></div><div class="field"><label>WhatsApp</label><input name="phone" value="${esc(p.phone)}"></div><div class="field"><label>Cidade</label><input name="city" value="${esc(p.city)}"></div></div><div class="field"><label>Slogan</label><input name="slogan" value="${esc(p.slogan)}"></div><div class="field"><label>E-mail</label><input name="email" value="${esc(p.email||'')}"></div><div class="field"><label>Logo por link</label><input name="logoUrl" value="${esc(p.logoUrl||'')}" placeholder="Opcional"></div><div class="field"><label>Bio</label><textarea name="bio">${esc(p.bio||'')}</textarea></div><div class="form-actions"><button class="primary" type="submit">Salvar meus dados</button></div></form></section>`; $('#profileForm').onsubmit=async e=>{e.preventDefault(); const fd=new FormData(e.target); state.data.profile=Object.fromEntries(fd.entries()); await persist('profile', state.data.profile); renderAdmin();}; }
  function renderFirebase(){ const c=state.data.config; $('#adminContent').innerHTML = `<section class="admin-card"><h2>Conexão Firebase Realtime Database</h2><div class="notice">O app usa REST API do Realtime Database. Caminho dos dados: <b>${APP_PATH}</b>. Se as regras não permitirem leitura/gravação, ele mantém fallback local neste navegador.</div><form id="fbForm"><div class="field"><label>URL do Realtime Database</label><input name="firebaseUrl" value="${esc(c.firebaseUrl||DEFAULT_DB)}" placeholder="https://seu-projeto-default-rtdb.firebaseio.com"></div><div class="field"><label>Senha da área interna</label><input name="adminPassword" value="${esc(c.adminPassword||'2703')}"></div><div class="form-actions"><button class="primary" type="submit">Salvar configuração</button><button class="secondary" type="button" id="testFb">Testar conexão</button><button class="ghost" type="button" id="syncAll">Enviar tudo para Firebase</button></div></form></section><section class="admin-card"><h2>Regras Firebase para teste</h2><pre style="white-space:pre-wrap;background:#102d44;color:#d8edf8;padding:16px;border-radius:12px">{
  "rules": {
    "${APP_PATH}": {
      ".read": true,
      ".write": true
    }
  }
}</pre><p class="tiny">Use regras abertas apenas para teste. Em produção, use Firebase Authentication para proteger o painel interno.</p></section>`; $('#fbForm').onsubmit=async e=>{e.preventDefault(); const fd=new FormData(e.target); state.data.config={...state.data.config,...Object.fromEntries(fd.entries())}; saveLocal(); state.message='Configuração salva neste navegador. A senha não é enviada ao Firebase.'; renderAdmin();}; $('#testFb').onclick=async()=>{await loadFirebase(); renderAdmin();}; $('#syncAll').onclick=async()=>{await persist('', publicExport()); renderAdmin();}; }
  function bindHome(){ ['q','purpose','type','city','max','bedrooms','sort'].forEach(id=>{ const el=$('#'+id); if(el) el.oninput=()=>{ setFilter(id, el.value); renderHome(); }; }); $('#toggleFilters').onclick=()=>{ setFilter('open', !getFilters().open); renderHome(); }; $('#clearFilters').onclick=()=>{ localStorage.removeItem('rv_filters'); renderHome(); }; $$('[data-detail]').forEach(b=>b.onclick=()=>{ location.hash='imovel/'+b.dataset.detail; }); $('[data-go-admin]').onclick=()=>{ state.view='admin'; renderAdmin(); }; }
  function bindDetail(p){ $('.back').onclick=e=>{e.preventDefault(); location.hash=''; renderHome();}; $$('[data-thumb]').forEach(btn=>btn.onclick=()=>{ const i=+btn.dataset.thumb; const src=p.photos[i]; $('#mainImg').style.backgroundImage=`url('${cssUrl(src)}')`; $$('.thumb').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); }); $('[data-go-admin]').onclick=()=>{state.view='admin';renderAdmin();}; }
  function bindPropForm(editId){ $('#newForm').onclick=()=>renderAdminProperties(); $('#addPhoto').onclick=()=>$('#photoInputs').insertAdjacentHTML('beforeend', photoInput('')); $$('#photoInputs .danger').forEach(b=>b.onclick=()=>b.closest('.photo-row').remove()); $$('[data-edit]').forEach(b=>b.onclick=()=>renderAdminProperties(b.dataset.edit)); $$('[data-open]').forEach(b=>b.onclick=()=>{state.view='public';location.hash='imovel/'+b.dataset.open;renderDetail(b.dataset.open);}); $('#filePhotos').onchange=async e=>{ const rows=[]; for(const file of e.target.files){ try{ rows.push(await resizeImage(file,1200,.78)); }catch(err){ alert('Não foi possível ler uma foto.'); } } rows.forEach(src=>$('#photoInputs').insertAdjacentHTML('beforeend', photoInput(src))); $$('#photoInputs .danger').forEach(b=>b.onclick=()=>b.closest('.photo-row').remove()); }; $('#propForm').onsubmit=async e=>{ e.preventDefault(); const fd=new FormData(e.target); let obj=Object.fromEntries(fd.entries()); obj.id = obj.id || uid(); obj.active = obj.active==='true'; obj.featured = obj.featured==='true'; obj.photos = $$('#photoInputs input').map(i=>i.value.trim()).filter(Boolean); obj.createdAt = (state.data.properties.find(x=>x.id===obj.id)||{}).createdAt || Date.now(); obj.updatedAt = Date.now(); obj = normalize(obj); const i=state.data.properties.findIndex(x=>x.id===obj.id); if(i>=0) state.data.properties[i]=obj; else state.data.properties.unshift(obj); await persist('properties/'+obj.id, obj); state.message='Imóvel salvo.'; renderAdmin(); }; if(editId) $('#deleteProp').onclick=async()=>{ if(confirm('Excluir este imóvel?')){ state.data.properties=state.data.properties.filter(x=>x.id!==editId); await remove('properties/'+editId); state.message='Imóvel excluído.'; renderAdmin(); } }; }
  function publicExport(){ const properties={}; state.data.properties.forEach(p=>properties[p.id]=p); return {profile:state.data.profile, properties, config:{updatedAt:Date.now(), note:'Dados públicos do site. Senha e credenciais não ficam neste banco.'}}; }
  async function persist(path, value){ saveLocal(); try{ path ? await fbPut(path,value) : await fbPut('',value); state.connected=true; state.message='Dados salvos no Firebase.'; }catch(e){ state.connected=false; state.message='Salvo localmente. Firebase não permitiu gravação agora.'; } saveLocal(); }
  async function remove(path){ saveLocal(); try{ await fbDel(path); state.connected=true; }catch(e){ state.connected=false; } saveLocal(); }
  function blankProperty(){ return {id:'',active:true,featured:false,title:'',ref:'',purpose:'Venda',type:'Apartamento',price:'',city:'Aracaju',neighborhood:'',address:'',area:'',bedrooms:'',suites:'',bathrooms:'',parking:'',condo:'',iptu:'',description:'',features:'',photos:[]}; }
  function resizeImage(file, max=1200, quality=.78){ return new Promise((res,rej)=>{ const img=new Image(); const fr=new FileReader(); fr.onerror=rej; fr.onload=()=>{ img.onload=()=>{ const scale=Math.min(1,max/Math.max(img.width,img.height)); const c=document.createElement('canvas'); c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale); const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',quality)); }; img.onerror=rej; img.src=fr.result; }; fr.readAsDataURL(file); }); }
  function getFilters(){ try{return JSON.parse(localStorage.getItem('rv_filters')||'{}')}catch(e){return{}} } function setFilter(k,v){ const f=getFilters(); f[k]=v; localStorage.setItem('rv_filters',JSON.stringify(f)); }
  function sortItems(items, sort){ return [...items].sort((a,b)=> sort==='preco-menor' ? (+a.price||0)-(+b.price||0) : sort==='preco-maior' ? (+b.price||0)-(+a.price||0) : (b.createdAt||0)-(a.createdAt||0)); }
  function opts(arr, selected){ return arr.map(v=>`<option value="${esc(v)}" ${String(v)===String(selected)?'selected':''}>${esc(v)}</option>`).join(''); }
  function photoInput(src){ return `<div class="photo-row"><input value="${esc(src||'')}" placeholder="https://... ou foto carregada"><button class="danger" type="button">Remover</button></div>`; }
  function esc(s){ return String(s??'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function cssUrl(s){ return String(s||'').replace(/['")\\]/g,''); }
  function boot(){ loadLocal(); loadFirebase().then(()=>{ const h=location.hash.replace(/^#/,''); if(h.startsWith('imovel/')) renderDetail(h.split('/')[1]); else renderHome(); }); window.addEventListener('hashchange',()=>{ const h=location.hash.replace(/^#/,''); if(h.startsWith('imovel/')) renderDetail(h.split('/')[1]); else if(state.view==='public') renderHome(); }); }
  boot();
})();
</script>
</body>
