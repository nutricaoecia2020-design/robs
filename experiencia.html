<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;        
            --primary-hover: #6d28d9;  
            --bg-dark: #0f0f12;        
            --bg-card: #1a1a1f;        
            --bg-input: #2d2d35;       
            --text-white: #ffffff;
            --text-dim: #a0a0a0;
            --accent-gold: #f59e0b;    
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-white); margin: 0; padding-bottom: 50px; }

        header {
            background: rgba(15, 15, 18, 0.95);
            padding: 20px;
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .logo h1 { color: white; margin: 0; font-size: 22px; font-weight: 800; }
        .logo span { color: var(--primary); }

        .cart-trigger {
            background: var(--primary); color: white; padding: 10px 20px;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        .category-title { color: var(--primary); font-size: 22px; margin: 40px 0 20px 0; border-left: 4px solid var(--primary); padding-left: 10px; }

        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .produto-card {
            background: var(--bg-card); border-radius: 16px; padding: 15px;
            border: 1px solid #333; transition: 0.3s;
        }

        .prod-price { color: var(--primary); font-weight: 900; font-size: 18px; margin: 10px 0; }

        select.sabores { background: var(--bg-input); color: white; border: none; padding: 8px; border-radius: 8px; width: 100%; margin-bottom: 10px; }

        .btn-add { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; width: 100%; font-weight: 700;
        }

        .cart-sidebar {
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%;
            background: var(--bg-card); z-index: 1001; transition: 0.4s; padding: 25px;
        }
        .cart-sidebar.active { right: 0; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>Cantinho do <span>Robs</span></h1></div>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i> <span id="contagem">0</span>
    </div>
</header>

<div class="container">
    <div id="cardapio">
        <h3 class="category-title">Pizzas</h3>
        <div id="cat-pizzas" class="grid-produtos"></div>

        <h3 class="category-title">Bebidas</h3>
        <div id="cat-bebidas" class="grid-produtos"></div>
    </div>
    
    <div id="finalizacao" style="margin-top: 50px; background: var(--bg-card); padding: 25px; border-radius: 16px;">
        <h3>Finalizar Pedido</h3>
        <input id="nome" placeholder="Nome Completo" style="width:100%; padding: 12px; margin-bottom:10px; border-radius:8px; border:none;">
        <button class="btn-add" onclick="finalizar()">Enviar via WhatsApp</button>
    </div>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <h2 style="color:var(--primary)">Seu Carrinho</h2>
    <div id="carrinhoItens"></div>
    <div style="font-size: 20px; font-weight: bold; margin-top:20px;">Total: R$ <span id="total">0.00</span></div>
    <button class="btn-add" style="margin-top:20px;" onclick="toggleCart()">Voltar</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzK5DrWIcbh1p_0VGzc5PQIbke6PJS6RoGwbrkNxUNLQor1-oaQoks3Hxs2f5o9upFi/exec";
    let carrinho = [];
    let produtos = [];

    async function carregar() {
        const res = await fetch(API_URL);
        produtos = await res.json();
        renderizar();
    }

    function renderizar() {
        const divPizzas = document.getElementById("cat-pizzas");
        const divBebidas = document.getElementById("cat-bebidas");

        produtos.forEach((p, i) => {
            const isPizza = p.nome.toLowerCase().includes("pizza");
            const html = `
                <div class="produto-card">
                    <strong>${p.nome}</strong>
                    ${isPizza ? `
                        <select class="sabores" id="sabor1-${i}"><option>Sabor 1</option><option>Calabresa</option><option>Mussarela</option></select>
                        <select class="sabores" id="sabor2-${i}"><option>Sabor 2 (Opcional)</option><option>Calabresa</option><option>Mussarela</option></select>
                    ` : ''}
                    <div class="prod-price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                    <button class="btn-add" onclick="add(${i})">Adicionar</button>
                </div>`;
            
            isPizza ? divPizzas.innerHTML += html : divBebidas.innerHTML += html;
        });
    }

    window.add = (i) => {
        const p = produtos[i];
        let nome = p.nome;
        if(p.nome.toLowerCase().includes("pizza")) {
            const s1 = document.getElementById(`sabor1-${i}`).value;
            const s2 = document.getElementById(`sabor2-${i}`).value;
            nome += ` (${s1} + ${s2 !== 'Sabor 2 (Opcional)' ? s2 : 'Simples'})`;
        }
        carrinho.push({nome, preco: p.preco});
        renderCarrinho();
    };

    function renderCarrinho() {
        const area = document.getElementById("carrinhoItens");
        area.innerHTML = carrinho.map(item => `<div>${item.nome} - R$ ${item.preco}</div>`).join('');
        document.getElementById("contagem").innerText = carrinho.length;
        document.getElementById("total").innerText = carrinho.reduce((acc, curr) => acc + parseFloat(curr.preco), 0).toFixed(2);
    }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }

    function finalizar() {
        const msg = `Pedido: ${carrinho.map(i => i.nome).join(', ')}`;
        window.open(`https://wa.me/5579920001038?text=${encodeURIComponent(msg)}`, "_blank");
    }

    carregar();
</script>
</body>
</html>
