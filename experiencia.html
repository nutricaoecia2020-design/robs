<div id="rastreio-pedido">
    <h3>Acompanhe seu pedido</h3>
    <input type="text" id="pedidoInput" placeholder="Digite o ID do pedido...">
    <button onclick="buscarPedido()">Buscar</button>
    <div id="resultado"></div>
</div>

<script>
async function buscarPedido() {
    const idBusca = document.getElementById('pedidoInput').value;
    const urlCSV = 'COLE_AQUI_O_LINK_DO_SEU_CSV'; // Cole o link que você pegou no Google Sheets

    try {
        const response = await fetch(urlCSV);
        const data = await response.text();
        const linhas = data.split('\n');
        
        let encontrado = false;
        for (let i = 1; i < linhas.length; i++) {
            const colunas = linhas[i].split(',');
            if (colunas[0] === idBusca) {
                document.getElementById('resultado').innerText = "Status: " + colunas[1];
                encontrado = true;
                break;
            }
        }
        if (!encontrado) document.getElementById('resultado').innerText = "Pedido não encontrado.";
    } catch (error) {
        document.getElementById('resultado').innerText = "Erro ao buscar.";
    }
}
</script>
