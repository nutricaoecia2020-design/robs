<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliGestor Pro v6.1 | ROBS DELIVERY</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Estilos do Status */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .piscar { animation: blink 1.5s infinite; font-weight: bold; font-size: 18px; margin-bottom: 10px; text-align: center; }
        .status-aberto { color: green; }
        .status-agendamento { color: #ccac00; } 
        
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 24px; font-weight: bold; color: #6a1b9a; }
        .clock { font-size: 20px; font-weight: bold; }
        
        .main-layout { display: flex; gap: 30px; margin-top: 20px; }
        .left-panel { flex: 2; }
        .right-panel { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #ddd; height: fit-content; }
        
        /* Grid de Pizzas */
        .pizza-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .pizza-card { border: 1px solid #ccc; padding: 5px; text-align: center; border-radius: 6px; cursor: pointer; background: #fff; font-size: 11px; }
        .pizza-card:hover { background: #f3e5f5; border-color: #6a1b9a; }
        
        .prod-area { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .plus-btn { padding: 10px 20px; background: #6a1b9a; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn-del { color: red; cursor: pointer; font-weight: bold; }
        
        .total-box { text-align: center; margin: 20px 0; }
        .total-val { font-size: 32px; font-weight: bold; color: #6a1b9a; }
        button.finalizar { width: 100%; padding: 15px; background: #00c853; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="status-loja" class="piscar">Carregando...</div>
        <div class="header-top">
            <div class="logo">ROBS DELIVERY <small style="font-size: 12px; color: #666;">Sistema v6.1</small></div>
            <div id="clock" class="clock">--:--:--</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <label>Selecione a Pizza (30cm):</label>
            <div class="pizza-grid" id="pizzaGrid"></div>

            <div class="prod-area">
                <div style="flex: 3;">
                    <label>Buscar Produto (Código)</label>
                    <input type="text" id="codProduto" placeholder="Ex: 101" autofocus>
                </div>
                <div style="flex: 1;">
                    <label>Qtd</label>
                    <input type="number" id="qtd" value="1">
                </div>
                <button class="plus-btn" onclick="adicionarItem()">+</button>
            </div>

            <table>
                <thead><tr><th>COD</th><th>QTD</th><th>UNIT.</th><th>TOTAL</th><th>AÇÃO</th></tr></thead>
                <tbody id="listaItens"></tbody>
            </table>

            <div style="margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px;">
                <h3>Dados do Cliente</h3>
                <input type="text" id="nome" placeholder="Nome Completo" style="margin-bottom: 10px;">
                <input type="text" id="contato" placeholder="Contato" style="margin-bottom: 10px;">
                <input type="text" id="end" placeholder="Endereço" style="margin-bottom: 10px;">
                <label>Bairro (Taxa):</label>
                <select id="bairro" onchange="calcularTotal()">
                    <option value="0">Selecione o Bairro</option>
                    <option value="0.00">Luzia (Grátis)</option>
                    <option value="0.00">Ponto Novo (Grátis)</option>
                    <option value="6.00">Pereira Lobo (R$ 6,00)</option>
                    <option value="6.00">Jardins (R$ 6,00)</option>
                    <option value="6.00">Grageru (R$ 6,00)</option>
                    <option value="6.00">Siqueira Campos (R$ 6,00)</option>
                    <option value="6.00">São José (R$ 6,00)</option>
                </select>
            </div>
        </div>

        <div class="right-panel">
            <div class="total-box">
                <p>VALOR TOTAL</p>
                <div class="total-val">R$ <span id="totalDisplay">0,00</span></div>
            </div>
            <label>Forma de Pagamento</label>
            <select id="pagamento" style="margin-bottom: 20px;">
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartão Débito">Cartão Débito</option>
                <option value="Cartão Crédito">Cartão Crédito</option>
                <option value="Pix">Pix</option>
            </select>
            <button class="finalizar" onclick="finalizarPedido()">FINALIZAR (F2)</button>
        </div>
    </div>
</div>

<script>
    let itensPedido = [];
    let subtotalItens = 0;

    // Lógica do Status da Loja
    function verificarHorario() {
        const agora = new Date();
        const hora = agora.getHours();
        const el = document.getElementById('status-loja');
        if (hora >= 18 && hora < 22) {
            el.innerHTML = "● LOJA ABERTA";
            el.className = "piscar status-aberto";
        } else {
            el.innerHTML = "PEDIDOS PARA AGENDAMENTO";
            el.className = "piscar status-agendamento";
        }
    }

    // Gerar 20 Cards de Pizza
    const grid = document.getElementById('pizzaGrid');
    for(let i = 101; i <= 120; i++) {
        grid.innerHTML += `<div class="pizza-card" onclick="adicionarPorCard(${i})">🍕<br>Cod ${i}</div>`;
    }

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }
    setInterval(updateClock, 1000); 
    updateClock();
    verificarHorario();
    setInterval(verificarHorario, 60000);

    function adicionarPorCard(cod) { document.getElementById('codProduto').value = cod; adicionarItem(); }

    function adicionarItem() {
        let cod = document.getElementById('codProduto').value;
        let qtd = parseInt(document.getElementById('qtd').value);
        if(!cod) return;
        let valorUnit = 39.90; 
        let totalItem = valorUnit * qtd;
        itensPedido.push({cod, qtd, valorUnit, totalItem, id: Date.now()});
        subtotalItens += totalItem;
        renderizarTabela();
        document.getElementById('codProduto').value = '';
        calcularTotal();
    }

    function renderizarTabela() {
        let html = '';
        itensPedido.forEach(item => {
            html += `<tr><td>${item.cod}</td><td>${item.qtd}</td><td>R$ ${item.valorUnit.toFixed(2)}</td><td>R$ ${item.totalItem.toFixed(2)}</td>
            <td><span class="btn-del" onclick="removerItem(${item.id})">Excluir</span></td></tr>`;
        });
        document.getElementById('listaItens').innerHTML = html;
    }

    function removerItem(id) {
        let index = itensPedido.findIndex(i => i.id === id);
        subtotalItens -= itensPedido[index].totalItem;
        itensPedido.splice(index, 1);
        renderizarTabela();
        calcularTotal();
    }

    function calcularTotal() {
        let taxa = parseFloat(document.getElementById('bairro').value);
        let totalFinal = subtotalItens + taxa;
        document.getElementById('totalDisplay').innerText = totalFinal.toFixed(2).replace('.', ',');
    }

    function finalizarPedido() {
        let itensStr = itensPedido.map(i => `Cod: ${i.cod} | Qtd: ${i.qtd} | R$ ${i.totalItem.toFixed(2)}`).join('%0A');
        let msg = `*Pedido Robs Delivery*%0A
Data/Hora: ${new Date().toLocaleString()}%0A
Nome: ${document.getElementById('nome').value}%0A
Contato: ${document.getElementById('contato').value}%0A
Endereço: ${document.getElementById('end').value}%0A
Bairro: ${document.getElementById('bairro').options[document.getElementById('bairro').selectedIndex].text}%0A
---%0A${itensStr}%0A---%0A
Total: R$ ${document.getElementById('totalDisplay').innerText}%0A
Pagamento: ${document.getElementById('pagamento').value}`;
        window.open(`https://wa.me/5579920001038?text=${msg}`);
    }
</script>
</body>
</html>
