<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acompanhar Pedido - Cantinho do Robs</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box-rastreio {
            background-color: #1a1a1a;
            color: #fff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 2px solid #ff9800;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .box-rastreio h3 { color: #ff9800; margin-top: 0; font-size: 24px; }
        .box-rastreio p { color: #ccc; margin-bottom: 20px; }
        .box-rastreio input { padding: 12px; border-radius: 5px; border: none; width: 85%; margin-bottom: 15px; font-size: 16px; }
        .box-rastreio button { padding: 12px 25px; background-color: #ff9800; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .box-rastreio button:hover { background-color: #e68900; }
        #resultado { margin-top: 20px; font-weight: bold; color: #fff; font-size: 18px; padding: 10px; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div class="box-rastreio">
    <h3>CANTINHO DO ROBS</h3>
    <p>Acompanhe seu pedido</p>
    <input type="text" id="pedidoInput" placeholder="Ex: PED1782240009224">
    <br>
    <button onclick="buscarPedido()">Acompanhar</button>
    <div id="resultado"></div>
</div>

<script>
async function buscarPedido() {
    const idBusca = document.getElementById('pedidoInput').value.trim();
    // Link configurado corretamente
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2xmPg4ZzGb-QcbKWczCFKBpUegjEuwyIlTezFu87Fq5cD5qlwrsE7x96FovHDCKJLY25mu_I3lSxT/pub?output=csv'; 

    document.getElementById('resultado').innerText = "Buscando...";

    try {
        const response = await fetch(urlCSV);
        const data = await response.text();
        const linhas = data.split('\n');
        
        let statusEncontrado = "";
        
        // Percorre as linhas procurando o ID
        for (let i = 1; i < linhas.length; i++) {
            const colunas = linhas[i].split(',');
            if (colunas[0] && colunas[0].trim() === idBusca) {
                statusEncontrado = colunas[1].trim();
            }
        }

        if (statusEncontrado !== "") {
            document.getElementById('resultado').innerText = "Status atual: " + statusEncontrado;
        } else {
            document.getElementById('resultado').innerText = "Pedido não encontrado.";
        }
    } catch (error) {
        document.getElementById('resultado').innerText = "Erro ao conectar. Tente novamente.";
    }
}
</script>

</body>
</html>
