<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs | Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;        
            --primary-hover: #6d28d9;  
            --bg-dark: #0f0f12;        
            --bg-card: #18181c;        
            --bg-input: #2d2d35;       
            --text-white: #ffffff;
            --text-dim: #a0a0a0;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-white); margin: 0; padding-bottom: 50px; }

        /* Status Piscando */
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; animation: piscar 2s infinite; }
        .aberto { background: var(--primary); }
        .fechado { background: var(--danger); }

        header { background: #151518; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo h1 { color: white; margin: 0; font-size: 24px; }
        .logo span { color: var(--primary); }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .produto-card { background: var(--bg-card); border: 1px solid #333; border-radius: 16px; padding: 20px; }
        .prod-price { color: var(--primary); font-size: 1.2rem; font-weight: 800; margin: 10px 0; }
        
        select { width: 100%; padding: 10px; margin-bottom: 10px; background: var(--bg-input); color: white; border: none; border-radius: 8px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; }

        .cart-sidebar { position: fixed; right: -100%; top: 0; width: 400px; height: 100%; background: #1a1a1a; z-index: 100; transition: 0.4s; padding: 20px; border-left: 2px solid var(--primary); }
        .cart-sidebar.active { right: 0; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1>Cantinho do <span>Robs</span></h1></div>
    <div onclick="toggleCart()" style="cursor:pointer;"><i class="fas fa-shopping-basket fa-lg"></i> <span id="contagem">0</span></div>
</header>

<div class="container">
    <div style="text-align: center; margin: 20px 0;">
        <div id="statusLoja" class="status-badge">Carregando...</div>
    </div>

    <div id="cardapio">
        <h2 style="color: var(--primary);">Pizzas</h2>
        <div id="cat-pizzas" class="grid-produtos"></div>
    </div>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <h2 style="color:var(--primary)">Seu Pedido</h2>
    <div id="carrinhoItens"></div>
    <div style="margin-top: 20px; font-size: 1.5rem;">Total: R$ <span id="total">0.00</span></div>
    <button class="btn-add" onclick="finalizar()" style="margin-top: 20px;">Enviar Pedido</button>
    <button class="btn-add" style="background:#444; margin-top:10px;" onclick="toggleCart()">Fechar</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzK5DrWIcbh1p_0VGzc5PQIbke6PJS6RoGwbrkNxUNLQor1-oaQoks3Hxs2f5o9upFi/exec";
    let carrinho = [];
    let produtos = [];

    async function carregar() {
        try {
            const res = await fetch(API_URL);
            produtos = await res.json();
            renderizar();
        } catch(e) { console.error("Erro ao buscar API"); }
    }

    function renderizar() {
        const div = document.getElementById("cat-pizzas");
        produtos.forEach((p, i) => {
            div.innerHTML += `
                <div class="produto-card">
                    <strong>${p.nome}</strong>
                    <select id="s1-${i}"><option>Sabor 1</option><option>Calabresa</option><option>Mussarela</option><option>Frango</option></select>
                    <select id="s2-${i}"><option>Sabor 2 (Opcional)</option><option>Calabresa</option><option>Mussarela</option><option>Frango</option></select>
                    <div class="prod-price">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                    <button class="btn-add" onclick="add(${i})">Adicionar</button>
                </div>`;
        });
    }

    function add(i) {
        const p = produtos[i];
        const s1 = document.getElementById(`s1-${i}`).value;
        const s2 = document.getElementById(`s2-${i}`).value;
        carrinho.push({nome: `${p.nome} (${s1} + ${s2})`, preco: p.preco});
        renderCarrinho();
    }

    function renderCarrinho() {
        document.getElementById("carrinhoItens").innerHTML = carrinho.map(i => `<div>${i.nome} - R$ ${i.preco}</div>`).join('');
        document.getElementById("contagem").innerText = carrinho.length;
        document.getElementById("total").innerText = carrinho.reduce((acc, curr) => acc + parseFloat(curr.preco), 0).toFixed(2);
    }

    function verificarStatus() {
        const h = new Date().getHours();
        const el = document.getElementById("statusLoja");
        if (h >= 18 && h < 23) { el.innerText = "🟢 Aberto Agora"; el.className = "status-badge aberto"; }
        else { el.innerText = "🔴 Fechado"; el.className = "status-badge fechado"; }
    }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
    function finalizar() { window.open(`https://wa.me/5579920001038?text=${encodeURIComponent('Pedido: ' + carrinho.map(i => i.nome).join(', '))}`); }

    verificarStatus();
    carregar();
</script>
</body>
</html>
