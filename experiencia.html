<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Robs - Pedido</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .valor-exibido { font-size: 12px; color: #555; margin-bottom: 5px; }
        .resumo { margin-top: 25px; padding: 20px; background: #fff3e0; border-radius: 8px; border: 1px solid #ffe0b2; }
        button { width: 100%; padding: 15px; background: #25d366; color: white; border: none; border-radius: 6px; margin-top: 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cantinho do Robs 🍕</h2>
    
    <label>Nome:</label>
    <input type="text" id="nome" placeholder="Seu nome completo">
    
    <label>Endereço:</label>
    <input type="text" id="end" placeholder="Rua e número">

    <label>Bairro:</label>
    <select id="bairro" onchange="calcular()">
        <option value="0">Selecione o bairro...</option>
        <option value="6.00">Centro (Taxa R$ 6,00)</option>
        <option value="6.00">Bairro Sul (Taxa R$ 6,00)</option>
    </select>

    <label>Código Pizza 1:</label>
    <input type="number" id="cod1" placeholder="Ex: 101" oninput="calcular()">
    <div id="res1" class="valor-exibido"></div>

    <label>Código Pizza 2:</label>
    <input type="number" id="cod2" placeholder="Ex: 102" oninput="calcular()">
    <div id="res2" class="valor-exibido"></div>

    <label>Código da Bebida (1L - R$ 9,90):</label>
    <input type="number" id="codBebida" placeholder="Digite o código da bebida" oninput="calcular()">
    <div id="resBebida" class="valor-exibido"></div>

    <label>Forma de Pagamento:</label>
    <select id="pagamento">
        <option value="Pix">Pix</option>
        <option value="Cartão Débito">Cartão Débito</option>
        <option value="Cartão Crédito">Cartão Crédito</option>
    </select>

    <div class="resumo">
        <strong>Total a pagar: R$ <span id="total">0.00</span></strong>
    </div>

    <button onclick="finalizarPedido()">Enviar Pedido no WhatsApp 💬</button>
</div>

<script>
    function calcular() {
        let cod1 = document.getElementById('cod1').value;
        let cod2 = document.getElementById('cod2').value;
        let codBebida = document.getElementById('codBebida').value;
        let bairro = parseFloat(document.getElementById('bairro').value);
        let subtotal = 0;

        if (cod1 > 0) { subtotal += 39.90; document.getElementById('res1').innerText = "Valor: R$ 39,90"; } 
        else { document.getElementById('res1').innerText = ""; }
        
        if (cod2 > 0) { subtotal += 39.90; document.getElementById('res2').innerText = "Valor: R$ 39,90"; } 
        else { document.getElementById('res2').innerText = ""; }

        if (codBebida > 0) { subtotal += 9.90; document.getElementById('resBebida').innerText = "Valor: R$ 9,90"; } 
        else { document.getElementById('resBebida').innerText = ""; }

        let total = subtotal + bairro;
        document.getElementById('total').innerText = total.toFixed(2);
    }

    function finalizarPedido() {
        let total = document.getElementById('total').innerText;
        if(total === "0.00") { alert("Por favor, adicione pelo menos um item ao pedido."); return; }

        let confirmacao = confirm("Deseja finalizar seu pedido? O tempo de entrega é de 50 a 60 minutos.");
        
        if (confirmacao) {
            let msg = `*Pedido Cantinho do Robs*%0A
            Nome: ${document.getElementById('nome').value}%0A
            Endereço: ${document.getElementById('end').value}%0A
            Bairro: ${document.getElementById('bairro').options[document.getElementById('bairro').selectedIndex].text}%0A
            Pizza 1 (Cod): ${document.getElementById('cod1').value}%0A
            Pizza 2 (Cod): ${document.getElementById('cod2').value}%0A
            Bebida (Cod): ${document.getElementById('codBebida').value}%0A
            Pagamento: ${document.getElementById('pagamento').value}%0A
            Total: R$ ${total}%0A
            Tempo de entrega: 50-60 min.`;
            
            window.open(`https://wa.me/5579920001038?text=${msg}`);
        }
    }
</script>

</body>
</html>
