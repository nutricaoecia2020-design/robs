<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliGestor Pro v6.1 | ROBS DELIVERY</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .btn-status { width: 100%; padding: 20px; font-size: 28px; font-weight: bold; border-radius: 10px; border: none; margin-bottom: 20px; text-transform: uppercase; animation: blink 1.5s infinite; }
        .status-aberto { background-color: #00c853; color: white; }
        .status-agendamento { background-color: #ffca28; color: #333; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .logo { font-size: 28px; font-weight: bold; color: #6a1b9a; }
        .clock { font-size: 22px; font-weight: bold; }
        
        .main-layout { display: flex; gap: 30px; }
        .left-panel { flex: 2; }
        .right-panel { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #ddd; height: fit-content; }
        
        .pizza-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .pizza-card { border: 2px solid #6a1b9a; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; background: #fff; font-size: 14px; transition: 0.3s; }
        .pizza-card:hover { background: #6a1b9a; color: white; transform: scale(1.03); }
        .pizza-card b { display: block; font-size: 16px; margin-top: 5px; }
        
        .prod-area { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; background: #f0f0f0; padding: 15px; border-radius: 8px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        .plus-btn { padding: 12px 25px; background: #6a1b9a; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        .btn-del { color: red; cursor: pointer; font-weight: bold; }
        
        .total-val { font-size: 40px; font-weight: bold; color: #6a1b9a; margin: 20px 0; text-align: center; }
        button.finalizar { width: 100%; padding: 20px; background: #00c853; color: white; border: none; border-radius: 6px; font-size: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <button id="btn-status" class="btn-status">Carregando...</button>

    <div class="header-top">
        <div class="logo">ROBS DELIVERY <small style="font-size: 14px; color: #666;">v6.1</small></div>
        <div id="clock" class="clock">--:--:--</div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <label><strong>Selecione o Sabor:</strong></label>
            <div class="pizza-grid" id="pizzaGrid"></div>

            <div class="prod-area">
                <div style="flex: 3;"><label>Código</label><input type="text" id="codProduto" placeholder="Ex: 101"></div>
                <div style="flex: 1;"><label>Qtd</label><input type="number" id="qtd" value="1"></div>
                <button class="plus-btn" onclick="adicionarItem()">+</button>
            </div>

            <table>
                <thead><tr><th>DESCRIÇÃO</th><th>QTD</th><th>UNIT.</th><th>TOTAL</th><th>AÇÃO</th></tr></thead>
                <tbody id="listaItens"></tbody>
            </table>

            <div style="margin-top: 30px;">
                <h3>Dados do Cliente</h3>
                <input type="text" id="nome" placeholder="👤 Nome" style="margin-bottom: 10px;">
                <input type="text" id="contato" placeholder="📞 Contato" style="margin-bottom: 10px;">
                <input type="text" id="end" placeholder="🏠 Endereço">
            </div>
        </div>

        <div class="right-panel">
            <div class="total-val">R$ <span id="totalDisplay">0,00</span></div>
            <label>Bairro (Taxa):</label>
            <select id="bairro" onchange="calcularTotal()" style="margin-bottom: 15px;">
                <option value="0">Luzia (Grátis)</option>
                <option value="6.00">Outros (R$ 6,00)</option>
            </select>
            <label>Pagamento:</label>
            <select id="pagamento" style="margin-bottom: 20px;">
                <option value="Dinheiro">Dinheiro 💵</option>
                <option value="Pix">Pix 📱</option>
                <option value="Cartão Débito">Cartão Débito 💳</option>
                <option value="Cartão Crédito">Cartão Crédito 💳</option>
            </select>
            <button class="finalizar" onclick="finalizarPedido()">FINALIZAR (F2)</button>
        </div>
    </div>
</div>

<script>
    const produtosCatalogo = {
        101: { nome: "Atum", preco: 24.90 }, 102: { nome: "Calabresa", preco: 19.90 },
        103: { nome: "Bauru", preco: 19.90 }, 104: { nome: "Camarão", preco: 27.50 },
        105: { nome: "Frango", preco: 19.90 }, 106: { nome: "Milho Verde", preco: 19.90 },
        107: { nome: "Frango C/ Catupiry", preco: 24.90 }, 108: { nome: "Baiana", preco: 22.50 },
        109: { nome: "Palmito", preco: 24.90 }, 110: { nome: "Bacon", preco: 22.90 },
        111: { nome: "Guaraná 1L", preco: 9.90 }
    };

    let itensPedido = [];
    let subtotalItens = 0;

    function verificarHorario() {
        const hora = new Date().getHours();
        const btn = document.getElementById('btn-status');
        if (hora >= 18 && hora < 22) { 
            btn.innerHTML = "LOJA ABERTA"; btn.className = "btn-status status-aberto"; 
        } else { 
            btn.innerHTML = "PEDIDOS PARA AGENDAMENTO"; btn.className = "btn-status status-agendamento"; 
        }
    }

    const grid = document.getElementById('pizzaGrid');
    for (let cod in produtosCatalogo) {
        let p = produtosCatalogo[cod];
        grid.innerHTML += `<div class="pizza-card" onclick="adicionarPorCard(${cod})">🍕 ${p.nome} <b>R$ ${p.preco.toFixed(2)}</b></div>`;
    }

    function adicionarPorCard(cod) { document.getElementById('codProduto').value = cod; adicionarItem(); }

    function adicionarItem() {
        let cod = document.getElementById('codProduto').value;
        let qtd = parseInt(document.getElementById('qtd').value);
        if(!produtosCatalogo[cod]) return;
        let p = produtosCatalogo[cod];
        let total = p.preco * qtd;
        itensPedido.push({nome: p.nome, qtd, valor: p.preco, total, id: Date.now()});
        subtotalItens += total;
        renderizarTabela();
        document.getElementById('codProduto').value = '';
        calcularTotal();
    }

    function renderizarTabela() {
        let html = itensPedido.map(i => `<tr><td>${i.nome}</td><td>${i.qtd}</td><td>R$ ${i.valor.toFixed(2)}</td><td>R$ ${i.total.toFixed(2)}</td><td><span class="btn-del" onclick="removerItem(${i.id})">X</span></td></tr>`).join('');
        document.getElementById('listaItens').innerHTML = html;
    }

    function removerItem(id) {
        let index = itensPedido.findIndex(i => i.id === id);
        subtotalItens -= itensPedido[index].total;
        itensPedido.splice(index, 1);
        renderizarTabela();
        calcularTotal();
    }

    function calcularTotal() {
        let taxa = parseFloat(document.getElementById('bairro').value);
        document.getElementById('totalDisplay').innerText = (subtotalItens + taxa).toFixed(2).replace('.', ',');
    }

    function finalizarPedido() {
        let b = document.getElementById('bairro');
        let taxa = parseFloat(b.value);
        let msg = `*🍕 NOVO PEDIDO - ROBS DELIVERY* %0A%0A` +
                  `*👤 CLIENTE:* ${document.getElementById('nome').value}%0A` +
                  `*📞 CONTATO:* ${document.getElementById('contato').value}%0A` +
                  `*🏠 ENDEREÇO:* ${document.getElementById('end').value}%0A%0A` +
                  `*🛒 ITENS:* %0A` + itensPedido.map(i => `• ${i.nome} (x${i.qtd}) - R$ ${i.total.toFixed(2)}`).join('%0A') +
                  `%0A%0A*💰 TAXA:* R$ ${taxa.toFixed(2)}%0A` +
                  `*💸 TOTAL:* R$ ${document.getElementById('totalDisplay').innerText}%0A` +
                  `*💳 PAGAMENTO:* ${document.getElementById('pagamento').value}`;
        window.open(`https://wa.me/5579920001038?text=${msg}`);
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    verificarHorario();
</script>
</body>
</html>
