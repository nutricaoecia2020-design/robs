<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliGestor Pro v6.1 | ROBS DELIVERY</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #6a1b9a; }
        .clock { font-size: 20px; font-weight: bold; }
        
        .main-layout { display: flex; gap: 30px; }
        .left-panel { flex: 2; }
        .right-panel { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #ddd; height: fit-content; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        
        .prod-area { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; }
        .plus-btn { padding: 10px 20px; background: #6a1b9a; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        
        .total-box { text-align: center; margin: 20px 0; }
        .total-val { font-size: 32px; font-weight: bold; color: #6a1b9a; }
        
        button.finalizar { width: 100%; padding: 15px; background: #00c853; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">ROBS DELIVERY <small style="font-size: 12px; color: #666;">Sistema v6.1</small></div>
        <div id="clock" class="clock">--:--:--</div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="prod-area">
                <div style="flex: 3;">
                    <label>Buscar Produto (Código)</label>
                    <input type="text" id="buscaProduto" placeholder="Nome ou ID..." autofocus>
                </div>
                <div style="flex: 1;">
                    <label>Qtd</label>
                    <input type="number" id="qtd" value="1">
                </div>
                <button class="plus-btn" onclick="adicionarItem()">+</button>
            </div>

            <table>
                <thead><tr><th>ITEM</th><th>QTD</th><th>UNIT.</th><th>TOTAL</th></tr></thead>
                <tbody id="listaItens"></tbody>
            </table>

            <div style="margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px;">
                <h3>Dados do Cliente</h3>
                <input type="text" id="nome" placeholder="Nome Completo" style="margin-bottom: 10px;">
                <input type="text" id="contato" placeholder="Contato (WhatsApp)" style="margin-bottom: 10px;">
                <input type="text" id="end" placeholder="Endereço" style="margin-bottom: 10px;">
                <input type="text" id="bairro" placeholder="Bairro (Taxa R$ 6,00)">
            </div>
        </div>

        <div class="right-panel">
            <div class="total-box">
                <p>VALOR TOTAL</p>
                <div class="total-val">R$ <span id="totalDisplay">0,00</span></div>
            </div>
            
            <label>Forma de Pagamento</label>
            <select id="pagamento" style="margin-bottom: 20px;">
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartão Débito">Cartão Débito</option>
                <option value="Cartão Crédito">Cartão Crédito</option>
                <option value="Pix">Pix</option>
            </select>

            <button class="finalizar" onclick="finalizarPedido()">FINALIZAR (F2)</button>
        </div>
    </div>
</div>

<script>
    let total = 0;
    
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function adicionarItem() {
        let produto = document.getElementById('buscaProduto').value;
        let qtd = document.getElementById('qtd').value;
        if(!produto) return;
        
        let valorUnit = 39.90; // Exemplo para pizza
        let subtotal = valorUnit * qtd;
        total += subtotal;
        
        let tr = `<tr><td>${produto}</td><td>${qtd}</td><td>R$ ${valorUnit.toFixed(2)}</td><td>R$ ${subtotal.toFixed(2)}</td></tr>`;
        document.getElementById('listaItens').innerHTML += tr;
        document.getElementById('totalDisplay').innerText = total.toFixed(2).replace('.', ',');
        document.getElementById('buscaProduto').value = '';
    }

    function finalizarPedido() {
        let msg = `*Novo Pedido - Robs Delivery*%0A
Data/Hora: ${new Date().toLocaleString()}%0A
Nome: ${document.getElementById('nome').value}%0A
Contato: ${document.getElementById('contato').value}%0A
Endereço: ${document.getElementById('end').value}%0A
Bairro: ${document.getElementById('bairro').value}%0A
Pagamento: ${document.getElementById('pagamento').value}%0A
Total: R$ ${document.getElementById('totalDisplay').innerText}`;
        
        window.open(`https://wa.me/5579920001038?text=${msg}`);
    }
</script>

</body>
</html>
